title: "上下文文件生成器"
slug: "context-generator"
status: "pending"
completion: 0
description: |
  实现自动化的上下文文件生成器，能够根据当前工作空间的状态、
  行为树结构和用户活动，智能生成供 Claude Code 使用的上下文文件。
  该生成器需要支持增量更新、缓存机制和多工作空间场景。
category: "feature"
is_parent: false
prerequisites:
  - "ISSUE-INT-001A"
related_specs:
