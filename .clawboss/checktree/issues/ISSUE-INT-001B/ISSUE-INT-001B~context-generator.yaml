          - "tests/e2e/context-generator/auto-update.spec.ts"
      ai:
        prompt: |
          请验证文件生成与更新机制实现：
          1. 检查 src/integration/generator/file-generator/ 目录
          2. 验证文件生成器实现（模板+上下文→文件内容）
          3. 检查文件写入策略（覆盖/追加/差异更新选项）
          4. 验证自动更新触发器（定时、事件、手动）
          5. 检查变更检测机制（哈希比较或 diff）
          6. 验证文件备份功能（更新前备份）
          7. 检查生成历史记录
          8. 验证默认 CLAUDE.md 生成路径和自定义路径支持
