id: "ISSUE-INT-001B"
issue_number: "001B"
title: "上下文文件生成器"
slug: "context-generator"
status: "pending"
description: |
  实现上下文文件生成器，自动收集和生成提供给 Claude Code 的上下文文件（如 CLAUDE.md）。
  该组件负责从项目结构、行为树状态、配置文件等来源收集信息，生成结构化的上下文文档，
  帮助 Claude Code 理解项目背景、行为管理系统状态和当前任务上下文。

  主要功能包括：
  1. 项目上下文收集（项目结构、技术栈、配置信息）
  2. 行为树上下文生成（树结构、节点状态、统计信息）
  3. 工作空间上下文整合（当前工作空间、活跃行为、待办事项）
  4. 模板渲染系统（可定制的上下文模板）
  5. 文件生成与更新（CLAUDE.md 等上下文文件的自动维护）

is_parent: false
prerequisites:
  - "ISSUE-INT-001A"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary

criteria:
  - id: "ISSUE-INT-001B~project-context"
    name: "项目上下文收集实现"
    description: |
      实现项目上下文收集功能，自动识别和收集项目相关信息：
      - 项目基本信息（名称、描述、版本、作者）
      - 技术栈识别（从 package.json、requirements.txt 等）
      - 项目结构分析（源代码目录、测试目录、文档目录）
      - 配置文件收集（系统配置、用户配置、工作空间配置）
      - 依赖关系分析（内部模块依赖、外部包依赖）

      收集的信息应结构化存储，支持增量更新。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/integration/generator/project-context/"
        test_files:
          - "src/integration/generator/project-context/collector.test.ts"
          - "src/integration/generator/project-context/analyzer.test.ts"
          - "src/integration/generator/project-context/resolver.test.ts"
      integration:
        command: "npm test -- src/integration/generator/project-context/integration.test.ts"
        test_files:
          - "src/integration/generator/project-context/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- project-context"
        test_files:
          - "tests/e2e/context-generator/project-context.spec.ts"
      ai:
        prompt: |
          请验证项目上下文收集实现：
          1. 检查 src/integration/generator/project-context/ 目录
          2. 验证项目基本信息收集（读取 package.json/pyproject.toml 等）
          3. 检查技术栈识别逻辑（语言、框架检测）
          4. 验证项目结构分析（src/、tests/、docs/ 等目录识别）
          5. 检查配置文件收集和解析
          6. 验证依赖关系分析功能
          7. 检查增量更新机制（避免重复收集）
          8. 验证收集结果的数据结构定义

          返回格式：{"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/integration/generator/project-context/collector.ts"
          - "src/integration/generator/project-context/analyzer.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

