  - id: "ISSUE-INT-001B~file-generation"
    name: "文件生成与更新机制实现"
    description: |
      实现上下文文件的自动生成和更新机制：
      - 文件生成器（根据模板和上下文生成文件内容）
      - 文件写入策略（覆盖、追加、差异更新）
      - 自动更新触发器（定时更新、事件触发、手动触发）
      - 变更检测（检测上下文变化，避免不必要的写入）
      - 文件备份（更新前自动备份）
      - 生成历史记录（记录生成时间、上下文版本）

      默认生成 CLAUDE.md 到项目根目录，支持自定义输出路径。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
