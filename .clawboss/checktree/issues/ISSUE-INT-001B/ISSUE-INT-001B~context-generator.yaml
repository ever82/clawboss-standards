        command: "npm test -- src/integration/generator/file-generator/"
        test_files:
          - "src/integration/generator/file-generator/generator.test.ts"
          - "src/integration/generator/file-generator/writer.test.ts"
          - "src/integration/generator/file-generator/watcher.test.ts"
      integration:
        command: "npm test -- src/integration/generator/file-generator/integration.test.ts"
        test_files:
          - "src/integration/generator/file-generator/integration.test.ts"
      e2e:
