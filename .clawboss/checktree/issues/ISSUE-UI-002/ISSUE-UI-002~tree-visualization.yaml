  - id: "ISSUE-UI-002~criterion-1"
    name: "树形结构渲染"
    description: "能够正确渲染多级行为树结构，支持不同的节点类型（根节点、分支节点、叶子节点）和状态标识"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm run test:unit -- src/components/tree/"
        test_files:
          - "ui/web-client/src/components/tree/TreeNode.test.tsx"
          - "ui/web-client/src/components/tree/TreeRenderer.test.tsx"
          - "ui/web-client/src/components/tree/TreeLayout.test.ts"
      integration:
        command: "npm run test:integration -- tests/integration/tree/rendering.test.ts"
        test_files:
          - "ui/web-client/tests/integration/tree/rendering.test.ts"
      e2e:
        command: "npm run test:e2e -- tests/e2e/tree/rendering.spec.ts"
        test_files:
          - "ui/web-client/tests/e2e/tree/rendering.spec.ts"
          - "ui/web-client/tests/e2e/tree/node-types.spec.ts"
      ai:
        prompt: |
          请验证树形结构渲染功能是否完整：
          1. 检查是否能正确渲染多级嵌套树结构（至少支持10级深度）
          2. 检查不同节点类型是否有视觉区分（根节点、分支、叶子、完成/进行中/未开始状态）
          3. 检查节点内容显示是否正确（标题、描述、进度、时间等）
          4. 检查连接线是否清晰展示父子关系
          5. 检查大数据量（1000+节点）下渲染性能是否流畅
          返回格式：{"passed": true/false, "reason": "详细解释"}
        context_files:
          - "ui/web-client/src/components/tree/TreeRenderer.tsx"
          - "ui/web-client/src/components/tree/TreeNode.tsx"
          - "ui/web-client/src/components/tree/styles.css"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"

