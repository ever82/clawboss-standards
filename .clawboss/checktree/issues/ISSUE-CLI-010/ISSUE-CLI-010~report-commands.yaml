id: "ISSUE-CLI-010"
issue_number: 10
slug: "report-commands"
title: "报告命令"
description: |
  实现AI-Me CLI的报告生成相关命令，支持多种报告类型、自定义模板、定时报告等功能。
  命令需要与CORE-010A/B/C分析服务集成。
status: "pending"
is_parent: false
sub_issues: []
prerequisites:
  - "ISSUE-CLI-001B"
  - "ISSUE-CORE-010B"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-CLI-010~criterion-1"
    name: "基础报告生成"
    description: |
      实现 `ai-me report` 命令的基础功能，支持生成常见报告类型和基本导出。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/report/basic.test.ts"
        test_files:
          - "src/cli/commands/report/basic.test.ts"
      integration:
        command: "npm test -- src/cli/commands/report/integration.test.ts"
        test_files:
          - "src/cli/commands/report/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/report/basic"
        test_files:
          - "e2e/cli/report/basic.spec.ts"
      ai:
        prompt: |
          请验证基础报告生成功能的实现:
          1. 生成报告: `ai-me report --type summary` 生成摘要报告
          2. 报告类型: summary, progress, completion, time-tracking, burndown
          3. 时间范围: `--period today|week|month|quarter|year|custom`
          4. 自定义范围: `--from "2026-01-01" --to "2026-01-31"`
          5. 工作空间: `--workspace <name>` 指定工作空间
          6. 标签过滤: `--tags work,project` 只包含指定标签的行为
          7. 报告预览: 默认在终端显示报告摘要
          8. 报告保存: `--output report.md` 保存到文件
          9. 报告格式: `--format markdown|json|html|pdf`

          检查点:
          - 与CORE-010B报告服务正确集成
          - 报告内容准确反映数据
          - 终端报告格式美观易读

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/report/index.ts"
          - "src/core/services/analytics/report.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

  - id: "ISSUE-CLI-010~criterion-2"
    name: "自定义报告模板"
    description: |
      实现自定义报告模板功能，支持用户定义报告结构、字段、样式。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/report/template.test.ts"
        test_files:
          - "src/cli/commands/report/template.test.ts"
      integration:
        command: "npm test -- src/cli/commands/report/template.integration.test.ts"
        test_files:
          - "src/cli/commands/report/template.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/report/template"
        test_files:
          - "e2e/cli/report/template.spec.ts"
      ai:
        prompt: |
          请验证自定义报告模板功能的实现:
          1. 创建模板: `ai-me report template create <name>`
          2. 模板列表: `ai-me report template list` 显示可用模板
          3. 编辑模板: `ai-me report template edit <name>`
          4. 删除模板: `ai-me report template delete <name>`
          5. 使用模板: `ai-me report --template <name>`
          6. 模板变量: 支持{{total_behaviors}}, {{completion_rate}}等变量
          7. 条件块: 支持{{#if has_overdue}}...{{/if}}条件渲染
          8. 循环: 支持{{#each behaviors}}...{{/each}}列表渲染
          9. 模板分享: `--export-template` 导出模板供他人使用

          检查点:
          - 模板语法文档完整
          - 模板验证提供清晰错误
          - 变量替换正确执行

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/report/template.ts"
          - "src/core/services/analytics/template.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites:
      - "ISSUE-CLI-010~criterion-1"

  - id: "ISSUE-CLI-010~criterion-3"
    name: "报告可视化与图表"
    description: |
      实现报告中的可视化图表功能，支持ASCII图表和图形导出。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/report/charts.test.ts"
        test_files:
          - "src/cli/commands/report/charts.test.ts"
      integration:
        command: "npm test -- src/cli/commands/report/charts.integration.test.ts"
        test_files:
          - "src/cli/commands/report/charts.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/report/charts"
        test_files:
          - "e2e/cli/report/charts.spec.ts"
      ai:
        prompt: |
          请验证报告可视化与图表功能的实现:
          1. ASCII图表: 终端显示柱状图、饼图、折线图
          2. 完成趋势: 显示一段时间内的完成行为趋势
          3. 状态分布: 饼图展示各状态行为占比
          4. 优先级分布: 柱状图展示优先级分布
          5. 燃尽图: 显示剩余工作量和时间关系
          6. 日历热力图: 显示每日活跃度
          7. 图表导出: `--charts` 生成独立图表文件
          8. 图表尺寸: `--chart-width 80` 控制图表宽度
          9. 无图表模式: `--no-charts` 纯文本报告

          检查点:
          - 图表在终端显示清晰
          - 数据与图表一致
          - 窄终端自动调整尺寸

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/report/charts.ts"
          - "src/cli/formatter/charts.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites:
      - "ISSUE-CLI-010~criterion-1"

  - id: "ISSUE-CLI-010~criterion-4"
    name: "报告导出与分享"
    description: |
