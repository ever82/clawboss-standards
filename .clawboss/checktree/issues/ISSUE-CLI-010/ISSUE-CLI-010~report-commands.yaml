  - id: "ISSUE-CLI-010~criterion-5"
    name: "报告比较与趋势"
    description: |
      实现报告比较和趋势分析功能，支持对比不同时期的报告、分析趋势变化。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/report/compare.test.ts"
        test_files:
          - "src/cli/commands/report/compare.test.ts"
          - "src/cli/commands/report/trends.test.ts"
      integration:
        command: "npm test -- src/cli/commands/report/compare.integration.test.ts"
        test_files:
          - "src/cli/commands/report/compare.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/report/compare"
        test_files:
          - "e2e/cli/report/compare.spec.ts"
          - "e2e/cli/report/trends.spec.ts"
      ai:
        prompt: |
          请验证报告比较与趋势功能的实现:
          1. 报告对比: `ai-me report compare --report1 report1.md --report2 report2.md`
          2. 时期对比: `ai-me report compare --period1 last-week --period2 this-week`
          3. 差异高亮: 对比结果高亮显示变化(增加+，减少-)
          4. 趋势分析: `ai-me report trends --period last-month` 显示趋势
          5. 预测: 基于趋势预测未来完成情况
          6. 基线设置: `ai-me report baseline set <name>` 设置对比基线
          7. 基线对比: `ai-me report baseline compare <name>`
          8. 变化率: 显示各项指标的变化百分比
          9. 趋势图表: 折线图展示历史趋势

          检查点:
          - 对比数据准确
          - 趋势计算逻辑正确
          - 预测有置信区间

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/report/compare.ts"
          - "src/cli/commands/report/trends.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites:
      - "ISSUE-CLI-010~criterion-3"
