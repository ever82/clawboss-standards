id: "ISSUE-DOC-001"
issue_number: 1
title: "用户文档"
slug: "user-docs"
status: "pending"
description: |
  编写完整的用户文档，帮助终端用户了解如何安装、配置和使用 AI-Me 行为管理系统。
  文档需要覆盖快速入门、核心概念解释、常用操作指南、CLI 命令参考等内容。
  用户文档是产品正式发布前的必要交付物，直接影响用户体验和上手难度。
is_parent: false
prerequisites:
  - "ISSUE-DEPLOY-004"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-DOC-001~criterion-1"
    name: "快速入门指南完成"
    description: |
      提供新用户快速上手的步骤说明，包含安装、初始配置、创建第一个行为、
      查看行为树等核心流程。指南需包含截图和命令示例，确保零基础用户能在10分钟内完成首次使用。
    status: "pending"
    coverage:
      unit: not_needed
      integration: not_needed
      e2e: not_needed
      ai: sufficient
      manual: sufficient
    verification:
      ai:
        prompt: |
          请验证快速入门指南质量:
          1. 语言是否清晰易懂，适合目标用户群体
          2. 步骤是否完整且可执行，无遗漏关键环节
          3. 命令示例是否正确，可直接复制执行
          4. 截图/图示是否清晰，与文字描述一致
          5. 是否存在错别字或语法错误
          6. 是否包含常见错误的处理方式
          返回: {"passed": true/false, "reason": "详细说明", "issues": ["问题列表"]}
        context_files: ["docs/user/quickstart.md", "docs/user/installation.md"]
        model: "claude-sonnet-4-6"
      manual:
        instructions: |
          1. 准备一台干净的测试环境（虚拟机或Docker容器）
          2. 按照快速入门指南完成从零开始的完整安装
          3. 验证每个步骤都能成功执行，记录执行时间
          4. 检查是否在10分钟内能完成第一个行为的创建和查看
          5. 记录遇到的任何问题或不清晰的地方
        required_tools: ["terminal", "docker", "timer"]
    execution_time: "<15 minutes"
    prerequisites: []

  - id: "ISSUE-DOC-001~criterion-2"
    name: "核心概念文档完成"
    description: |
      详细解释系统核心概念：行为（Behavior）、行为树（Behavior Tree）、状态（Status）、
      工作空间（Workspace）、行为类（Behavior Class）等。文档需包含概念定义、相互关系、
      使用场景和最佳实践。
    status: "pending"
    coverage:
      unit: not_needed
      integration: not_needed
      e2e: not_needed
      ai: sufficient
      manual: sufficient
    verification:
      ai:
        prompt: |
          请验证核心概念文档质量:
          1. 概念定义是否准确、无歧义
          2. 概念之间的关系描述是否清晰
          3. 是否包含实际使用场景的示例
          4. 术语使用是否一致（检查术语表一致性）
          5. 图示是否准确反映概念关系
          6. 是否存在与代码实现不符的描述
          返回: {"passed": true/false, "reason": "详细说明", "issues": ["问题列表"]}
        context_files: ["docs/user/concepts.md", "docs/user/glossary.md"]
        model: "claude-sonnet-4-6"
      manual:
        instructions: |
          1. 请3位不同技术背景的用户阅读核心概念文档
          2. 请用户解释他们理解的行为、行为树等概念
          3. 验证用户的理解是否与文档意图一致
          4. 收集反馈，检查是否有概念让用户困惑
        required_tools: ["browser", "feedback-form"]
    execution_time: "<30 minutes"
    prerequisites: []

  - id: "ISSUE-DOC-001~criterion-3"
    name: "CLI命令参考文档完成"
    description: |
      提供完整的 CLI 命令参考，包含所有命令的使用说明、参数说明、示例和常见错误处理。
      文档需与代码实现保持一致，并支持版本化管理。
    status: "pending"
    coverage:
      unit: not_needed
      integration: not_needed
      e2e: not_needed
      ai: sufficient
      manual: sufficient
    verification:
      ai:
        prompt: |
          请验证CLI命令参考文档质量:
          1. 文档是否包含所有已实现的CLI命令
          2. 命令描述是否准确，与实际行为一致
          3. 参数说明是否完整，包含必填/可选标识
          4. 示例是否可执行，输出结果是否正确
          5. 是否包含命令的退出码说明
          6. 与help命令输出对比，检查一致性
          返回: {"passed": true/false, "reason": "详细说明", "issues": ["问题列表"]}
        context_files: ["docs/user/cli-reference.md", "src/cli/commands/"]
        model: "claude-sonnet-4-6"
      manual:
        instructions: |
          1. 随机抽取10个CLI命令
          2. 根据文档执行每个命令
          3. 验证文档描述与实际行为是否一致
          4. 检查示例命令是否可直接复制执行
          5. 记录任何不一致或缺失的信息
        required_tools: ["terminal", "ai-me-cli"]
    execution_time: "<20 minutes"
    prerequisites: []

  - id: "ISSUE-DOC-001~criterion-4"
    name: "故障排除指南集成"
    description: |
      将故障排除指南(DOC-004)的关键内容集成到用户文档中，确保用户遇到常见问题时
      能快速找到解决方案。包含错误码索引、常见问题FAQ、获取帮助的渠道。
    status: "pending"
    coverage:
      unit: not_needed
      integration: not_needed
      e2e: not_needed
      ai: sufficient
      manual: sufficient
    verification:
      ai:
        prompt: |
          请验证故障排除集成质量:
          1. 是否包含清晰的错误码索引
          2. FAQ是否覆盖常见用户问题
          3. 解决方案是否具体可操作
          4. 是否提供获取帮助的多种渠道（文档、社区、issue）
          5. 故障排除内容是否与DOC-004保持一致
          返回: {"passed": true/false, "reason": "详细说明"}
        context_files: ["docs/user/troubleshooting.md", "docs/user/faq.md"]
        model: "claude-sonnet-4-6"
      manual:
        instructions: |
          1. 模拟3个常见用户错误场景
          2. 尝试通过故障排除文档解决问题
          3. 验证文档中的解决方案是否有效
          4. 检查文档导航是否便捷
        required_tools: ["terminal", "browser"]
    execution_time: "<15 minutes"
    prerequisites:
      - "ISSUE-DOC-004"
