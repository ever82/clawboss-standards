      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/perf/query/index/"
        test_files:
          - "src/perf/query/index/index-recommender.test.ts"
          - "src/perf/query/index/index-analyzer.test.ts"
          - "src/perf/query/index/index-evaluator.test.ts"
      integration:
        command: "npm test -- src/perf/query/integration/index-optimization.test.ts"
        test_files:
          - "src/perf/query/integration/index-optimization.test.ts"
