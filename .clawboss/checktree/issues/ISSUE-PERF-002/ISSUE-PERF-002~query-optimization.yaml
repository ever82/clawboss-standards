        command: "npm run test:e2e -- tests/e2e/performance/index-optimization.spec.ts"
        test_files:
          - "tests/e2e/performance/index-optimization.spec.ts"
      ai:
        prompt: |
          请验证索引优化策略实现：
          1. 是否基于查询分析自动推荐缺失索引（单列/复合索引）
          2. 是否支持覆盖索引分析（查询字段是否被索引完全覆盖）
          3. 是否评估现有索引的使用率和冗余索引识别
          4. 索引推荐是否考虑写入性能影响，提供权衡评分
          5. 是否支持索引效果的前后对比评估
          6. 是否提供索引创建/删除的DDL生成和安全检查
          7. 是否支持索引分区策略推荐（大表场景）
          请检查代码实现，返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/perf/query/index/index-recommender.ts"
          - "src/perf/query/index/index-analyzer.ts"
          - "src/perf/query/index/index-evaluator.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
