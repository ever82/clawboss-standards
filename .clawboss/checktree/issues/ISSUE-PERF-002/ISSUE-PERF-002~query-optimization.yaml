  - id: "ISSUE-PERF-002~criterion-5"
    name: "查询性能基准达成"
    description: "核心查询性能指标达成：单条主键查询<5ms，简单条件查询<20ms，复杂关联查询<100ms，全表聚合查询<500ms"
    status: "pending"
    coverage:
      unit: not_needed
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      integration:
        command: "npm test -- src/perf/query/integration/benchmark-suite.test.ts"
        test_files:
          - "src/perf/query/integration/benchmark-suite.test.ts"
      e2e:
        command: "npm run test:e2e -- tests/e2e/performance/query-benchmarks.spec.ts"
        test_files:
          - "tests/e2e/performance/query-benchmarks.spec.ts"
      ai:
        prompt: |
          请验证查询性能基准是否达成：
          1. 单条主键查询响应时间P99是否<5ms
          2. 简单条件查询（单表、少量条件）P99是否<20ms
          3. 复杂关联查询（3表以上JOIN）P99是否<100ms
          4. 全表聚合查询（count/sum/avg）P99是否<500ms
          5. 并发查询吞吐量是否达到1000 QPS以上
          6. 查询性能相比优化前是否提升80%以上
          7. 长时间运行（24小时）是否无内存泄漏和性能退化
