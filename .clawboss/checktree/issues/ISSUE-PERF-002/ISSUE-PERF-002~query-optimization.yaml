  - id: "ISSUE-PERF-002~criterion-1"
    name: "查询执行分析器"
    description: "实现SQL查询执行分析器，自动识别慢查询、全表扫描、缺失索引等问题，提供查询计划分析和可视化"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/perf/query/query-analyzer.test.ts"
        test_files:
          - "src/perf/query/query-analyzer.test.ts"
          - "src/perf/query/plan-parser.test.ts"
          - "src/perf/query/slow-query-detector.test.ts"
      integration:
        command: "npm test -- src/perf/query/integration/analyzer-with-db.test.ts"
        test_files:
          - "src/perf/query/integration/analyzer-with-db.test.ts"
      e2e:
        command: "npm run test:e2e -- tests/e2e/performance/query-analysis.spec.ts"
        test_files:
          - "tests/e2e/performance/query-analysis.spec.ts"
      ai:
        prompt: |
          请验证查询执行分析器实现：
          1. 是否能自动捕获执行时间超过阈值的慢查询（默认100ms）
          2. 是否支持查询计划解析（EXPLAIN/EXPLAIN ANALYZE）
          3. 是否能识别全表扫描、索引未使用、笛卡尔积等常见问题
          4. 是否提供查询性能评分和优化建议
          5. 分析结果是否支持JSON导出和可视化展示
          6. 是否支持查询采样率配置，避免生产环境过载
          7. 分析器本身性能开销是否低于被分析查询的5%
          请检查代码实现，返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/perf/query/query-analyzer.ts"
          - "src/perf/query/plan-parser.ts"
          - "src/perf/query/slow-query-detector.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites: []

