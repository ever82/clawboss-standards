      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/perf/cache/"
        test_files:
          - "src/perf/cache/multi-level-cache.test.ts"
          - "src/perf/cache/l1-memory-cache.test.ts"
          - "src/perf/cache/l2-distributed-cache.test.ts"
