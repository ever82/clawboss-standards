        command: "npm run test:e2e -- tests/e2e/performance/multi-level-cache.spec.ts"
        test_files:
          - "tests/e2e/performance/multi-level-cache.spec.ts"
      ai:
        prompt: |
          请验证多级缓存架构实现：
          1. L1内存缓存是否基于QuickLRU或类似库实现，支持容量限制和TTL
          2. L2分布式缓存是否基于Redis，支持连接池和集群模式
          3. 是否实现缓存穿透保护（单飞、互斥锁、布隆过滤器）
          4. 多级读取顺序是否正确：L1→L2→L3，命中后是否回填上级缓存
          5. 是否支持异步写回策略（Write-Behind）和直写策略（Write-Through）
          6. 缓存操作是否提供统一的Promise/Async接口
          7. 降级机制是否完备（L2失效时是否自动降级到L3）
          请检查代码实现，返回 {"passed": true/false, "reason": "详细解释"}
