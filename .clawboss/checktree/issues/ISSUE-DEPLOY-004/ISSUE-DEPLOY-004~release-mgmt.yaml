          - "tests/e2e/deploy/canary-release.test.ts"
      ai:
        prompt: |
          请验证发布策略管理实现是否符合以下要求：
          1. 是否支持蓝绿部署（Blue-Green Deployment）
          2. 是否支持金丝雀发布（Canary Release）和流量控制
          3. 是否支持滚动更新（Rolling Update）
          4. 是否支持全量发布（All-at-once）
          5. 是否提供发布策略配置界面或CLI命令
          6. 是否支持基于指标的自动流量切换
          7. 是否支持回滚策略配置
          返回格式: {"passed": true/false, "reason": "详细解释"}
