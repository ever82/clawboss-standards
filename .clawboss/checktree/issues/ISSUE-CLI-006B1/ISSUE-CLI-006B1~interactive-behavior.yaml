criteria:
  - id: "ISSUE-CLI-006B1~criterion-1"
    name: "交互式行为创建"
    description: |
      实现交互式行为创建向导，通过问答方式引导用户创建行为，自动使用CLI-002的行为创建服务。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/interactive/behavior/create.test.ts"
        test_files:
          - "src/cli/interactive/behavior/create.test.ts"
      integration:
        command: "npm test -- src/cli/interactive/behavior/create.integration.test.ts"
        test_files:
          - "src/cli/interactive/behavior/create.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/interactive/behavior-create"
        test_files:
          - "e2e/cli/interactive/behavior/create.spec.ts"
      ai:
        prompt: |
          请验证交互式行为创建功能的实现:
          1. 启动向导: `ai-me behavior create --interactive` 或 `-i`
          2. 基本信息: 依次提示输入名称、描述、优先级
          3. 优先级选择: 使用select组件选择high/medium/low
          4. 截止日期: 日期选择器或相对时间(如"3天后")
          5. 标签输入: 多选或输入新标签，支持自动补全
          6. 父行为: 搜索并选择父行为(可选)
          7. 验收标准: 可添加多个验收标准
          8. 预览确认: 创建前显示行为摘要供确认
          9. 快速创建: 支持 `--quick` 使用最少问题快速创建

          检查点:
          - 向导步骤流畅，可前进后退
          - 每一步都有清晰的说明和示例
          - 默认值合理，减少输入量

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/interactive/behavior/create.ts"
          - "src/cli/commands/behavior/create.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

