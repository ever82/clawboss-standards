      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/interactive/behavior/edit.test.ts"
        test_files:
          - "src/cli/interactive/behavior/edit.test.ts"
      integration:
        command: "npm test -- src/cli/interactive/behavior/edit.integration.test.ts"
        test_files:
          - "src/cli/interactive/behavior/edit.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/interactive/behavior-edit"
        test_files:
          - "e2e/cli/interactive/behavior/edit.spec.ts"
      ai:
        prompt: |
          请验证交互式行为编辑功能的实现:
          1. 启动编辑: `ai-me behavior edit <id> --interactive`
          2. 字段选择: 显示可编辑字段列表供选择
          3. 编辑名称: 文本输入框预填充当前值
          4. 编辑描述: 多行文本编辑器支持
          5. 状态变更: 下拉选择新状态，自动校验流转
          6. 进度更新: 滑块或数字输入选择进度(0-100)
          7. 标签管理: 交互式添加/删除标签
          8. 批量确认: 编辑完成后汇总变更供确认
          9. 撤销: 支持在确认前撤销某些修改

          检查点:
          - 字段编辑后立即显示新值
          - 非法值(如无效状态流转)被阻止
          - 编辑历史可查看，支持撤销

          Return format: {"passed": true/false, "reason": "详细解释"}
