criteria:
  - id: "ISSUE-PLUGIN-001B~criterion-1"
    name: "本地插件加载实现"
    description: "实现从本地文件系统加载插件，支持文件夹和压缩包(.zip/.tar.gz)格式，自动解压和验证"
    category: "feature"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    note: "支持.zip/.tar.gz格式的插件包，自动解压到临时目录验证"
    execution_time: "<3 seconds"
    prerequisites: []
    implementations:
      - type: "component"
        path: "src/plugin/loader/local-plugin-loader.ts"
      - type: "utility"
        path: "src/plugin/utils/archive-extractor.ts"
    verification:
      unit:
        command: "npm test -- src/plugin/loader/local-plugin-loader.test.ts"
        test_files:
          - "src/plugin/loader/local-plugin-loader.test.ts"
          - "src/plugin/utils/archive-extractor.test.ts"
      integration:
        command: "npm run test:integration -- local-plugin-loading"
        test_files:
          - "tests/integration/plugin/loader/local-loader.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- local-plugin-loading"
        test_files:
          - "tests/e2e/plugin/loader/local-loading.e2e.test.ts"
      ai:
        prompt: |
          请验证本地插件加载功能是否满足以下要求:
          1. 是否能从指定路径加载文件夹形式的插件(包含plugin.json的目录)
          2. 是否能加载.zip格式的插件包并自动解压到临时目录
          3. 是否能加载.tar.gz格式的插件包并正确处理gzip压缩
          4. 加载前是否验证插件包完整性(检查必需文件如manifest.json、主入口文件)
          5. 压缩包解压是否安全(防止zip slip攻击，路径遍历检查)
          6. 临时解压目录是否在加载完成后清理，或按策略保留用于调试
          7. 是否支持符号链接(symlink)插件目录，且能正确解析实际路径
          8. 加载失败时是否提供详细的错误信息(文件不存在、格式错误、权限不足等)
          返回格式: {"passed": true/false, "reason": "详细说明", "details": [{"check": "检查项", "passed": true/false}]}
        context_files:
          - "src/plugin/loader/local-plugin-loader.ts"
          - "src/plugin/utils/archive-extractor.ts"
        model: "claude-sonnet-4-6"

