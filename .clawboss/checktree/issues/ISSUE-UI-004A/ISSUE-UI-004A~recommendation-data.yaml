        command: "npm run test:e2e -- tests/e2e/analytics/tracking.spec.ts"
        test_files:
          - "ui/web-client/tests/e2e/analytics/tracking.spec.ts"
      ai:
        prompt: |
          请验证用户行为追踪系统是否完整：
          1. 检查是否实现了事件追踪器，支持页面浏览、点击、滚动、输入等事件
          2. 检查是否使用队列机制批量发送事件，减少网络请求
          3. 检查是否对用户敏感信息进行脱敏处理（隐私保护）
          4. 检查是否支持会话标识和用户标识的关联
          5. 检查是否有适当的采样率控制（避免全量收集导致性能问题）
          6. 检查是否支持离线缓存和重试机制
          返回格式：{"passed": true/false, "reason": "详细解释"}
        context_files:
          - "ui/web-client/src/analytics/tracking/Tracker.ts"
          - "ui/web-client/src/analytics/tracking/EventQueue.ts"
          - "ui/web-client/src/analytics/tracking/privacy.ts"
