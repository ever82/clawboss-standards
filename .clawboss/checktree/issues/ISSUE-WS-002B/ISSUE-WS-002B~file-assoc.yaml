id: "ISSUE-WS-002B"
issue_number: 3
title: "文件关联管理"
slug: "file-assoc"
status: "pending"
description: |
  实现文件关联管理功能，支持将外部文件与行为记录关联。
  文件关联允许用户附加文档、图片、音频等资源到行为，丰富行为记录的上下文。

  核心功能：
  1. 文件与行为关联（多对多关系）
  2. 文件元数据管理（名称、类型、大小、哈希）
  3. 文件存储管理（本地存储、相对路径）
  4. 文件版本追踪（同一文件的多版本）
  5. 文件同步和完整性检查
  6. 文件批量操作（导入、导出、迁移）

  技术要求：
  - 基于 WS-001 工作空间核心服务
  - 支持 WS-002A 的文件夹结构作为存储路径
  - 文件内容哈希用于去重和完整性验证
  - 支持大文件分块处理
is_parent: false
prerequisites:
  - "ISSUE-WS-001"
  - "ISSUE-WS-002A"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-WS-002B~criterion-1"
    name: "文件关联实体与类型定义"
    description: |
      定义文件关联相关实体：
      - FileAttachment 文件附件实体：
        - id, behaviorId, fileId
        - displayName, description
        - createdAt, updatedAt
        - order（在同行为中的排序）
      - FileMetadata 文件元数据实体：
        - id, workspaceId, folderId
        - originalName, storageName
        - mimeType, size, hash (SHA-256)
        - storagePath（相对路径）
        - versionNumber
        - previousVersionId
      - FileAssociation 关联类型：
        - attachment（附件）
        - reference（引用）
        - inline（内嵌）

      类型定义需包含：
      - 实体接口和 DTO
      - FileAssociationType 枚举
      - 文件类型分类枚举（document, image, audio, video, other）
      - 文件大小限制常量
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/file/entities/"
        test_files:
          - "src/workspace/file/entities/file-attachment.entity.test.ts"
          - "src/workspace/file/entities/file-metadata.entity.test.ts"
          - "src/workspace/file/dto/create-file-attachment.dto.test.ts"
      integration:
        command: "npm test -- src/workspace/file/file.type.integration.test.ts"
        test_files:
          - "src/workspace/file/file.type.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- file-types"
        test_files:
          - "tests/e2e/workspace/file/file-types.e2e.test.ts"
      ai:
        prompt: |
          请验证文件关联实体的定义完整性：
          1. 检查 FileAttachment 实体是否包含：
             - id, behaviorId, fileId
             - displayName（用户可修改的显示名）
             - description（可选描述）
             - order（同行为内的排序，整数）
             - createdAt, updatedAt
          2. 检查 FileMetadata 实体是否包含：
             - id, workspaceId, folderId（可为null，表示按行为组织）
             - originalName（原始文件名）
             - storageName（存储用的唯一文件名，UUID）
             - mimeType, size（字节）, hash（SHA-256）
             - storagePath（相对工作空间的路径）
             - versionNumber（从1开始的整数）
             - previousVersionId（指向旧版本，可为null）
          3. 检查 FileAssociationType 枚举：attachment, reference, inline
          4. 检查 FileCategory 枚举：document, image, audio, video, other
          5. 检查是否有文件大小限制常量（如 MAX_FILE_SIZE = 100MB）
          6. 检查 DTO 是否有适当的验证装饰器
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/file/entities/file-attachment.entity.ts"
          - "src/workspace/file/entities/file-metadata.entity.ts"
          - "src/workspace/file/enums/file-association-type.enum.ts"
          - "src/workspace/file/enums/file-category.enum.ts"
          - "src/workspace/file/constants/file-limits.const.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"

  - id: "ISSUE-WS-002B~criterion-2"
    name: "文件存储与 Repository 实现"
    description: |
      实现文件存储管理和 Repository 层：

      FileMetadataRepository：
      - findByWorkspaceId(workspaceId): 获取工作空间的所有文件
      - findByHash(hash): 根据哈希查找（去重）
      - findByFolderId(folderId): 获取文件夹内文件
      - create(data): 创建文件元数据
      - update(id, data): 更新元数据
      - delete(id): 删除文件元数据
      - getVersions(fileId): 获取文件的所有版本

      FileAttachmentRepository：
      - findByBehaviorId(behaviorId): 获取行为的所有附件
      - findByFileId(fileId): 查找引用此文件的所有行为
      - attach(data): 关联文件到行为
      - detach(behaviorId, fileId): 解除关联
      - updateOrder(behaviorId, fileOrders): 更新排序
      - getAttachmentCount(behaviorId): 获取行为的附件数量

      存储管理：
      - 计算存储路径：.ai-me/files/{category}/{year}/{month}/{storageName}
      - 维护文件哈希索引（去重）
      - 版本管理（保留历史版本）
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/file/repositories/"
        test_files:
          - "src/workspace/file/repositories/file-metadata.repository.test.ts"
          - "src/workspace/file/repositories/file-attachment.repository.test.ts"
      integration:
        command: "npm test -- src/workspace/file/file.repository.integration.test.ts"
        test_files:
          - "src/workspace/file/file.repository.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- file-repository"
        test_files:
          - "tests/e2e/workspace/file/file-repository.e2e.test.ts"
      ai:
        prompt: |
          请验证文件 Repository 的实现：
          1. 检查 FileMetadataRepository 是否实现了：
             - findByHash 用于去重检测
             - getVersions 返回按 versionNumber 排序的版本列表
             - 是否使用 hash 字段建立了索引
          2. 检查 FileAttachmentRepository 是否实现了：
             - attach 创建关联
             - detach 删除关联（不删除文件本身）
             - updateOrder 批量更新排序
             - 是否防止重复关联同一文件到同一行为
          3. 检查存储路径计算逻辑：
             - 路径格式：.ai-me/files/{category}/{year}/{month}/{storageName}
             - category 基于 mimeType 自动分类
             - storageName 使用 UUID 避免冲突
          4. 检查事务处理：
             - 创建文件元数据时是否原子操作
             - 更新排序时是否批量更新
          5. 检查数据库约束：
             - file_attachments 表是否有唯一约束 (behavior_id, file_id)
             - file_metadata 表是否有索引 on hash 和 workspace_id
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/file/repositories/file-metadata.repository.ts"
          - "src/workspace/file/repositories/file-attachment.repository.ts"
          - "src/workspace/file/utils/storage-path.util.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"
    prerequisites:
      - "ISSUE-WS-002B~criterion-1"

  - id: "ISSUE-WS-002B~criterion-3"
    name: "文件服务层与业务逻辑"
    description: |
      实现 FileService 业务逻辑层：
      - uploadFile: 上传文件（支持单文件和多文件）
        - 验证文件类型和大小
        - 计算文件哈希（SHA-256）
        - 检查重复（基于哈希）
        - 生成存储路径
        - 保存到物理存储
        - 创建元数据记录
      - attachToBehavior: 关联文件到行为
      - detachFromBehavior: 从行为解除关联
      - deleteFile: 删除文件（检查是否被引用）
      - downloadFile: 下载文件（返回文件流/路径）
      - getFilePreview: 获取文件预览信息
      - getBehaviorAttachments: 获取行为的附件列表
      - reorderAttachments: 重新排序附件
      - importFiles: 批量导入文件
      - exportFiles: 批量导出文件到指定目录

      支持的验证：
      - 文件类型白名单（可配置）
      - 单文件大小限制（默认 100MB）
      - 单行为附件数量限制（默认 20）
      - 工作空间总存储限制（可配置）
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/file/services/file.service.test.ts"
        test_files:
          - "src/workspace/file/services/file.service.test.ts"
      integration:
        command: "npm test -- src/workspace/file/file.service.integration.test.ts"
        test_files:
          - "src/workspace/file/file.service.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- file-service"
        test_files:
          - "tests/e2e/workspace/file/file-service.e2e.test.ts"
      ai:
        prompt: |
          请验证 FileService 业务逻辑实现：
          1. 检查 uploadFile 是否：
             - 验证文件类型（检查 mimeType 在白名单中）
             - 验证文件大小（不超过 MAX_FILE_SIZE）
             - 使用 crypto 计算 SHA-256 哈希
             - 检查 hash 是否已存在（去重）
             - 生成 storagePath 并保存文件
             - 返回 FileMetadata
          2. 检查 attachToBehavior 是否：
             - 检查行为是否存在
             - 检查文件是否存在
             - 验证附件数量未超过限制
             - 自动设置 order 为当前最大 order + 1
          3. 检查 deleteFile 是否：
             - 检查文件是否被其他行为引用
             - 如无引用，删除物理文件和元数据
             - 如有引用，只标记为待删除
          4. 检查文件类型白名单是否可配置（从 workspace config 读取）
          5. 检查大文件处理是否使用流式读写
          6. 检查是否记录了文件操作日志
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/file/services/file.service.ts"
          - "src/workspace/file/services/file.service.interface.ts"
          - "src/workspace/file/validators/file.validator.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"
    prerequisites:
      - "ISSUE-WS-002B~criterion-2"

  - id: "ISSUE-WS-002B~criterion-4"
    name: "文件哈希与去重机制"
    description: |
      实现文件哈希计算和去重机制：
      - HashCalculator: 计算文件 SHA-256 哈希
        - 支持流式计算（大文件不占用大量内存）
        - 支持分块计算（进度追踪）
        - 缓存常用文件的哈希
      - DuplicateDetector: 重复文件检测
        - 快速模式：仅比较哈希
        - 深度模式：哈希 + 字节级比较
        - 相似度检测（图片的感知哈希）
      - DeduplicationService: 去重服务
        - 自动去重（上传时检测）
        - 手动去重（扫描工作空间）
        - 生成去重报告
        - 硬链接替换（节省空间）

      性能要求：
      - 1MB 文件哈希计算 < 10ms
      - 100MB 文件哈希计算 < 500ms
      - 支持并发计算多个文件
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/file/utils/hash-calculator.test.ts"
        test_files:
          - "src/workspace/file/utils/hash-calculator.test.ts"
          - "src/workspace/file/services/deduplication.service.test.ts"
      integration:
        command: "npm test -- src/workspace/file/file-deduplication.integration.test.ts"
        test_files:
          - "src/workspace/file/file-deduplication.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- file-deduplication"
        test_files:
          - "tests/e2e/workspace/file/file-deduplication.e2e.test.ts"
      ai:
        prompt: |
          请验证文件哈希和去重机制实现：
          1. 检查 HashCalculator 是否：
             - 使用 crypto.createHash('sha256')
             - 使用 fs.createReadStream 流式读取
             - pipe 到 hash 对象，不占用大量内存
             - 正确处理大文件（测试 100MB）
             - 返回 64 字符的十六进制哈希字符串
          2. 检查 DuplicateDetector 是否实现：
             - findDuplicatesByHash：返回哈希相同的文件组
             - compareByteLevel：字节级精确比较
             - 图片感知哈希（可选，使用 phash）
          3. 检查 DeduplicationService 是否：
             - 在 uploadFile 时自动检测重复
             - 重复文件创建新引用而非新副本
             - scanForDuplicates 扫描整个工作空间
             - 生成包含重复文件列表的报告
          4. 检查性能：
             - 是否有哈希缓存机制
             - 是否支持并发计算
          5. 检查测试是否包含已知哈希值验证
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/file/utils/hash-calculator.ts"
          - "src/workspace/file/services/deduplication.service.ts"
          - "src/workspace/file/utils/duplicate-detector.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-WS-002B~criterion-3"

  - id: "ISSUE-WS-002B~criterion-5"
    name: "文件异常处理与完整性检查"
    description: |
      实现文件模块的异常处理和完整性检查：
      - FileNotFoundError: 文件不存在（物理或元数据）
      - FileTooLargeError: 文件超过大小限制
      - FileTypeNotAllowedError: 文件类型不在白名单
      - DuplicateFileError: 检测到重复文件（非错误，需处理）
      - FileCorruptedError: 文件损坏（哈希不匹配）
      - StorageFullError: 存储空间不足
      - AttachmentLimitExceededError: 附件数量超限
      - FileInUseError: 文件正在被使用

      完整性检查：
      - verifyFileIntegrity: 验证文件哈希是否匹配
      - scanOrphanedFiles: 扫描孤儿文件（物理存在但无元数据）
      - scanMissingFiles: 扫描缺失文件（元数据存在但物理缺失）
      - repairFileRecords: 修复不一致的记录

      定期任务：
      - 每日完整性扫描
      - 每周去重扫描
      - 每月存储统计
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/file/exceptions/ src/workspace/file/services/integrity.service.test.ts"
        test_files:
          - "src/workspace/file/exceptions/file-not-found.error.test.ts"
          - "src/workspace/file/exceptions/file-too-large.error.test.ts"
          - "src/workspace/file/services/integrity.service.test.ts"
      integration:
        command: "npm test -- src/workspace/file/file-integrity.integration.test.ts"
        test_files:
          - "src/workspace/file/file-integrity.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- file-integrity"
        test_files:
          - "tests/e2e/workspace/file/file-integrity.e2e.test.ts"
      ai:
        prompt: |
          请验证文件异常处理和完整性检查：
          1. 检查是否定义了所有异常类：
             - FileNotFoundError (404)
             - FileTooLargeError (413)
             - FileTypeNotAllowedError (415)
             - FileCorruptedError (422)
             - StorageFullError (507)
             - AttachmentLimitExceededError (422)
             - FileInUseError (423)
          2. 检查 FileIntegrityService 是否实现：
             - verifyFileIntegrity(fileId): 重新计算哈希并与 stored hash 比较
             - scanOrphanedFiles(): 返回物理存在但无元数据的文件列表
             - scanMissingFiles(): 返回元数据存在但物理缺失的文件列表
             - repairFileRecords(): 修复不一致记录（删除孤儿元数据或文件）
          3. 检查异常类是否包含足够上下文：
             - 文件路径、大小、类型
             - 期望的 vs 实际的哈希值
             - 存储限制信息
          4. 检查完整性扫描的性能：
             - 是否支持增量扫描
             - 是否可配置扫描范围
          5. 检查是否有定期任务配置（使用 node-cron 或类似）
          6. 检查是否记录了完整性检查日志
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/file/exceptions/"
          - "src/workspace/file/services/integrity.service.ts"
          - "src/workspace/file/scheduler/file-integrity.scheduler.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-WS-002B~criterion-4"
