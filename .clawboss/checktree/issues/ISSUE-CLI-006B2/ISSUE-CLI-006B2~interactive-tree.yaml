criteria:
  - id: "ISSUE-CLI-006B2~criterion-1"
    name: "交互式树浏览器"
    description: |
      实现交互式树浏览器，支持在终端中可视化浏览、展开折叠、导航树结构。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/interactive/tree/browser.test.ts"
        test_files:
          - "src/cli/interactive/tree/browser.test.ts"
      integration:
        command: "npm test -- src/cli/interactive/tree/browser.integration.test.ts"
        test_files:
          - "src/cli/interactive/tree/browser.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/interactive/tree-browser"
        test_files:
          - "e2e/cli/interactive/tree/browser.spec.ts"
      ai:
        prompt: |
          请验证交互式树浏览器的实现:
          1. 启动浏览器: `ai-me tree browse` 或 `ai-me tree interactive`
          2. 树形展示: ASCII艺术展示层级结构，带连接线
          3. 展开折叠: 空格或Enter展开/折叠节点
          4. 节点导航: 上下箭头在节点间移动，左右进入/退出层级
          5. 全部展开: 按 * 展开所有节点
          6. 全部折叠: 按 / 只显示顶级节点
          7. 节点详情: 选中节点右侧或下方显示详情
          8. 状态指示: 图标或颜色表示行为状态(todo/doing/done)
          9. 搜索: /键打开搜索，实时过滤节点

          检查点:
          - 大树滚动流畅，不卡顿
          - 层级连接线对齐正确
          - 节点状态图标清晰可辨

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/interactive/tree/browser.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

  - id: "ISSUE-CLI-006B2~criterion-2"
    name: "交互式节点编辑"
    description: |
      在树浏览器中直接编辑节点，支持重命名、修改属性、添加子节点等操作。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/interactive/tree/edit.test.ts"
        test_files:
          - "src/cli/interactive/tree/edit.test.ts"
      integration:
        command: "npm test -- src/cli/interactive/tree/edit.integration.test.ts"
        test_files:
          - "src/cli/interactive/tree/edit.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/interactive/tree-edit"
        test_files:
          - "e2e/cli/interactive/tree/edit.spec.ts"
      ai:
        prompt: |
          请验证交互式节点编辑功能的实现:
          1. 重命名: 选中节点按r键，内联编辑名称
          2. 编辑详情: 按e键打开行为编辑界面
          3. 添加子节点: 按a键在选中节点下添加子行为
          4. 删除节点: 按d键删除，有确认提示
          5. 修改状态: 按s键快速切换状态
          6. 设置优先级: 按p键选择优先级
          7. 批量编辑: 多选节点后批量修改属性
          8. 撤销操作: 按u键撤销最近的操作
          9. 保存/取消: 编辑后可保存或取消

          检查点:
          - 内联编辑时树结构保持稳定
          - 删除前有子节点的警告提示
          - 批量编辑时显示影响范围

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/interactive/tree/edit.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites:
      - "ISSUE-CLI-006B2~criterion-1"

  - id: "ISSUE-CLI-006B2~criterion-3"
    name: "交互式树重组"
    description: |
      实现可视化的树重组功能，支持拖拽或快捷键移动节点，实时预览重组结果。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/interactive/tree/reorganize.test.ts"
        test_files:
          - "src/cli/interactive/tree/reorganize.test.ts"
      integration:
        command: "npm test -- src/cli/interactive/tree/reorganize.integration.test.ts"
        test_files:
          - "src/cli/interactive/tree/reorganize.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/interactive/tree-reorganize"
        test_files:
          - "e2e/cli/interactive/tree/reorganize.spec.ts"
      ai:
        prompt: |
          请验证交互式树重组功能的实现:
          1. 选择移动: 选中节点按m键进入移动模式
          2. 目标选择: 使用箭头选择目标父节点
          3. 位置指定: 可选择插入位置(first/last/before/after)
          4. 视觉反馈: 目标位置有视觉指示(高亮、占位符)
          5. 快捷键: Ctrl+↑/↓ 快速上下移动同级节点
          6. 提升/降级: Tab降级(成为子节点), Shift+Tab提升
          7. 批量移动: 多选节点后批量移动
          8. 循环检测: 阻止会形成循环的移动操作
          9. 确认: 按Enter确认移动，Esc取消

          检查点:
          - 移动操作可预览，确认后才生效
          - 循环依赖被阻止并给出提示
          - 移动后树结构立即更新

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/interactive/tree/reorganize.ts"
          - "src/core/services/tree/move.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites:
      - "ISSUE-CLI-006B2~criterion-2"
      - "ISSUE-CORE-003C"

  - id: "ISSUE-CLI-006B2~criterion-4"
    name: "树快照与对比"
    description: |
      实现树快照保存和对比功能，支持保存树的当前状态并与历史快照对比。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/interactive/tree/snapshot.test.ts"
        test_files:
          - "src/cli/interactive/tree/snapshot.test.ts"
      integration:
        command: "npm test -- src/cli/interactive/tree/snapshot.integration.test.ts"
        test_files:
          - "src/cli/interactive/tree/snapshot.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/interactive/tree-snapshot"
        test_files:
          - "e2e/cli/interactive/tree/snapshot.spec.ts"
      ai:
        prompt: |
          请验证树快照与对比功能的实现:
          1. 创建快照: 在浏览器中按S键创建快照，输入名称
          2. 列出快照: 显示所有历史快照和时间戳
          3. 恢复快照: 选择历史快照恢复树状态
          4. 对比视图: 并排或差异视图对比两个快照
          5. 差异标记: 新增(+)、删除(-)、修改(~)的节点
          6. 快照详情: 查看快照包含的节点数量和结构
          7. 删除快照: 删除不再需要的历史快照
          8. 自动快照: 重大操作前自动创建快照

          检查点:
          - 快照保存完整树状态
          - 对比视图清晰显示差异
          - 恢复操作可撤销

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/interactive/tree/snapshot.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites:
      - "ISSUE-CLI-006B2~criterion-3"
