      ai:
        prompt: |
          请验证分发渠道配置是否符合以下要求：
          1. GitHub Releases自动发布是否配置完成（含Release Note模板）
          2. npm registry发布配置是否正确（package.json、.npmignore）
          3. Homebrew formula生成和更新机制是否实现
