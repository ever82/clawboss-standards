  - id: "ISSUE-DEPLOY-001~criterion-5"
    name: "构建产物验证与签名"
    description: "实现构建产物的完整性验证和代码签名机制，确保分发安全"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- tests/unit/deploy/artifact-verification.test.ts"
        test_files:
          - "tests/unit/deploy/artifact-verification.test.ts"
      integration:
        command: "npm run test:integration -- tests/integration/deploy/signing-verification.test.ts"
        test_files:
          - "tests/integration/deploy/signing-verification.test.ts"
      e2e:
        command: "npm run test:e2e -- tests/e2e/deploy/secure-distribution.test.ts"
        test_files:
          - "tests/e2e/deploy/secure-distribution.test.ts"
      ai:
        prompt: |
          请验证构建产物验证与签名机制是否符合以下要求：
          1. 是否生成SHA256校验和文件用于完整性验证
          2. Windows可执行文件是否支持代码签名（Authenticode）
          3. macOS应用是否支持代码签名和公证（Notarization）
          4. 签名证书管理是否安全（环境变量或密钥管理服务）
          5. 是否提供签名验证脚本供用户验证下载文件
          6. 构建产物是否经过病毒扫描
          返回格式: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "scripts/signing/sign-artifacts.ts"
          - "scripts/signing/verify-signatures.ts"
          - "scripts/security/virus-scan.ts"
          - ".github/workflows/sign-and-publish.yml"
        model: "claude-sonnet-4-6"
    execution_time: "<2 minutes"
