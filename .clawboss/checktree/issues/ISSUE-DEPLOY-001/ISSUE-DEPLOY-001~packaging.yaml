id: "ISSUE-DEPLOY-001"
issue_number: 1
title: "打包与分发"
slug: "packaging"
module: "DEPLOY"
status: "pending"
description: |
  实现项目的打包与分发系统，支持多种平台（Windows、macOS、Linux）的二进制分发。
  包括构建脚本、安装包生成、版本管理和分发渠道配置。
  确保用户可以通过简单的命令或下载安装包快速部署应用。
is_parent: false
prerequisites:
  - "ISSUE-INFRA-004"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-DEPLOY-001~criterion-1"
    name: "多平台构建脚本实现"
    description: "实现支持Windows、macOS、Linux的自动化构建脚本，能够生成对应平台的可执行文件"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- tests/unit/deploy/build-script.test.ts"
        test_files:
          - "tests/unit/deploy/build-script.test.ts"
      integration:
        command: "npm run test:integration -- tests/integration/deploy/build-pipeline.test.ts"
        test_files:
          - "tests/integration/deploy/build-pipeline.test.ts"
      e2e:
        command: "npm run test:e2e -- tests/e2e/deploy/cross-platform-build.test.ts"
        test_files:
          - "tests/e2e/deploy/cross-platform-build.test.ts"
      ai:
        prompt: |
          请验证多平台构建脚本实现是否符合以下要求：
          1. 构建脚本是否支持Windows(.exe)、macOS(.app)、Linux(二进制)三种平台
          2. 脚本是否能够自动检测当前平台并执行对应的构建流程
          3. 构建产物是否包含正确的版本信息和元数据
          4. 构建过程是否有清晰的进度输出和错误处理
          5. 构建产物是否经过压缩和优化
          返回格式: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "scripts/build/build.sh"
          - "scripts/build/build.ps1"
          - "package.json"
        model: "claude-sonnet-4-6"
    execution_time: "<2 minutes"

  - id: "ISSUE-DEPLOY-001~criterion-2"
    name: "安装包生成器"
    description: "实现安装包生成器，支持生成.msi(Windows)、.dmg(macOS)、.deb/.rpm(Linux)格式的安装包"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- tests/unit/deploy/packager.test.ts"
        test_files:
          - "tests/unit/deploy/packager.test.ts"
      integration:
        command: "npm run test:integration -- tests/integration/deploy/packaging.test.ts"
        test_files:
          - "tests/integration/deploy/packaging.test.ts"
      e2e:
        command: "npm run test:e2e -- tests/e2e/deploy/installer-creation.test.ts"
        test_files:
          - "tests/e2e/deploy/installer-creation.test.ts"
      ai:
        prompt: |
          请验证安装包生成器实现是否符合以下要求：
          1. 是否支持生成Windows MSI安装程序（含卸载功能）
          2. 是否支持生成macOS DMG镜像（含拖拽安装）
          3. 是否支持生成Linux deb和rpm包
          4. 安装包是否包含正确的元数据（应用名称、版本、描述、图标）
          5. 安装包是否经过签名验证（如适用）
          6. 安装过程是否支持自定义安装路径和组件选择
          返回格式: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "scripts/packaging/create-installer.ts"
          - "scripts/packaging/config.yaml"
          - "resources/installer/"
        model: "claude-sonnet-4-6"
    execution_time: "<3 minutes"

  - id: "ISSUE-DEPLOY-001~criterion-3"
    name: "版本管理与发布工具"
    description: "实现版本管理和发布工具，支持语义化版本控制、变更日志生成和Git标签管理"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- tests/unit/deploy/version-manager.test.ts"
        test_files:
          - "tests/unit/deploy/version-manager.test.ts"
      integration:
        command: "npm run test:integration -- tests/integration/deploy/version-release.test.ts"
        test_files:
          - "tests/integration/deploy/version-release.test.ts"
      e2e:
        command: "npm run test:e2e -- tests/e2e/deploy/release-workflow.test.ts"
        test_files:
          - "tests/e2e/deploy/release-workflow.test.ts"
      ai:
        prompt: |
          请验证版本管理与发布工具实现是否符合以下要求：
          1. 是否支持语义化版本控制（MAJOR.MINOR.PATCH）
          2. 是否能够自动生成变更日志（基于Git提交历史）
          3. 是否能够自动创建Git标签并与版本关联
          4. 是否支持预发布版本（alpha、beta、rc）管理
          5. 版本升级脚本是否能够正确执行数据库迁移和配置更新
          6. 是否提供版本回滚机制
          返回格式: {"passed": true/false, "reason": "详细解释"}
