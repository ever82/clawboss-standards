          - "scripts/release/version-manager.ts"
          - "scripts/release/changelog-generator.ts"
          - "scripts/release/release.sh"
        model: "claude-sonnet-4-6"
    execution_time: "<2 minutes"

  - id: "ISSUE-DEPLOY-001~criterion-4"
    name: "分发渠道配置"
    description: "配置分发渠道，包括GitHub Releases、npm registry、Homebrew、Scoop等包管理器"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- tests/unit/deploy/distribution.test.ts"
        test_files:
          - "tests/unit/deploy/distribution.test.ts"
      integration:
        command: "npm run test:integration -- tests/integration/deploy/distribution-channels.test.ts"
        test_files:
          - "tests/integration/deploy/distribution-channels.test.ts"
      e2e:
        command: "npm run test:e2e -- tests/e2e/deploy/publish-workflow.test.ts"
