  - id: "ISSUE-CLI-008~criterion-5"
    name: "搜索性能优化"
    description: |
      实现搜索性能优化功能，包括搜索缓存、异步搜索、结果流式输出。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/search/performance.test.ts"
        test_files:
          - "src/cli/commands/search/performance.test.ts"
      integration:
        command: "npm test -- src/cli/commands/search/performance.integration.test.ts"
        test_files:
          - "src/cli/commands/search/performance.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/search/performance"
        test_files:
          - "e2e/cli/search/performance.spec.ts"
      ai:
        prompt: |
          请验证搜索性能优化功能的实现:
          1. 搜索缓存: 相同查询缓存结果，提高重复搜索速度
          2. 缓存控制: `--no-cache` 绕过缓存进行搜索
          3. 异步搜索: 大查询使用异步处理，不阻塞CLI
          4. 流式输出: `--stream` 实时显示找到的结果
          5. 超时控制: `--timeout 30` 设置搜索超时时间
          6. 进度指示: 大搜索显示进度条或加载动画
          7. 搜索统计: `--stats` 显示索引命中率和查询性能
          8. 并发限制: 控制同时进行的搜索数量

          检查点:
          - 缓存命中率可监控
          - 流式输出顺序正确
          - 超时后优雅降级

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
