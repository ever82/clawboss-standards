          6. 邮件发送: `--email user@example.com` 发送搜索结果
          7. 复制到剪贴板: `--copy` 复制结果到系统剪贴板
          8. 打印友好: `--print` 生成打印友好的格式

          检查点:
          - 导出格式正确，数据完整
          - 大结果集导出显示进度
          - 导出文件编码正确(UTF-8)

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
