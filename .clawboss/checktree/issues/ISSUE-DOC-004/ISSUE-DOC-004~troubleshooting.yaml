criteria:
  - id: "ISSUE-DOC-004~criterion-1"
    name: "错误码文档完成"
    description: |
      提供完整的错误码参考文档，包含每个错误码的含义、触发场景、
      解决方案和预防措施。错误码需与INFRA-006A错误处理系统的实现保持一致。
    status: "pending"
    coverage:
      unit: not_needed
      integration: not_needed
      e2e: not_needed
      ai: sufficient
      manual: sufficient
    verification:
      ai:
        prompt: |
          请验证错误码文档质量:
          1. 是否覆盖所有已定义的错误码
          2. 错误码格式是否统一（如E1001）
          3. 每个错误码的描述是否清晰准确
          4. 触发场景是否具体可理解
          5. 解决方案是否可操作有效
          6. 与INFRA-006A的代码实现是否一致
          7. 是否按模块或类别分组，便于查找
          返回: {"passed": true/false, "reason": "详细说明", "issues": ["问题列表"]}
        context_files: ["docs/troubleshooting/error-codes.md", "src/infrastructure/error/"]
        model: "claude-sonnet-4-6"
      manual:
        instructions: |
          1. 从代码中提取所有错误码定义
          2. 对比文档，检查是否有遗漏
          3. 随机选择5个错误码，验证解决方案有效性
          4. 测试错误码搜索功能
        required_tools: ["terminal", "grep", "code-editor"]
    execution_time: "<15 minutes"
    prerequisites: []

