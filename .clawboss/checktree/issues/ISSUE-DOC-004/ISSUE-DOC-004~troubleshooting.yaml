    description: |
      编写日志诊断指南，教用户如何使用INFRA-006B日志系统定位问题。
      包含日志级别说明、日志位置、常见日志模式分析、调试日志启用方法。
    status: "pending"
    coverage:
      unit: not_needed
      integration: not_needed
      e2e: not_needed
      ai: sufficient
      manual: sufficient
    verification:
      ai:
        prompt: |
          请验证日志诊断指南质量:
          1. 日志级别说明是否与实现一致（DEBUG/INFO/WARN/ERROR）
          2. 日志文件位置是否准确（各平台）
          3. 是否包含日志配置修改方法
          4. 常见日志模式分析是否有示例
          5. 调试日志启用步骤是否清晰
          6. 日志轮转和清理是否说明
          返回: {"passed": true/false, "reason": "详细说明"}
        context_files: ["docs/troubleshooting/logging.md", "src/infrastructure/logging/"]
        model: "claude-sonnet-4-6"
      manual:
        instructions: |
          1. 按照指南找到并查看日志文件
          2. 启用DEBUG级别日志，验证配置生效
          3. 模拟一个错误，检查日志记录是否符合指南描述
          4. 使用指南中的方法分析日志定位问题
        required_tools: ["terminal", "ai-me-cli"]
    execution_time: "<15 minutes"
    prerequisites: []

  - id: "ISSUE-DOC-004~criterion-3"
    name: "常见问题FAQ完成"
