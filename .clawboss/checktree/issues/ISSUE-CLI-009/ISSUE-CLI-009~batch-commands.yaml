          8. 状态校验: 验证状态流转是否合法
          9. 批量进度: `ai-me batch progress 50 --status doing`

          检查点:
          - 状态流转验证正确
          - 批量操作事务性(全部成功或回滚)
          - 结果报告清晰完整

