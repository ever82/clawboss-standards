criteria:
  - id: "ISSUE-CLI-009~criterion-1"
    name: "批量创建与更新"
    description: |
      实现批量创建和更新行为的命令，支持从文件导入批量数据，显示进度和结果统计。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/batch/create-update.test.ts"
        test_files:
          - "src/cli/commands/batch/create.test.ts"
          - "src/cli/commands/batch/update.test.ts"
      integration:
        command: "npm test -- src/cli/commands/batch/integration.test.ts"
        test_files:
          - "src/cli/commands/batch/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/batch/create-update"
        test_files:
          - "e2e/cli/batch/create.spec.ts"
          - "e2e/cli/batch/update.spec.ts"
      ai:
        prompt: |
          请验证批量创建与更新功能的实现:
          1. 批量创建: `ai-me batch create --file behaviors.json`
          2. 文件格式: 支持JSON、YAML、CSV格式
          3. 字段映射: `--mapping "csv_column:field_name"` 自定义映射
          4. 预览模式: `--dry-run` 预览将要创建的行为
          5. 批量更新: `ai-me batch update --file updates.json`
          6. 部分更新: 只更新文件中指定的字段
          7. 进度显示: 显示处理进度(如 "Processing: 45/100")
          8. 结果报告: 完成后显示成功数、失败数、错误详情
          9. 事务支持: `--transaction` 失败时全部回滚

          检查点:
          - 与CORE-008批量服务正确集成
          - 文件解析错误有清晰的行号和原因
          - 部分失败时继续处理其他项

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/batch/create.ts"
          - "src/cli/commands/batch/update.ts"
          - "src/core/services/batch/manager.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

  - id: "ISSUE-CLI-009~criterion-2"
    name: "批量删除与归档"
    description: |
      实现批量删除和归档行为的命令，支持条件删除、安全确认、归档恢复。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/batch/delete.test.ts"
        test_files:
          - "src/cli/commands/batch/delete.test.ts"
          - "src/cli/commands/batch/archive.test.ts"
      integration:
        command: "npm test -- src/cli/commands/batch/delete.integration.test.ts"
        test_files:
          - "src/cli/commands/batch/delete.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/batch/delete-archive"
        test_files:
          - "e2e/cli/batch/delete.spec.ts"
          - "e2e/cli/batch/archive.spec.ts"
      ai:
        prompt: |
          请验证批量删除与归档功能的实现:
          1. 条件删除: `ai-me batch delete --status done --before "2026-01-01"`
          2. ID列表删除: `ai-me batch delete --ids id1,id2,id3`
          3. 安全确认: 删除前显示影响范围，要求确认
          4. 强制删除: `--force` 跳过确认提示
          5. 批量归档: `ai-me batch archive --status done`
          6. 归档恢复: `ai-me batch restore --from-archive`
          7. 软删除: 默认使用软删除，可恢复
          8. 硬删除: `--hard` 永久删除，再次确认
          9. 撤销支持: 删除操作支持 `ai-me undo`

          检查点:
          - 删除前有明确的数据丢失警告
          - 批量操作显示预计影响数量
          - 硬删除操作需要额外确认

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/batch/delete.ts"
          - "src/cli/commands/batch/archive.ts"
          - "src/core/services/batch/manager.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites:
      - "ISSUE-CLI-009~criterion-1"

