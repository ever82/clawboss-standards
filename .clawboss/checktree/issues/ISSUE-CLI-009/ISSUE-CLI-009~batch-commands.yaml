          - "src/cli/commands/batch/tag.test.ts"
      integration:
        command: "npm test -- src/cli/commands/batch/status.integration.test.ts"
        test_files:
          - "src/cli/commands/batch/status.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/batch/status-tag"
        test_files:
          - "e2e/cli/batch/status.spec.ts"
          - "e2e/cli/batch/tag.spec.ts"
      ai:
        prompt: |
          请验证批量状态与标签管理功能的实现:
          1. 批量状态变更: `ai-me batch status --to doing --status todo`
          2. 批量添加标签: `ai-me batch tag add --tag urgent --priority high`
          3. 批量移除标签: `ai-me batch tag remove --tag old-tag --status done`
          4. 条件筛选: 结合搜索条件筛选目标行为
          5. 预览模式: `--dry-run` 显示将要修改的行为列表
