  - id: "ISSUE-CLI-009~criterion-5"
    name: "批量任务计划"
    description: |
      实现批量任务计划功能，支持定时执行批量操作、批量任务队列管理。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/batch/schedule.test.ts"
        test_files:
          - "src/cli/commands/batch/schedule.test.ts"
      integration:
        command: "npm test -- src/cli/commands/batch/schedule.integration.test.ts"
        test_files:
          - "src/cli/commands/batch/schedule.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/batch/schedule"
        test_files:
          - "e2e/cli/batch/schedule.spec.ts"
      ai:
        prompt: |
          请验证批量任务计划功能的实现:
          1. 计划任务: `ai-me batch schedule --name "cleanup" --command "delete --status done" --cron "0 0 * * 0"`
          2. 任务列表: `ai-me batch schedule list` 显示所有计划任务
          3. 任务详情: `ai-me batch schedule info <name>` 显示任务详情
          4. 启用/禁用: `ai-me batch schedule enable|disable <name>`
