  - id: "ISSUE-CLI-013~criterion-4"
    name: "命令历史与重复"
    description: |
      实现命令历史记录和快速重复功能，提高命令行使用效率。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/history/*.test.ts"
        test_files:
          - "src/cli/commands/history/list.test.ts"
          - "src/cli/commands/history/run.test.ts"
      integration:
        command: "npm test -- src/cli/commands/history/integration.test.ts"
        test_files:
          - "src/cli/commands/history/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/history"
        test_files:
          - "e2e/cli/history/list.spec.ts"
          - "e2e/cli/history/run.spec.ts"
      ai:
        prompt: |
          请验证命令历史与重复功能的实现:
          1. 历史列表: `ai-me history` 或 `ai-me hist` 显示命令历史
          2. 过滤历史: `ai-me history --search "behavior"` 搜索历史
          3. 执行历史: `ai-me history run 5` 执行历史第5条
          4. 上次命令: `ai-me !!` 或 `ai-me repeat` 执行上条命令
          5. 历史编辑: `ai-me history edit 5` 编辑后执行
          6. 历史删除: `ai-me history delete 5` 删除历史条目
          7. 历史清除: `ai-me history clear` 清除所有历史
          8. 历史导出: `ai-me history export --output history.txt`
          9. 统计: `ai-me history stats` 显示使用统计

          检查点:
          - 历史记录持久化
          - 敏感命令(含密码)被过滤
          - 历史数量可配置

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/history/index.ts"
          - "src/cli/history/manager.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites:
      - "ISSUE-CLI-013~criterion-1"

