id: "ISSUE-CLI-013"
issue_number: 13
slug: "shortcut-aliases"
title: "快捷命令与别名系统"
description: |
  实现AI-Me CLI的快捷命令和别名系统，支持用户自定义命令缩写、别名链、宏命令等，提高使用效率。
  依赖CLI-001B命令路由系统。
status: "pending"
is_parent: false
sub_issues: []
prerequisites:
  - "ISSUE-CLI-001B"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-CLI-013~criterion-1"
    name: "命令别名管理"
    description: |
      实现命令别名功能，支持创建、查看、删除命令别名。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/alias/*.test.ts"
        test_files:
          - "src/cli/commands/alias/create.test.ts"
          - "src/cli/commands/alias/list.test.ts"
          - "src/cli/commands/alias/delete.test.ts"
      integration:
        command: "npm test -- src/cli/commands/alias/integration.test.ts"
        test_files:
          - "src/cli/commands/alias/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/alias"
        test_files:
          - "e2e/cli/alias/create.spec.ts"
          - "e2e/cli/alias/list.spec.ts"
      ai:
        prompt: |
          请验证命令别名管理功能的实现:
          1. 创建别名: `ai-me alias create b "behavior"` b指向behavior
          2. 带参数别名: `ai-me alias create bl "behavior list --status doing"`
          3. 列出别名: `ai-me alias list` 显示所有别名
          4. 显示详情: `ai-me alias show b` 显示别名定义
          5. 删除别名: `ai-me alias delete b` 删除别名
          6. 别名执行: 输入 `ai-me b` 执行对应命令
          7. 别名覆盖: 别名可覆盖但原命令仍可用 `--`
          8. 冲突检测: 创建别名时检测与现有命令冲突

          检查点:
          - 别名在命令路由前解析
          - 别名支持递归(别名指向别名)
          - 循环别名被检测和阻止

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/alias/index.ts"
          - "src/cli/router/alias.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites: []

  - id: "ISSUE-CLI-013~criterion-2"
    name: "快捷命令"
    description: |
      实现内置快捷命令，提供常用操作的一键执行。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/shortcut/*.test.ts"
        test_files:
          - "src/cli/commands/shortcut/builtin.test.ts"
      integration:
        command: "npm test -- src/cli/commands/shortcut/integration.test.ts"
        test_files:
          - "src/cli/commands/shortcut/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/shortcut"
        test_files:
          - "e2e/cli/shortcut/builtin.spec.ts"
      ai:
        prompt: |
          请验证快捷命令功能的实现:
          1. 今日任务: `ai-me today` = `ai-me behavior list --due today`
          2. 进行中: `ai-me doing` = `ai-me behavior list --status doing`
          3. 快速添加: `ai-me add "任务名"` = `ai-me behavior create --name "任务名"`
          4. 快速完成: `ai-me done <id>` = `ai-me behavior status <id> --to done`
          5. 快速搜索: `ai-me find "关键词"` = `ai-me search "关键词"`
          6. 工作目录: `ai-me here` = `ai-me behavior list --path .`
          7. 我的任务: `ai-me mine` = `ai-me behavior list --assignee @me`
          8. 紧急任务: `ai-me urgent` = `ai-me behavior list --priority critical,high`

          检查点:
          - 快捷命令响应迅速
          - 快捷命令支持额外参数
          - 快捷命令文档清晰

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/shortcut/builtin.ts"
          - "src/cli/router/shortcuts.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<3 seconds"
    prerequisites:
      - "ISSUE-CLI-013~criterion-1"

  - id: "ISSUE-CLI-013~criterion-3"
