      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/macro/*.test.ts"
        test_files:
          - "src/cli/commands/macro/create.test.ts"
          - "src/cli/commands/macro/run.test.ts"
      integration:
        command: "npm test -- src/cli/commands/macro/integration.test.ts"
        test_files:
          - "src/cli/commands/macro/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/macro"
        test_files:
          - "e2e/cli/macro/create.spec.ts"
          - "e2e/cli/macro/run.spec.ts"
      ai:
        prompt: |
          请验证宏命令功能的实现:
          1. 创建宏: `ai-me macro create daily "behavior list --status doing; behavior create --name '每日站会'"`
          2. 宏列表: `ai-me macro list` 显示所有宏
          3. 执行宏: `ai-me macro run daily` 或 `ai-me daily` 执行宏
          4. 宏参数: `ai-me macro create greet "echo Hello {{name}}"` 支持参数
