    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- tests/unit/deploy/ci-pipeline.test.ts"
        test_files:
          - "tests/unit/deploy/ci-pipeline.test.ts"
      integration:
        command: "npm run test:integration -- tests/integration/deploy/ci-workflow.test.ts"
