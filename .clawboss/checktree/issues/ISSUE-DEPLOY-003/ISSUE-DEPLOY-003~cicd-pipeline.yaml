          - "tests/e2e/deploy/ci-end-to-end.test.ts"
      ai:
        prompt: |
          请验证持续集成流水线配置是否符合以下要求：
          1. 是否配置代码提交自动触发（push、pull_request事件）
          2. 是否包含依赖安装和缓存优化
          3. 是否运行代码风格检查（ESLint/Prettier）
          4. 是否运行类型检查（TypeScript）
          5. 是否运行单元测试并生成覆盖率报告
          6. 是否运行集成测试
          7. 是否配置并行任务优化执行时间
          8. 是否配置测试结果和覆盖率报告上传
          返回格式: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - ".github/workflows/ci.yml"
          - ".github/workflows/pr-check.yml"
          - "scripts/ci/validate.sh"
        model: "claude-sonnet-4-6"
    execution_time: "<3 minutes"

