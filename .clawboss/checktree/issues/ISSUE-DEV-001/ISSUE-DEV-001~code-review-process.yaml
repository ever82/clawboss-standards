id: "ISSUE-DEV-001"
issue_number: 1
title: "代码审查流程与工具"
slug: "code-review-process"
status: "pending"
description: |
  建立完整的代码审查流程和自动化工具链，确保代码质量和一致性。
  包括PR模板、审查清单、自动化审查工具集成、审查责任分配机制等。
  目标是建立可持续的代码质量保障体系，减少缺陷流入生产环境。
is_parent: false
prerequisites:
  - "ISSUE-INFRA-004"
  - "ISSUE-DOC-003"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-DEV-001~criterion-1"
    name: "PR模板和审查清单"
    description: |
      创建标准化的Pull Request模板，包含变更描述、测试覆盖、破坏性变更说明等必需字段。
      制定代码审查清单，涵盖代码风格、逻辑正确性、测试覆盖、文档更新等审查要点。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/dev-process/review/template-validator.test.ts"
        test_files:
          - "src/dev-process/review/template-validator.test.ts"
          - "src/dev-process/review/checklist-parser.test.ts"
      integration:
        command: "npm test -- src/dev-process/review/integration.test.ts"
        test_files:
          - "src/dev-process/review/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- dev-process/pr-workflow"
        test_files:
          - "tests/e2e/dev-process/pr-workflow.spec.ts"
      ai:
        prompt: |
          请验证PR模板和审查清单实现是否满足要求：
          1. PR模板包含必需字段：标题、描述、变更类型、测试覆盖说明、破坏性变更标记
          2. PR模板支持关联Issue，自动提取关联信息
          3. 审查清单涵盖：代码风格、逻辑正确性、边界处理、错误处理、性能考虑、安全性、测试覆盖、文档更新
          4. 清单支持分类和优先级标记（必须/建议/可选）
          5. 提供命令行工具验证PR描述完整性
          6. 模板和清单支持多语言（中英文）
          请检查模板文件、清单配置和验证工具的实现质量。
        context_files:
          - ".github/pull_request_template.md"
          - "src/dev-process/review/template-validator.ts"
          - "src/dev-process/review/checklist.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"

  - id: "ISSUE-DEV-001~criterion-2"
    name: "自动化代码审查工具集成"
    description: |
      集成自动化代码审查工具，包括静态分析、安全检查、测试覆盖率检查等。
      配置GitHub Actions或CI流水线，在PR创建时自动运行审查流程并生成报告。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/dev-process/ci/analyzer.test.ts"
        test_files:
          - "src/dev-process/ci/analyzer.test.ts"
          - "src/dev-process/ci/reporter.test.ts"
      integration:
        command: "npm test -- src/dev-process/ci/integration.test.ts"
        test_files:
          - "src/dev-process/ci/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- dev-process/ci-pipeline"
        test_files:
          - "tests/e2e/dev-process/ci-pipeline.spec.ts"
      ai:
        prompt: |
          请验证自动化代码审查工具集成是否完整：
          1. CI流水线配置正确，在PR创建/更新时自动触发
          2. 集成静态代码分析工具（ESLint/TypeScript等）
          3. 集成安全扫描工具（依赖漏洞、 secrets检测）
          4. 测试覆盖率检查，低于阈值自动阻止合并
          5. 审查结果以PR评论形式自动发布，包含具体文件和行号
          6. 支持审查规则的自定义配置和渐进式启用
          7. 提供本地预提交钩子，支持开发者本地验证
          请检查CI配置、审查脚本和报告生成模块。
        context_files:
          - ".github/workflows/code-review.yml"
          - "src/dev-process/ci/analyzer.ts"
          - "src/dev-process/ci/reporter.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"

  - id: "ISSUE-DEV-001~criterion-3"
    name: "审查责任分配机制"
    description: |
      建立代码审查的责任分配机制，包括代码所有者（CODEOWNERS）配置、
      自动分配审查者、审查超时提醒等功能，确保每个PR都有合适的审查者。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/dev-process/assignment/reviewer.test.ts"
        test_files:
          - "src/dev-process/assignment/reviewer.test.ts"
          - "src/dev-process/assignment/owners.test.ts"
      integration:
        command: "npm test -- src/dev-process/assignment/integration.test.ts"
        test_files:
          - "src/dev-process/assignment/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- dev-process/assignment"
        test_files:
          - "tests/e2e/dev-process/assignment.spec.ts"
      ai:
        prompt: |
          请验证审查责任分配机制实现是否完善：
          1. CODEOWNERS文件配置正确，按目录/模块分配所有者
          2. 自动分配审查者逻辑正确，考虑专业领域、工作负载、回避冲突
          3. 支持强制审查要求（至少N个审查者批准）
          4. 审查超时提醒机制（24小时无响应自动提醒）
          5. 支持轮询分配和专家分配两种模式
          6. 提供命令行工具查询代码所有者和审查历史
          7. 集成统计功能，跟踪审查响应时间和质量
          请检查分配算法、所有者配置和提醒机制。
        context_files:
          - "CODEOWNERS"
          - "src/dev-process/assignment/reviewer.ts"
          - "src/dev-process/assignment/owners.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"

  - id: "ISSUE-DEV-001~criterion-4"
    name: "审查质量度量与改进"
    description: |
      建立代码审查的质量度量体系，包括审查覆盖率、审查深度、缺陷发现率等指标。
      定期生成审查报告，识别审查流程中的问题并持续改进。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/dev-process/metrics/collector.test.ts"
        test_files:
          - "src/dev-process/metrics/collector.test.ts"
          - "src/dev-process/metrics/reporter.test.ts"
      integration:
        command: "npm test -- src/dev-process/metrics/integration.test.ts"
        test_files:
          - "src/dev-process/metrics/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- dev-process/metrics"
        test_files:
          - "tests/e2e/dev-process/metrics.spec.ts"
      ai:
        prompt: |
          请验证审查质量度量与改进功能实现：
          1. 收集审查指标：审查覆盖率、平均审查时间、问题发现率、返工率
          2. 支持按模块、审查者、时间维度统计分析
          3. 生成可视化报告（图表形式展示趋势）
          4. 识别高风险提交（大变更、高风险模块）
          5. 提供审查质量评分和改进建议
          6. 支持导出CSV/JSON格式的原始数据
          7. 与CheckTree系统集成，更新Issue完成状态
          请检查指标收集器、报告生成器和数据分析模块。
        context_files:
          - "src/dev-process/metrics/collector.ts"
          - "src/dev-process/metrics/reporter.ts"
          - "src/dev-process/metrics/dashboard.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-DEV-001~criterion-2"
