    description: |
      实现 `ai-me behavior tag` 和 `ai-me behavior criteria` 命令，支持标签增删和验收标准管理，与CORE-015/CORE-016集成。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/behavior/tag.test.ts"
        test_files:
