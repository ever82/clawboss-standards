title: "行为管理命令"
description: |
  实现AI-Me CLI的行为管理相关命令，包括行为的创建、查询、更新、删除、状态变更等操作。
  命令需要与CORE-002系列服务集成，提供完整的CRUD操作。
status: "pending"
