      e2e:
        command: "npm run test:e2e -- cli/behavior/meta"
        test_files:
          - "e2e/cli/behavior/tag.spec.ts"
          - "e2e/cli/behavior/criteria.spec.ts"
      ai:
        prompt: |
          请验证行为标签与验收标准命令的实现:
          1. 标签添加: `ai-me behavior tag add <id> work urgent`
          2. 标签移除: `ai-me behavior tag remove <id> urgent`
          3. 标签列表: `ai-me behavior tag list <id>`
