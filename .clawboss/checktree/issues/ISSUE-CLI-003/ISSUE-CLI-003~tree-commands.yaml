  - id: "ISSUE-CLI-003~criterion-3"
    name: "节点移动与重组命令"
    description: |
      实现 `ai-me tree move` 命令，支持节点移动、父节点变更、树重组操作，与CORE-003C服务集成。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/tree/move.test.ts"
        test_files:
          - "src/cli/commands/tree/move.test.ts"
      integration:
        command: "npm test -- src/cli/commands/tree/move.integration.test.ts"
        test_files:
          - "src/cli/commands/tree/move.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/tree/move"
        test_files:
          - "e2e/cli/tree/move.spec.ts"
      ai:
        prompt: |
          请验证节点移动与重组命令的实现:
          1. 移动节点: `ai-me tree move <node-id> --to-parent <parent-id>`
          2. 移动到根: `ai-me tree move <node-id> --to-root` 成为顶级节点
          3. 交换位置: `ai-me tree move <node-id> --swap-with <other-id>`
          4. 批量移动: `ai-me tree move --ids id1,id2 --to-parent <parent-id>`
          5. 位置指定: `--position first|last|<index>` 指定插入位置
          6. 循环检测: 移动操作是否防止形成循环依赖
          7. 依赖更新: 移动后是否自动更新相关依赖关系
          8. 预览模式: `--dry-run` 预览移动结果不实际执行

          检查点:
          - 与CORE-003C服务的正确集成
          - 循环依赖检测正确
          - 移动后树的完整性保持

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/tree/move.ts"
          - "src/core/services/tree/move.ts"
