  - id: "ISSUE-CLI-003~criterion-4"
    name: "树搜索与过滤命令"
    description: |
      实现 `ai-me tree find` 命令，支持在树结构中搜索节点，支持路径查询和条件过滤。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/tree/find.test.ts"
        test_files:
          - "src/cli/commands/tree/find.test.ts"
      integration:
        command: "npm test -- src/cli/commands/tree/find.integration.test.ts"
        test_files:
          - "src/cli/commands/tree/find.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/tree/find"
        test_files:
          - "e2e/cli/tree/find.spec.ts"
      ai:
        prompt: |
          请验证树搜索与过滤命令的实现:
          1. 按名称搜索: `ai-me tree find "关键词"` 模糊匹配行为名称
          2. 按路径搜索: `ai-me tree find --path "项目A/子任务/*"` 通配符匹配
          3. 深度过滤: `ai-me tree find --min-depth 2 --max-depth 4`
          4. 叶子节点: `ai-me tree find --leaf-only` 只搜索叶子节点
          5. 祖先包含: `ai-me tree find --has-ancestor <ancestor-id>`
          6. 后代包含: `ai-me tree find --has-descendant <descendant-id>`
          7. 结果展示: 搜索结果是否显示完整路径
          8. 高亮显示: 匹配的关键词是否在输出中高亮

          检查点:
          - 搜索算法效率高(避免全树遍历)
          - 通配符匹配支持*和?
          - 结果排序合理(按相关性或路径)

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/tree/find.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites:
