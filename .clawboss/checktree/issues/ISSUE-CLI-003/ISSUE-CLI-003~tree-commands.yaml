  - id: "ISSUE-CLI-003~criterion-1"
    name: "树构建与展示命令"
    description: |
      实现 `ai-me tree build` 和 `ai-me tree show` 命令，支持从行为列表构建树结构，并以多种格式展示。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/tree/build.test.ts"
        test_files:
          - "src/cli/commands/tree/build.test.ts"
          - "src/cli/commands/tree/show.test.ts"
      integration:
        command: "npm test -- src/cli/commands/tree/integration.test.ts"
        test_files:
          - "src/cli/commands/tree/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/tree/build"
        test_files:
          - "e2e/cli/tree/build.spec.ts"
          - "e2e/cli/tree/show.spec.ts"
      ai:
        prompt: |
          请验证树构建与展示命令的实现:
          1. 构建命令: `ai-me tree build` 从当前工作空间行为构建树
          2. 条件构建: `ai-me tree build --status doing --due-before 2026-05-01`
          3. 树形展示: `ai-me tree show` 以ASCII树形图展示结构
          4. 扁平展示: `ai-me tree show --flat` 以列表形式展示(带缩进)
          5. 深度限制: `ai-me tree show --max-depth 3` 只显示前3层
          6. 节点计数: `ai-me tree show --count` 显示每层节点数量
          7. 导出格式: `--json`, `--yaml`, `--csv` 支持多种导出格式
          8. 保存文件: `ai-me tree show --output tree.json` 输出到文件

          检查点:
          - 与CORE-003A服务的正确集成
          - 树形图在终端中显示正确(缩进、连接线)
          - 大数据量时性能可接受

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/tree/build.ts"
          - "src/cli/commands/tree/show.ts"
          - "src/cli/formatter/tree-printer.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

  - id: "ISSUE-CLI-003~criterion-2"
    name: "树遍历命令"
    description: |
      实现 `ai-me tree traverse` 命令，支持多种遍历策略(前序、后序、层级)和遍历操作。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/tree/traverse.test.ts"
        test_files:
          - "src/cli/commands/tree/traverse.test.ts"
      integration:
        command: "npm test -- src/cli/commands/tree/traverse.integration.test.ts"
        test_files:
          - "src/cli/commands/tree/traverse.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/tree/traverse"
        test_files:
          - "e2e/cli/tree/traverse.spec.ts"
      ai:
        prompt: |
          请验证树遍历命令的实现:
          1. 遍历策略: `--strategy pre-order|post-order|level-order|in-order`
          2. 遍历操作: `--action list|export|validate|stats`
          3. 条件过滤: `--filter "status=done"` 只遍历匹配节点
          4. 遍历统计: `ai-me tree traverse --action stats` 输出树的统计信息
          5. 批量导出: `ai-me tree traverse --action export --format json`
          6. 验证遍历: `ai-me tree traverse --action validate` 检查树完整性
          7. 中断遍历: 支持--max-nodes限制遍历节点数
          8. 遍历进度: 大树的遍历是否显示进度指示器

          检查点:
          - 与CORE-003B服务的正确集成
          - 不同遍历策略输出顺序正确
          - 遍历过程中可安全中断(Ctrl+C)

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/tree/traverse.ts"
