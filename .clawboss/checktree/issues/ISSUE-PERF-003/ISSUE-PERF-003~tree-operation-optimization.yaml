        command: "npm run test:e2e -- tests/e2e/performance/tree-storage.spec.ts"
        test_files:
          - "tests/e2e/performance/tree-storage.spec.ts"
      ai:
        prompt: |
          请验证树存储结构优化实现：
          1. 是否实现了路径枚举存储（存储完整路径如/1/2/5/8/）支持O(1)子树查询
          2. 是否实现了闭包表存储（存储所有祖先-后代关系）支持O(1)层级查询
          3. 是否提供存储策略选择器，根据树深度、操作模式自动推荐最优策略
          4. 混合存储策略是否保持数据一致性（多表事务同步）
          5. 存储迁移工具是否支持邻接表到优化结构的无损迁移
          6. 各存储策略的查询性能对比测试是否完整
          请检查代码实现，返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/perf/tree/storage/path-enumeration.ts"
          - "src/perf/tree/storage/closure-table.ts"
          - "src/perf/tree/storage/hybrid-storage.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
