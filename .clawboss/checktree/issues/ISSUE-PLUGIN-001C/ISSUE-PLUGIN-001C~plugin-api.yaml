criteria:
  - id: "ISSUE-PLUGIN-001C~criterion-1"
    name: "核心服务API定义"
    description: "定义插件可访问的核心服务API，包括行为管理服务、树操作服务、工作空间服务的类型安全接口"
    category: "feature"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    note: "API接口必须类型安全，支持IDE自动补全"
    execution_time: "<2 seconds"
    prerequisites: []
    implementations:
      - type: "types"
        path: "src/plugin/api/behavior-api.types.ts"
      - type: "types"
        path: "src/plugin/api/tree-api.types.ts"
      - type: "types"
        path: "src/plugin/api/workspace-api.types.ts"
    verification:
      unit:
        command: "npm test -- src/plugin/api/"
        test_files:
          - "src/plugin/api/behavior-api.types.test.ts"
          - "src/plugin/api/tree-api.types.test.ts"
          - "src/plugin/api/workspace-api.types.test.ts"
      integration:
        command: "npm run test:integration -- plugin-core-api"
        test_files:
          - "tests/integration/plugin/api/core-api.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- plugin-api-usage"
        test_files:
          - "tests/e2e/plugin/api/core-api.e2e.test.ts"
      ai:
        prompt: |
          请验证核心服务API定义是否满足以下要求:
          1. Behavior API是否包含: create, update, delete, findById, search, list等完整CRUD操作
          2. Tree API是否包含: getTree, moveNode, expand, collapse, reorder等树操作
          3. Workspace API是否包含: getCurrent, list, switch, create, validate等操作
          4. 所有API接口是否使用TypeScript接口(interface)或类型别名(type)定义
          5. API方法是否有完整的JSDoc注释(参数、返回值、异常、示例)
          6. API是否支持Promise/async模式，异步操作有正确类型标注
          7. API设计是否遵循单一职责原则，避免巨型接口
          8. API变更是否有版本标记(@since, @deprecated)
          返回格式: {"passed": true/false, "reason": "详细说明", "details": [{"check": "检查项", "passed": true/false}]}
        context_files:
          - "src/plugin/api/behavior-api.types.ts"
          - "src/plugin/api/tree-api.types.ts"
          - "src/plugin/api/workspace-api.types.ts"
        model: "claude-sonnet-4-6"

