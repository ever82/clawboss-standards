          - "tests/integration/plugin/api/versioning.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- api-version-check"
        test_files:
          - "tests/e2e/plugin/api/versioning.e2e.test.ts"
      ai:
        prompt: |
          请验证API版本管理机制是否满足以下要求:
          1. 是否有ApiVersionManager类管理所有API的版本声明
          2. 插件manifest是否支持声明兼容的API版本范围(engine.apiVersion)
          3. 加载插件时是否检查API兼容性(不兼容时拒绝加载并给出原因)
          4. 是否有@deprecated装饰器/API标记废弃功能，使用废弃API是否显示警告
