  - id: "ISSUE-PLUGIN-001C~criterion-5"
    name: "API版本管理实现"
    description: "实现API版本管理机制，支持API版本声明、兼容性检查、废弃API警告"
    category: "feature"
    status: "pending"
    coverage:
