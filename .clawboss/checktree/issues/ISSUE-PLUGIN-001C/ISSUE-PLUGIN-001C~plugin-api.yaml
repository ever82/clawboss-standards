        command: "npm test -- src/plugin/api/api-version-manager.test.ts"
        test_files:
          - "src/plugin/api/api-version-manager.test.ts"
          - "src/plugin/api/version-compatibility.types.test.ts"
      integration:
        command: "npm run test:integration -- api-versioning"
