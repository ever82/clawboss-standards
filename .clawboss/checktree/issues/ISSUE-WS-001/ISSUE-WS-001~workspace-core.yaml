id: "ISSUE-WS-001"
issue_number: 1
title: "工作空间核心服务"
slug: "workspace-core"
status: "pending"
description: |
  实现工作空间核心服务，提供工作空间的创建、读取、更新、删除（CRUD）功能。
  工作空间是行为管理的独立环境，每个工作空间包含独立的行为树、配置和元数据。

  核心功能：
  1. 工作空间元数据管理（名称、描述、创建时间、最后访问时间）
  2. 工作空间路径管理（本地存储路径、配置目录）
  3. 工作空间配置管理（默认配置、环境变量覆盖）
  4. 工作空间状态管理（激活、归档、删除）
  5. 工作空间初始化和验证

  技术要求：
  - 基于 Repository 模式实现数据访问层
  - 支持 SQLite 存储工作空间元数据
  - 提供清晰的错误处理和日志记录
  - 支持并发访问控制
is_parent: false
prerequisites:
  - "ISSUE-INFRA-003B"
  - "ISSUE-CORE-002A"
  - "ISSUE-INFRA-006A"
  - "ISSUE-INFRA-006B"
  - "ISSUE-INFRA-007"
  - "ISSUE-INFRA-014"
  - "ISSUE-INFRA-005"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-WS-001~criterion-1"
    name: "工作空间实体与类型定义"
    description: |
      定义工作空间实体（Workspace）的完整数据结构，包括：
      - 基础字段：id, name, description, rootPath
      - 元数据字段：createdAt, updatedAt, lastAccessedAt
      - 状态字段：status (active, archived, deleted)
      - 配置字段：config (JSON 对象存储工作空间特定配置)

      类型定义需包含：
      - Workspace 接口/类型
      - WorkspaceStatus 枚举
      - WorkspaceConfig 配置类型
      - CreateWorkspaceInput / UpdateWorkspaceInput DTO
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/entities/workspace.entity.test.ts"
        test_files:
          - "src/workspace/entities/workspace.entity.test.ts"
          - "src/workspace/dto/create-workspace.dto.test.ts"
          - "src/workspace/dto/update-workspace.dto.test.ts"
      integration:
        command: "npm test -- src/workspace/workspace.type.integration.test.ts"
        test_files:
          - "src/workspace/workspace.type.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- workspace-types"
        test_files:
          - "tests/e2e/workspace/workspace-types.e2e.test.ts"
      ai:
        prompt: |
          请验证以下工作空间实体定义的完整性和正确性：
          1. 检查 Workspace 接口是否包含所有必需字段（id, name, description, rootPath, createdAt, updatedAt, lastAccessedAt, status, config）
          2. 检查 WorkspaceStatus 枚举是否包含 active, archived, deleted 三种状态
          3. 检查 CreateWorkspaceInput DTO 是否对 name 和 rootPath 有正确的验证装饰器（@IsString, @IsNotEmpty, @MaxLength）
          4. 检查 UpdateWorkspaceInput DTO 是否为可选字段，且不允许修改 id 和 rootPath
          5. 检查类型定义是否导出了所有必要的类型供其他模块使用
          6. 验证是否有适当的 TypeScript 严格类型（strict typing）
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/entities/workspace.entity.ts"
          - "src/workspace/dto/create-workspace.dto.ts"
          - "src/workspace/dto/update-workspace.dto.ts"
          - "src/workspace/enums/workspace-status.enum.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"

  - id: "ISSUE-WS-001~criterion-2"
    name: "工作空间 Repository 实现"
    description: |
      基于 INFRA-014 Repository 模式实现 WorkspaceRepository：
      - findAll(): 查询所有工作空间列表
      - findById(id): 根据 ID 查询工作空间
      - findByName(name): 根据名称查询工作空间（唯一约束）
      - create(data): 创建新工作空间
      - update(id, data): 更新工作空间信息
      - delete(id): 软删除工作空间
      - setActive(id): 设置活动工作空间
      - getActive(): 获取当前活动工作空间
      - touch(id): 更新最后访问时间

      Repository 需支持事务操作，确保数据一致性。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/repositories/workspace.repository.test.ts"
        test_files:
          - "src/workspace/repositories/workspace.repository.test.ts"
      integration:
        command: "npm test -- src/workspace/workspace.repository.integration.test.ts"
        test_files:
          - "src/workspace/workspace.repository.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- workspace-repository"
        test_files:
          - "tests/e2e/workspace/workspace-repository.e2e.test.ts"
      ai:
        prompt: |
          请验证 WorkspaceRepository 的实现是否符合 Repository 模式规范：
          1. 检查是否实现了所有必需的方法：findAll, findById, findByName, create, update, delete, setActive, getActive, touch
          2. 检查是否使用了 Repository 基类（从 INFRA-014 继承）
          3. 检查 create 方法是否正确处理唯一性约束（name 不能重复）
          4. 检查 setActive 方法是否在设置新活动工作空间前正确取消之前活动状态
          5. 检查 delete 方法是否实现了软删除（将状态改为 deleted 而非物理删除）
          6. 检查所有方法是否都有适当的事务处理
          7. 检查是否有适当的错误处理和日志记录
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/repositories/workspace.repository.ts"
          - "src/workspace/repositories/workspace.repository.interface.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"
    prerequisites:
      - "ISSUE-WS-001~criterion-1"

  - id: "ISSUE-WS-001~criterion-3"
    name: "工作空间服务层实现"
    description: |
      实现 WorkspaceService 业务逻辑层：
      - 封装 Repository 操作，提供业务语义化方法
      - 工作空间路径验证（路径是否存在、是否可写）
      - 工作空间初始化（创建目录结构、生成默认配置）
      - 工作空间切换逻辑（激活/停用）
      - 工作空间验证（检查工作空间完整性）
      - 事件发布（WorkspaceCreated, WorkspaceActivated, WorkspaceDeleted）

      服务层需处理业务异常，转换为领域异常。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/services/workspace.service.test.ts"
        test_files:
          - "src/workspace/services/workspace.service.test.ts"
      integration:
        command: "npm test -- src/workspace/workspace.service.integration.test.ts"
        test_files:
          - "src/workspace/workspace.service.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- workspace-service"
        test_files:
          - "tests/e2e/workspace/workspace-service.e2e.test.ts"
      ai:
        prompt: |
          请验证 WorkspaceService 业务逻辑层的实现：
          1. 检查是否依赖并正确使用 WorkspaceRepository
          2. 检查 createWorkspace 方法是否：
             - 验证路径是否存在且可写
             - 检查名称是否已存在
             - 创建物理目录结构
             - 发布 WorkspaceCreated 事件
          3. 检查 activateWorkspace 方法是否：
             - 验证工作空间存在且状态为 active
             - 正确切换活动工作空间
             - 发布 WorkspaceActivated 事件
          4. 检查 validateWorkspace 方法是否检查：
             - 物理目录是否存在
             - 必要配置文件是否存在
             - 数据库连接是否正常
          5. 检查所有业务异常是否都被捕获并转换为领域异常（PathNotWritableError, WorkspaceAlreadyExistsError 等）
          6. 检查是否使用了依赖注入
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/services/workspace.service.ts"
          - "src/workspace/services/workspace.service.interface.ts"
          - "src/workspace/exceptions/workspace.exceptions.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"
    prerequisites:
      - "ISSUE-WS-001~criterion-2"

  - id: "ISSUE-WS-001~criterion-4"
    name: "工作空间目录结构初始化"
    description: |
      实现工作空间目录结构创建和管理：
      - .ai-me/ 主配置目录
      - .ai-me/config.json 主配置文件
      - .ai-me/behaviors/ 行为数据目录
      - .ai-me/templates/ 模板目录
      - .ai-me/backups/ 备份目录
      - .ai-me/logs/ 日志目录
      - .ai-me/cache/ 缓存目录

      实现需包含：
      - 目录创建（如果不存在）
      - 默认配置文件生成
      - 目录权限验证
      - .gitignore 文件生成（保护敏感目录）
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/services/workspace-initializer.test.ts"
        test_files:
          - "src/workspace/services/workspace-initializer.test.ts"
      integration:
        command: "npm test -- src/workspace/workspace-initializer.integration.test.ts"
        test_files:
          - "src/workspace/workspace-initializer.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- workspace-initialization"
        test_files:
          - "tests/e2e/workspace/workspace-initialization.e2e.test.ts"
      ai:
        prompt: |
          请验证工作空间目录结构初始化实现：
          1. 检查 WorkspaceInitializer 类是否实现了 initialize(path) 方法
          2. 检查是否创建了以下目录结构：
             - .ai-me/
             - .ai-me/behaviors/
             - .ai-me/templates/
             - .ai-me/backups/
             - .ai-me/logs/
             - .ai-me/cache/
          3. 检查是否生成了默认的 config.json 文件，包含：
             - version: 配置版本号
