  - id: "ISSUE-WS-001~criterion-5"
    name: "错误处理和日志记录"
    description: |
      实现工作空间模块的错误处理和日志系统：
      - 定义工作空间相关异常类：
        - WorkspaceNotFoundError
        - WorkspaceAlreadyExistsError
        - PathNotWritableError
        - InvalidWorkspacePathError
        - WorkspaceInUseError
      - 实现异常转换中间件
      - 添加操作日志记录（创建、切换、删除）
      - 实现错误恢复机制

      日志需记录关键操作的上下文信息，便于问题排查。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/exceptions/ src/workspace/middleware/"
        test_files:
          - "src/workspace/exceptions/workspace-not-found.error.test.ts"
          - "src/workspace/exceptions/workspace-already-exists.error.test.ts"
          - "src/workspace/middleware/error-converter.middleware.test.ts"
      integration:
        command: "npm test -- src/workspace/workspace.error-handling.integration.test.ts"
        test_files:
          - "src/workspace/workspace.error-handling.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- workspace-error-handling"
        test_files:
          - "tests/e2e/workspace/workspace-error-handling.e2e.test.ts"
      ai:
        prompt: |
          请验证工作空间模块的错误处理和日志记录实现：
          1. 检查是否定义了以下异常类，且都继承自 BaseWorkspaceError：
             - WorkspaceNotFoundError (statusCode: 404)
             - WorkspaceAlreadyExistsError (statusCode: 409)
             - PathNotWritableError (statusCode: 403)
             - InvalidWorkspacePathError (statusCode: 400)
             - WorkspaceInUseError (statusCode: 423)
          2. 检查每个异常类是否有：
             - 明确的错误代码（errorCode）
             - 人类可读的错误消息
             - 可选的上下文信息（context）
          3. 检查 ErrorConverterMiddleware 是否正确转换底层错误（如 SQLite 错误）为领域异常
          4. 检查 WorkspaceService 是否在以下操作添加了日志：
             - 创建工作空间（info级别）
             - 切换工作空间（info级别）
             - 删除工作空间（warn级别）
             - 发生错误（error级别，包含上下文）
          5. 检查日志是否包含足够上下文（workspaceId, operation, timestamp）
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/exceptions/"
          - "src/workspace/middleware/error-converter.middleware.ts"
          - "src/workspace/services/workspace.service.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-WS-001~criterion-4"
