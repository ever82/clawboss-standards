id: "ISSUE-INT-001C"
issue_number: "001C"
title: "Claude Code 集成配置"
slug: "claude-integration"
status: "pending"
description: |
  实现 Claude Code 集成配置系统，完成系统与 Claude Code 的完整集成。
  该模块负责配置管理、连接管理、命令集成和用户体验优化，使开发者能够通过
  Claude Code 无缝使用 AI-Me 行为管理系统的所有功能。

  主要功能包括：
  1. 集成配置管理（API 配置、连接配置、偏好设置）
  2. 连接管理器（连接建立、心跳维持、断线重连）
  3. Claude Code 命令集成（在 Claude Code 中注册系统命令）
  4. 会话管理（会话状态、上下文保持、多会话支持）
  5. 用户体验优化（响应速度、错误提示、进度反馈）

is_parent: false
prerequisites:
  - "ISSUE-INT-001B"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary

criteria:
  - id: "ISSUE-INT-001C~config-management"
    name: "集成配置管理实现"
    description: |
      实现 Claude Code 集成配置管理系统：
      - API 配置（API Key、端点 URL、请求超时）
      - 连接配置（重试次数、心跳间隔、连接池大小）
      - 上下文配置（自动更新开关、更新频率、包含/排除项）
      - 命令配置（命令前缀、别名映射、快捷命令）
      - 偏好设置（输出格式、详细程度、确认提示）

      配置支持多级别（全局、项目、工作空间），支持环境变量覆盖。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/integration/config/"
        test_files:
          - "src/integration/config/manager.test.ts"
          - "src/integration/config/schema.test.ts"
          - "src/integration/config/loader.test.ts"
      integration:
        command: "npm test -- src/integration/config/integration.test.ts"
        test_files:
          - "src/integration/config/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- config-management"
        test_files:
          - "tests/e2e/claude-integration/config-management.spec.ts"
      ai:
        prompt: |
          请验证集成配置管理实现：
          1. 检查 src/integration/config/ 目录结构
          2. 验证配置管理器实现（读取、写入、验证）
          3. 检查配置 Schema 定义（API、连接、上下文、命令、偏好）
          4. 验证多级别配置支持（全局、项目、工作空间）
          5. 检查环境变量覆盖机制
          6. 验证配置验证和错误提示
          7. 检查配置热重载支持
          8. 验证敏感信息（API Key）的安全存储

          返回格式：{"passed": true/false, "reason": "详细解释"}
