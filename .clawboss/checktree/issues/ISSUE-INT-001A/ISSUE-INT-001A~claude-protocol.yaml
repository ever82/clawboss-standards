id: "ISSUE-INT-001A"
issue_number: "001A"
title: "Claude Code 协议设计"
slug: "claude-protocol"
status: "pending"
description: |
  设计并实现 Claude Code 集成协议，定义系统与 Claude Code 之间的通信规范、
  上下文交换格式、指令协议和安全机制。该协议是 AI 辅助开发的基础，确保
  系统能够与 Claude Code 无缝协作，支持智能行为管理、代码生成和问题诊断。

  主要功能包括：
  1. 协议规范定义（请求/响应格式、版本控制、错误处理）
  2. 上下文交换协议（文件上下文、项目上下文、行为树上下文）
  3. 指令协议设计（命令映射、参数传递、结果返回）
  4. 安全机制（身份验证、权限控制、输入验证）
  5. 协议文档和 SDK 接口定义

is_parent: false
prerequisites:
  - "ISSUE-CLI-002"
  - "ISSUE-WS-002B"
  - "ISSUE-BC-002"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary

criteria:
  - id: "ISSUE-INT-001A~protocol-spec"
    name: "协议规范文档完整"
    description: |
      Claude Code 协议规范文档完整，包含：
      - 协议版本定义和兼容性策略
      - 请求/响应消息格式规范（JSON Schema）
      - 错误码定义和处理机制
      - 协议扩展点和向后兼容策略
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/integration/protocol/validator.test.ts"
        test_files:
          - "src/integration/protocol/validator.test.ts"
          - "src/integration/protocol/schema.test.ts"
      integration:
        command: "npm test -- src/integration/protocol/integration.test.ts"
        test_files:
          - "src/integration/protocol/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- claude-protocol"
        test_files:
          - "tests/e2e/claude-protocol/protocol-flow.spec.ts"
      ai:
        prompt: |
          请验证 Claude Code 协议规范是否完整：
          1. 检查 docs/integration/claude-protocol.md 是否存在且内容完整
          2. 验证协议版本定义是否清晰（至少包含 v1.0 基线版本）
          3. 检查请求/响应格式是否有 JSON Schema 定义
          4. 验证错误码体系是否完整（至少包含 10+ 个错误码定义）
          5. 检查向后兼容策略是否有明确说明
          6. 验证协议扩展点是否标识清晰

          返回格式：{"passed": true/false, "reason": "详细解释缺失项或问题"}
        context_files:
          - "docs/integration/claude-protocol.md"
          - "src/integration/protocol/schemas/*.json"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

  - id: "ISSUE-INT-001A~context-exchange"
    name: "上下文交换机制实现"
    description: |
      实现上下文交换机制，支持以下上下文类型：
      - 文件上下文：当前工作文件内容、光标位置、选中范围
      - 项目上下文：项目结构、配置信息、依赖关系
      - 行为树上下文：当前行为树状态、节点详情、路径信息
      - 工作空间上下文：当前工作空间元数据

      上下文收集应支持同步和异步模式，具备缓存和增量更新能力。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/integration/context/"
        test_files:
          - "src/integration/context/context-collector.test.ts"
          - "src/integration/context/context-manager.test.ts"
          - "src/integration/context/context-cache.test.ts"
      integration:
        command: "npm test -- src/integration/context/integration.test.ts"
        test_files:
          - "src/integration/context/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- context-exchange"
        test_files:
          - "tests/e2e/context-exchange/full-context.spec.ts"
          - "tests/e2e/context-exchange/incremental-update.spec.ts"
      ai:
        prompt: |
          请验证上下文交换机制实现：
          1. 检查 src/integration/context/ 目录下是否有 ContextCollector 类实现
          2. 验证是否支持文件上下文收集（读取文件内容、光标位置）
          3. 验证是否支持项目上下文收集（项目结构、配置）
          4. 验证是否支持行为树上下文收集（树状态、节点信息）
          5. 检查上下文缓存机制是否存在（ContextCache 类）
          6. 验证增量更新功能是否实现（diff 计算和应用）
          7. 检查上下文序列化/反序列化是否正确

          返回格式：{"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/integration/context/context-collector.ts"
          - "src/integration/context/context-manager.ts"
          - "src/integration/context/context-cache.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

  - id: "ISSUE-INT-001A~command-protocol"
    name: "指令协议映射实现"
    description: |
      实现系统命令与 Claude Code 指令的协议映射：
      - 命令映射表：系统 CLI 命令与 Claude Code 指令的对应关系
      - 参数传递协议：类型转换、验证、默认值处理
      - 结果返回协议：标准输出格式、错误处理、流式响应
      - 指令执行生命周期管理：开始、进度、完成、取消

      支持通过 Claude Code 执行系统命令并获取结构化结果。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/integration/command/"
        test_files:
          - "src/integration/command/command-mapper.test.ts"
          - "src/integration/command/protocol-adapter.test.ts"
          - "src/integration/command/executor.test.ts"
      integration:
        command: "npm test -- src/integration/command/integration.test.ts"
        test_files:
          - "src/integration/command/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- command-protocol"
        test_files:
          - "tests/e2e/command-protocol/command-mapping.spec.ts"
          - "tests/e2e/command-protocol/execution-flow.spec.ts"
      ai:
        prompt: |
          请验证指令协议映射实现：
          1. 检查 src/integration/command/command-mapper.ts 是否存在
          2. 验证命令映射表是否覆盖主要 CLI 命令（至少 behavior、tree、workspace 类命令）
          3. 检查参数传递协议是否支持类型转换和验证
          4. 验证结果返回格式是否为结构化 JSON
          5. 检查指令执行生命周期管理（start/progress/complete/cancel）
          6. 验证流式响应支持（progress 事件）
          7. 检查错误处理和异常转换机制

          返回格式：{"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/integration/command/command-mapper.ts"
          - "src/integration/command/protocol-adapter.ts"
          - "src/integration/command/executor.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

  - id: "ISSUE-INT-001A~security-mechanism"
    name: "安全机制实现"
    description: |
      实现协议安全机制，确保与 Claude Code 的通信安全：
      - 身份验证：API Key 验证、令牌机制
      - 权限控制：操作权限分级、敏感操作确认
      - 输入验证：参数 sanitization、注入防护
      - 审计日志：请求记录、异常追踪

      安全机制应遵循最小权限原则，防止未授权访问和恶意操作。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/integration/security/"
        test_files:
          - "src/integration/security/auth.test.ts"
          - "src/integration/security/permission.test.ts"
          - "src/integration/security/sanitizer.test.ts"
      integration:
        command: "npm test -- src/integration/security/integration.test.ts"
        test_files:
          - "src/integration/security/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- security-mechanism"
        test_files:
          - "tests/e2e/security-mechanism/auth-flow.spec.ts"
          - "tests/e2e/security-mechanism/permission-control.spec.ts"
      ai:
        prompt: |
          请验证安全机制实现：
          1. 检查 src/integration/security/ 目录结构
          2. 验证身份验证机制（API Key 或 Token 验证）
          3. 检查权限控制实现（至少 READ/WRITE/ADMIN 三级权限）
          4. 验证输入验证和 sanitization 机制
          5. 检查 SQL/命令注入防护措施
          6. 验证审计日志记录功能
          7. 检查敏感操作（删除、修改）是否有确认机制
          8. 验证错误信息是否隐藏内部实现细节

          返回格式：{"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/integration/security/auth.ts"
          - "src/integration/security/permission.ts"
          - "src/integration/security/sanitizer.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

