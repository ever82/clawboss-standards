        test_files:
          - "src/integration/sdk/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- sdk-interface"
        test_files:
          - "tests/e2e/sdk-interface/sdk-usage.spec.ts"
      ai:
        prompt: |
          请验证 SDK 接口定义：
          1. 检查 src/integration/sdk/index.ts 是否存在且导出完整
