          3. 检查 SDK 类/函数是否包含：初始化、上下文收集、指令发送
          4. 验证事件监听接口（onConnect/onMessage/onError/onDisconnect）
          5. 检查配置接口是否完整（连接、超时、重试配置）
          6. 验证 SDK API 文档是否完整（每个方法的 JSDoc）
          7. 检查 SDK 使用示例是否存在

          返回格式：{"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/integration/sdk/index.ts"
          - "src/integration/sdk/types.ts"
          - "src/integration/sdk/sdk.ts"
        model: "claude-sonnet-4-6"
