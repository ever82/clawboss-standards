id: "ISSUE-CLI-011C"
issue_number: 11
slug: "progress-indicators"
title: "进度指示器"
description: |
  实现AI-Me CLI的进度指示功能，支持进度条、加载动画、操作反馈等，提升长时间操作的用户体验。
  依赖CLI-002、CLI-003、CLI-004命令实现。
status: "pending"
is_parent: false
sub_issues: []
prerequisites:
  - "ISSUE-CLI-002"
  - "ISSUE-CLI-003"
  - "ISSUE-CLI-004"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-CLI-011C~criterion-1"
    name: "进度条组件"
    description: |
      实现进度条组件，支持确定性和不确定性进度、多种样式、实时更新。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/progress/bar.test.ts"
        test_files:
          - "src/cli/progress/bar.test.ts"
      integration:
        command: "npm test -- src/cli/progress/integration.test.ts"
        test_files:
          - "src/cli/progress/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/progress/bar"
        test_files:
          - "e2e/cli/progress/bar.spec.ts"
      ai:
        prompt: |
          请验证进度条组件的实现:
          1. 基本进度条: 显示████████░░ 70%格式
          2. 进度样式: `--progress-style bar|percentage|dots`
          3. 进度信息: 显示当前/总数 (如 70/100)
          4. 预估时间: 显示ETA (预计剩余时间)
          5. 速度显示: 显示处理速度 (如 50 items/s)
          6. 完成消息: 完成后显示完成状态和耗时
          7. 多进度条: 同时显示多个进度(如总体和当前)
          8. 不确定进度: 处理时间未知时显示循环动画
          9. 进度颜色: 根据进度显示不同颜色

          检查点:
          - 进度更新流畅不闪烁
          - 预估时间计算准确
          - 窄终端自动缩短

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/progress/bar.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites: []

  - id: "ISSUE-CLI-011C~criterion-2"
    name: "加载动画与旋转器"
    description: |
      实现加载动画和旋转器组件，用于不确定时间的操作反馈。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/progress/spinner.test.ts"
        test_files:
          - "src/cli/progress/spinner.test.ts"
      integration:
        command: "npm test -- src/cli/progress/spinner.integration.test.ts"
        test_files:
          - "src/cli/progress/spinner.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/progress/spinner"
        test_files:
          - "e2e/cli/progress/spinner.spec.ts"
      ai:
        prompt: |
          请验证加载动画与旋转器组件的实现:
          1. 旋转器样式: `|/-\` 或 `⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏` (Unicode点阵)
          2. 自定义文字: `Loading...` 或 `正在初始化...`
          3. 动画速度: 可配置动画更新频率
          4. 成功状态: 完成后显示✓或√标记
          5. 失败状态: 失败时显示✗或×标记
          6. 警告状态: 警告时显示⚠标记
          7. 多行旋转器: 同时显示多个加载状态
          8. 非TTY模式: 非交互环境禁用动画
          9. 静音模式: `--quiet` 禁用所有动画

          检查点:
          - 动画在终端流畅运行
          - 完成后状态显示清晰
          - 非TTY环境输出文本

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/progress/spinner.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<3 seconds"
    prerequisites:
      - "ISSUE-CLI-011C~criterion-1"

  - id: "ISSUE-CLI-011C~criterion-3"
    name: "操作反馈与状态"
    description: |
      实现操作反馈和状态显示，包括成功/失败提示、步骤指示、任务列表等。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/progress/feedback.test.ts"
        test_files:
          - "src/cli/progress/feedback.test.ts"
      integration:
        command: "npm test -- src/cli/progress/feedback.integration.test.ts"
        test_files:
          - "src/cli/progress/feedback.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/progress/feedback"
        test_files:
          - "e2e/cli/progress/feedback.spec.ts"
      ai:
        prompt: |
          请验证操作反馈与状态功能的实现:
          1. 成功消息: 操作成功显示绿色✓和成功信息
          2. 错误消息: 操作失败显示红色✗和错误详情
          3. 警告消息: 警告显示黄色⚠和警告信息
          4. 信息消息: 一般信息显示蓝色ℹ
          5. 步骤指示: 显示多步骤操作的当前步骤(Step 2/5)
          6. 任务列表: 显示任务及其状态 [✓] Task1 [ ] Task2
          7. 实时日志: 显示操作过程中的详细日志
          8. 折叠输出: 成功后折叠详细输出，显示摘要
          9. 错误追踪: 失败时显示完整的错误堆栈

          检查点:
          - 消息级别区分清晰
          - 步骤进度显示准确
          - 错误信息完整有用

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/progress/feedback.ts"
          - "src/cli/progress/steps.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites:
      - "ISSUE-CLI-011C~criterion-2"

  - id: "ISSUE-CLI-011C~criterion-4"
    name: "并发操作进度"
    description: |
      实现并发操作的进度显示，支持多任务并行时的进度管理。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/progress/concurrent.test.ts"
        test_files:
          - "src/cli/progress/concurrent.test.ts"
      integration:
        command: "npm test -- src/cli/progress/concurrent.integration.test.ts"
        test_files:
          - "src/cli/progress/concurrent.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/progress/concurrent"
        test_files:
          - "e2e/cli/progress/concurrent.spec.ts"
      ai:
        prompt: |
          请验证并发操作进度功能的实现:
          1. 多任务进度: 同时显示多个任务的进度
          2. 任务标签: 每个任务有识别标签(Task A, Task B)
          3. 总体进度: 显示所有任务的总体完成百分比
          4. 动态更新: 各任务进度独立更新
          5. 完成隐藏: 完成的任务可自动隐藏或折叠
          6. 错误处理: 单个任务失败不影响其他任务显示
          7. 并发控制: 限制同时显示的任务数量
          8. 优先级: 重要任务的进度优先显示

          检查点:
          - 多任务更新不冲突
          - 终端不混乱
          - 总体进度计算准确

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/progress/concurrent.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites:
      - "ISSUE-CLI-011C~criterion-3"
