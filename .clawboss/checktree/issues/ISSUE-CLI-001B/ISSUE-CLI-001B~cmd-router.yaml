id: "ISSUE-CLI-001B"
issue_number: 1
slug: "cmd-router"
title: "命令路由系统"
description: |
  实现AI-Me CLI的命令路由系统，支持子命令注册、命令层级嵌套、路由匹配、命令别名、默认命令处理。
  路由器负责将解析后的参数分发到对应的命令处理器。
status: "pending"
is_parent: false
sub_issues: []
prerequisites:
  - "ISSUE-CLI-001A"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-CLI-001B~criterion-1"
    name: "命令注册与匹配"
    description: |
      支持扁平命令(如 'init')和层级命令(如 'behavior create')的注册。实现最长前缀匹配和模糊匹配建议。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/router/router.test.ts"
        test_files:
          - "src/cli/router/router.test.ts"
          - "src/cli/router/matcher.test.ts"
      integration:
        command: "npm test -- src/cli/router/integration.test.ts"
        test_files:
          - "src/cli/router/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/router"
        test_files:
          - "e2e/cli/router/basic-routing.spec.ts"
          - "e2e/cli/router/nested-commands.spec.ts"
      ai:
        prompt: |
          请验证命令路由系统的注册与匹配功能:
          1. 注册命令: `router.register('behavior create', handler)` 是否生效
          2. 匹配测试: `ai-me behavior create` 是否正确路由到behavior create处理器
          3. 模糊匹配: 输入 `ai-me beh` 是否在DEBUG模式下输出"Did you mean: behavior?"
          4. 层级路由: `ai-me behavior tag add` 是否正确匹配到四级命令
          5. 未匹配处理: `ai-me unknown` 是否返回404并列出可用命令
          6. 参数传递: 处理器是否收到已解析的参数对象
          7. 注册覆盖: 重复注册同名命令是否抛出错误

          检查点:
          - 路由表数据结构高效(建议使用Map/Trie)
          - 匹配时间复杂度O(n)或更好
          - 命令别名(alias)支持

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/router/router.ts"
          - "src/cli/router/types.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<3 seconds"
    prerequisites: []

  - id: "ISSUE-CLI-001B~criterion-2"
    name: "命令处理器执行"
    description: |
      支持同步和异步命令处理器，实现中间件链(pre-hooks, post-hooks)，处理处理器异常并返回适当的退出码。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/router/executor.test.ts"
        test_files:
          - "src/cli/router/executor.test.ts"
          - "src/cli/router/middleware.test.ts"
      integration:
        command: "npm test -- src/cli/router/execution.integration.test.ts"
        test_files:
          - "src/cli/router/execution.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/execution"
        test_files:
          - "e2e/cli/execution/success.spec.ts"
          - "e2e/cli/execution/failure.spec.ts"
      ai:
        prompt: |
          请验证命令处理器执行机制:
          1. 同步处理器: `router.register('sync-cmd', () => { console.log('ok'); })` 是否正常工作
          2. 异步处理器: `router.register('async-cmd', async () => { await delay(100); })` 是否正确等待
          3. 中间件链: 是否支持 pre-hook 和 post-hook 按顺序执行
          4. 异常处理: 处理器抛出错误时是否被catch并返回exit code 1
          5. 退出码: 成功返回0，各种错误返回不同非零码(如2=参数错误, 3=执行错误)
          6. 上下文传递: 中间件间是否可通过context对象共享数据
          7. 超时控制: 长时间运行的命令是否支持超时中断

          检查点:
          - 异步处理器正确使用async/await
          - 错误不会导致进程崩溃
          - 资源清理(如数据库连接)在错误时正常执行

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/router/executor.ts"
          - "src/cli/router/middleware.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites:
      - "ISSUE-CLI-001B~criterion-1"

  - id: "ISSUE-CLI-001B~criterion-3"
    name: "命令别名与默认命令"
    description: |
      支持命令别名(如 'b' 指向 'behavior')，实现当用户输入不完整命令时的默认命令处理。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/router/aliases.test.ts"
        test_files:
          - "src/cli/router/aliases.test.ts"
          - "src/cli/router/defaults.test.ts"
      integration:
        command: "npm test -- src/cli/router/alias.integration.test.ts"
        test_files:
          - "src/cli/router/alias.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/aliases"
        test_files:
          - "e2e/cli/router/aliases.spec.ts"
          - "e2e/cli/router/defaults.spec.ts"
      ai:
        prompt: |
          请验证命令别名与默认命令功能:
          1. 别名注册: `router.alias('b', 'behavior')` 后 `ai-me b list` 是否等于 `ai-me behavior list`
          2. 多别名: 一个命令是否可拥有多个别名(如 'ls' 和 'list' 都指向 'list')
          3. 默认子命令: `ai-me behavior` 无子命令时是否执行默认行为(如显示列表)
          4. 根命令默认: `ai-me` 无参数时是否显示帮助或进入交互模式
          5. 别名冲突: 别名与现有命令冲突时是否报错
          6. 动态别名: 是否支持运行时从配置加载别名
          7. 别名帮助: 帮助文档中是否显示命令别名信息

          检查点:
          - 别名解析效率不低于直接命令
          - 别名的帮助文本正确显示
          - 循环别名检测(如a->b, b->a)

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/router/alias-manager.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<3 seconds"
    prerequisites:
      - "ISSUE-CLI-001B~criterion-1"

  - id: "ISSUE-CLI-001B~criterion-4"
    name: "与参数解析器集成"
    description: |
      路由器与CLI-001A参数解析器无缝集成，解析后的参数正确传递给命令处理器。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/router/parser-integration.test.ts"
        test_files:
          - "src/cli/router/parser-integration.test.ts"
      integration:
        command: "npm test -- src/cli/integration/router-parser.test.ts"
        test_files:
          - "src/cli/integration/router-parser.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/integration"
        test_files:
          - "e2e/cli/integration/full-flow.spec.ts"
      ai:
        prompt: |
          请验证路由器与参数解析器的集成:
          1. 完整流程: `ai-me behavior create --name "Test" --priority high` 的完整处理
          2. 参数传递: 命令处理器接收的参数对象结构是否正确
          3. 选项转发: 全局选项(如 --verbose)是否传递给所有子命令
          4. 子命令选项隔离: behavior子命令的选项不应影响tree子命令
          5. 帮助集成: `ai-me behavior --help` 显示behavior子命令的帮助
          6. 错误传播: 参数解析错误是否被正确捕获并显示
          7. 性能: 解析+路由的总时间是否可接受(<50ms)

          检查点:
          - 参数解析与路由解耦但协作良好
          - 错误边界清晰，易于调试
          - 测试覆盖率达到80%以上

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/index.ts"
          - "src/cli/bootstrap.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites:
      - "ISSUE-CLI-001B~criterion-2"
      - "ISSUE-CLI-001A"
