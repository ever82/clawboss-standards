          - "tests/e2e/performance/baseline-framework.spec.ts"
      ai:
        prompt: |
          请验证性能基准测试框架实现是否符合以下要求：
          1. 框架是否支持三种测试模式：基准测试(benchmark)、负载测试(load)、压力测试(stress)
          2. 是否提供了统一的测试用例基类或接口，便于扩展新的性能测试
          3. 是否实现了测试数据的自动收集和统计计算（平均值、中位数、P90、P95、P99）
          4. 是否支持测试结果与历史基线的自动对比和回归检测
          5. 测试配置是否支持通过JSON/YAML文件进行参数化配置
