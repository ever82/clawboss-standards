  - id: "ISSUE-CLI-004~criterion-1"
    name: "工作空间管理命令"
    description: |
      实现 `ai-me workspace` 相关命令，支持工作空间的创建、切换、列表、删除等操作，与WS-001服务集成。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/workspace/*.test.ts"
        test_files:
          - "src/cli/commands/workspace/create.test.ts"
          - "src/cli/commands/workspace/switch.test.ts"
          - "src/cli/commands/workspace/list.test.ts"
      integration:
        command: "npm test -- src/cli/commands/workspace/integration.test.ts"
        test_files:
          - "src/cli/commands/workspace/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/workspace"
        test_files:
          - "e2e/cli/workspace/create.spec.ts"
          - "e2e/cli/workspace/switch.spec.ts"
          - "e2e/cli/workspace/list.spec.ts"
      ai:
        prompt: |
          请验证工作空间管理命令的实现:
          1. 创建工作空间: `ai-me workspace create <name> [--template default]`
          2. 切换工作空间: `ai-me workspace switch <name>` 或 `ai-me use <name>`
          3. 列出工作空间: `ai-me workspace list [--verbose]`
          4. 显示当前工作空间: `ai-me workspace current` 或 `ai-me pwd`
          5. 删除工作空间: `ai-me workspace delete <name> [--force]`
          6. 克隆工作空间: `ai-me workspace clone <source> <target>`
          7. 工作空间信息: `ai-me workspace info <name>` 显示详情
          8. 设置默认: `ai-me workspace set-default <name>`

          检查点:
          - 与WS-001服务的正确集成
          - 切换后环境变量/配置正确更新
          - 不存在的工作空间操作给出友好错误

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/workspace/index.ts"
          - "src/workspace/services/core.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
