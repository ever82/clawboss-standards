id: "ISSUE-CLI-007"
issue_number: 7
slug: "system-commands"
title: "系统管理命令"
description: |
  实现AI-Me CLI的系统管理相关命令，包括用户认证、系统信息、健康检查、日志查看、备份恢复等功能。
  命令需要与SEC、INFRA、MON等系列服务集成。
status: "pending"
is_parent: false
sub_issues: []
prerequisites:
  - "ISSUE-CLI-001B"
  - "ISSUE-SEC-001"
  - "ISSUE-INFRA-005"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-CLI-007~criterion-1"
    name: "用户认证命令"
    description: |
      实现 `ai-me auth` 相关命令，支持登录、登出、令牌管理和用户信息查看，与SEC-001服务集成。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/auth/*.test.ts"
        test_files:
          - "src/cli/commands/auth/login.test.ts"
          - "src/cli/commands/auth/logout.test.ts"
          - "src/cli/commands/auth/status.test.ts"
      integration:
        command: "npm test -- src/cli/commands/auth/integration.test.ts"
        test_files:
          - "src/cli/commands/auth/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/auth"
        test_files:
          - "e2e/cli/auth/login.spec.ts"
          - "e2e/cli/auth/logout.spec.ts"
      ai:
        prompt: |
          请验证用户认证命令的实现:
          1. 登录: `ai-me auth login [--method password|token|sso]`
          2. 交互登录: 无参数时提示输入用户名密码
          3. 令牌登录: `ai-me auth login --token <api-token>`
          4. 登录状态: `ai-me auth status` 显示当前登录状态
          5. 登出: `ai-me auth logout` 清除本地凭据
          6. 令牌刷新: 自动刷新即将过期的访问令牌
          7. 多账号: 支持切换不同账号 `ai-me auth switch`
          8. 配置文件: 支持从配置文件读取默认账号
          9. 安全存储: 凭据安全存储在系统密钥库

          检查点:
          - 与SEC-001认证服务正确集成
          - 密码输入隐藏显示
          - 令牌安全存储，不明文保存

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/auth/index.ts"
          - "src/security/services/auth.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

  - id: "ISSUE-CLI-007~criterion-2"
    name: "系统信息与诊断"
    description: |
      实现 `ai-me system info` 和 `ai-me doctor` 命令，显示系统信息和诊断问题。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/system/*.test.ts"
        test_files:
          - "src/cli/commands/system/info.test.ts"
          - "src/cli/commands/system/doctor.test.ts"
      integration:
        command: "npm test -- src/cli/commands/system/integration.test.ts"
        test_files:
          - "src/cli/commands/system/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/system"
        test_files:
          - "e2e/cli/system/info.spec.ts"
          - "e2e/cli/system/doctor.spec.ts"
      ai:
        prompt: |
          请验证系统信息与诊断命令的实现:
          1. 系统信息: `ai-me system info` 显示版本、平台、配置路径
          2. 详细模式: `--verbose` 显示更多细节(依赖版本、环境变量)
          3. JSON输出: `--json` 结构化输出供脚本使用
          4. 诊断命令: `ai-me doctor` 检查常见问题
          5. 检查项: 数据库连接、权限、依赖完整性、配置有效性
          6. 问题修复: `ai-me doctor --fix` 自动修复可修复的问题
          7. 详细报告: `--report` 生成详细诊断报告
          8. 健康评分: 显示系统健康评分和改进建议

          检查点:
          - 检查项覆盖常见问题场景
          - 诊断结果清晰，问题有修复建议
          - 自动修复有确认提示

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/system/info.ts"
          - "src/cli/commands/system/doctor.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites:
      - "ISSUE-CLI-007~criterion-1"

  - id: "ISSUE-CLI-007~criterion-3"
    name: "日志管理命令"
    description: |
      实现 `ai-me logs` 命令，支持查看、过滤、导出系统日志，与INFRA-006B日志系统集成。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/logs/*.test.ts"
        test_files:
          - "src/cli/commands/logs/view.test.ts"
          - "src/cli/commands/logs/export.test.ts"
      integration:
        command: "npm test -- src/cli/commands/logs/integration.test.ts"
        test_files:
          - "src/cli/commands/logs/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/logs"
        test_files:
          - "e2e/cli/logs/view.spec.ts"
          - "e2e/cli/logs/export.spec.ts"
      ai:
        prompt: |
          请验证日志管理命令的实现:
          1. 查看日志: `ai-me logs` 显示最近日志
          2. 行数限制: `--lines 100` 或 `-n 100` 显示最近100行
          3. 级别过滤: `--level error|warn|info|debug`
          4. 时间范围: `--since "2026-04-01" --until "2026-04-30"`
          5. 模块过滤: `--module core|cli|workspace` 只显示指定模块
          6. 实时跟踪: `--follow` 或 `-f` 实时显示新日志(tail -f效果)
          7. 导出日志: `ai-me logs export --output logs.zip`
          8. 清空日志: `ai-me logs clear` 有确认提示
          9. 日志统计: `ai-me logs stats` 显示错误率等统计

          检查点:
          - 与INFRA-006B日志系统正确集成
          - 实时跟踪模式性能良好
          - 大日志文件处理高效

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/logs/index.ts"
          - "src/infra/logging/viewer.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<4 seconds"
    prerequisites:
      - "ISSUE-CLI-007~criterion-2"
      - "ISSUE-INFRA-006B"

  - id: "ISSUE-CLI-007~criterion-4"
    name: "备份与恢复命令"
    description: |
      实现 `ai-me backup` 和 `ai-me restore` 命令，支持数据备份和恢复操作，与INFRA-008服务集成。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/backup/*.test.ts"
        test_files:
          - "src/cli/commands/backup/create.test.ts"
          - "src/cli/commands/backup/restore.test.ts"
          - "src/cli/commands/backup/list.test.ts"
      integration:
        command: "npm test -- src/cli/commands/backup/integration.test.ts"
        test_files:
          - "src/cli/commands/backup/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/backup"
        test_files:
          - "e2e/cli/backup/create.spec.ts"
          - "e2e/cli/backup/restore.spec.ts"
      ai:
        prompt: |
          请验证备份与恢复命令的实现:
          1. 创建备份: `ai-me backup create [--name "manual-backup"]`
          2. 自动命名: 无名称时自动生成带时间戳的名称
          3. 备份列表: `ai-me backup list` 显示所有备份
          4. 备份详情: `ai-me backup info <name>` 显示备份大小、时间、内容
          5. 恢复备份: `ai-me restore <name>` 有确认提示
          6. 部分恢复: `--only-data` 或 `--only-config` 部分恢复
          7. 删除备份: `ai-me backup delete <name>`
          8. 导出备份: `ai-me backup export <name> --output ./backup.zip`
          9. 导入备份: `ai-me backup import ./backup.zip`

          检查点:
          - 与INFRA-008备份服务正确集成
          - 恢复前有数据丢失警告
          - 备份文件完整性校验

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/commands/backup/index.ts"
          - "src/infra/backup/manager.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites:
      - "ISSUE-CLI-007~criterion-3"
      - "ISSUE-INFRA-008"

  - id: "ISSUE-CLI-007~criterion-5"
    name: "缓存与清理命令"
    description: |
      实现 `ai-me cache` 和 `ai-me cleanup` 命令，支持缓存管理和系统清理。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/commands/cache/*.test.ts"
        test_files:
          - "src/cli/commands/cache/manage.test.ts"
          - "src/cli/commands/cleanup/index.test.ts"
      integration:
        command: "npm test -- src/cli/commands/cache/integration.test.ts"
        test_files:
          - "src/cli/commands/cache/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/cache"
        test_files:
          - "e2e/cli/cache/manage.spec.ts"
          - "e2e/cli/cleanup/index.spec.ts"
      ai:
        prompt: |
          请验证缓存与清理命令的实现:
          1. 缓存列表: `ai-me cache list` 显示缓存项和大小
          2. 缓存清理: `ai-me cache clear [--type query|render|session]`
          3. 缓存统计: `ai-me cache stats` 显示命中率等
          4. 系统清理: `ai-me cleanup` 清理临时文件和日志
          5. 清理范围: `--temp`, `--logs`, `--cache`, `--all`
          6. 预览模式: `--dry-run` 预览将要清理的内容
          7. 自动清理: `ai-me cleanup --schedule daily` 设置自动清理
          8. 空间回收: 显示清理释放的磁盘空间
          9. 工作空间清理: `ai-me workspace cleanup` 清理当前工作空间

          检查点:
          - 与INFRA-009缓存服务正确集成
          - 清理操作可撤销或有备份
          - 预览模式准确显示影响

          Return format: {"passed": true/false, "reason": "详细解释"}
