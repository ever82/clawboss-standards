id: "ISSUE-DEPLOY-002"
issue_number: 2
title: "容器化支持"
slug: "docker-support"
module: "DEPLOY"
status: "pending"
description: |
  实现完整的Docker容器化支持，包括Dockerfile编写、多阶段构建、Docker Compose配置、
  镜像优化和发布。支持开发环境容器化、生产部署和Kubernetes编排。
  确保应用可以在任何支持Docker的环境中一致运行。
is_parent: false
prerequisites:
  - "ISSUE-INFRA-012"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-DEPLOY-002~criterion-1"
    name: "多阶段Dockerfile实现"
    description: "编写优化的多阶段Dockerfile，支持开发、构建、生产三个阶段，最小化镜像体积"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- tests/unit/deploy/dockerfile.test.ts"
        test_files:
          - "tests/unit/deploy/dockerfile.test.ts"
      integration:
        command: "npm run test:integration -- tests/integration/deploy/docker-build.test.ts"
        test_files:
          - "tests/integration/deploy/docker-build.test.ts"
      e2e:
        command: "npm run test:e2e -- tests/e2e/deploy/docker-image-creation.test.ts"
        test_files:
          - "tests/e2e/deploy/docker-image-creation.test.ts"
      ai:
        prompt: |
          请验证多阶段Dockerfile实现是否符合以下要求：
          1. 是否采用多阶段构建（至少包含builder和runtime两个阶段）
          2. 生产镜像是否基于distroless或alpine等轻量级基础镜像
          3. 镜像体积是否控制在合理范围（生产镜像<200MB）
          4. 是否正确设置非root用户运行应用
          5. 是否优化层缓存策略（依赖安装在代码复制之前）
          6. 是否包含健康检查（HEALTHCHECK）指令
          7. 是否暴露正确的端口
          返回格式: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "docker/Dockerfile"
          - "docker/Dockerfile.dev"
          - ".dockerignore"
        model: "claude-sonnet-4-6"
    execution_time: "<3 minutes"

  - id: "ISSUE-DEPLOY-002~criterion-2"
    name: "Docker Compose配置"
    description: "配置Docker Compose支持开发环境和生产环境，包含服务依赖、网络、卷管理"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- tests/unit/deploy/docker-compose.test.ts"
        test_files:
          - "tests/unit/deploy/docker-compose.test.ts"
      integration:
        command: "npm run test:integration -- tests/integration/deploy/compose-orchestration.test.ts"
        test_files:
          - "tests/integration/deploy/compose-orchestration.test.ts"
      e2e:
        command: "npm run test:e2e -- tests/e2e/deploy/full-stack-docker.test.ts"
        test_files:
          - "tests/e2e/deploy/full-stack-docker.test.ts"
      ai:
        prompt: |
          请验证Docker Compose配置是否符合以下要求：
          1. 是否提供docker-compose.yml（生产）和docker-compose.dev.yml（开发）
          2. 服务依赖关系是否正确配置（depends_on + 健康检查）
          3. 网络和卷配置是否合理（应用隔离、数据持久化）
          4. 环境变量配置是否通过.env文件管理
          5. 资源限制是否配置（CPU、内存限制）
          6. 重启策略是否配置
          7. 日志轮转是否配置
          返回格式: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "docker-compose.yml"
          - "docker-compose.dev.yml"
          - "docker-compose.override.yml"
          - "docker/.env.example"
        model: "claude-sonnet-4-6"
    execution_time: "<2 minutes"

