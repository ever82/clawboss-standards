title: "输出格式化"
description: |
  实现AI-Me CLI的输出格式化功能，支持多种输出格式(JSON、表格、YAML等)、颜色主题、终端自适应等。
  依赖CLI-002、CLI-003、CLI-004命令实现。
status: "pending"
