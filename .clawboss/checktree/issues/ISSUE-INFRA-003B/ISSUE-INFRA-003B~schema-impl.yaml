      integration:
        command: "npm test -- src/infra/schema-sqlite.integration.test.ts"
        test_files: ["src/infra/schema-sqlite.integration.test.ts"]
      manual:
        instructions: |
          1. 运行 SQLite DDL 脚本创建数据库
          2. 验证所有表创建成功：.tables 命令
          3. 检查表结构：.schema table_name
          4. 验证索引存在：.indexes 或查询 sqlite_master
          5. 测试外键约束生效（尝试违反约束的操作）
        required_tools: ["sqlite3", "bash"]
    execution_time: "<60 seconds"
