id: "ISSUE-DEV-002"
issue_number: 2
title: "代码规范与质量检查"
slug: "lint-code-quality"
status: "pending"
description: |
  建立全面的代码规范体系和自动化质量检查机制，确保代码风格一致性、
  可维护性和可靠性。包括ESLint/Prettier配置、TypeScript严格模式、
  代码复杂度检查、提交信息规范等。
is_parent: false
prerequisites:
  - "ISSUE-INFRA-004"
  - "ISSUE-DEV-001"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-DEV-002~criterion-1"
    name: "ESLint和Prettier配置"
    description: |
      配置ESLint进行代码质量检查，Prettier进行代码格式化。
      建立统一的代码风格规范，支持TypeScript和JavaScript文件。
      配置预提交钩子，确保提交前自动格式化和修复问题。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/dev-process/lint/eslint-config.test.ts"
        test_files:
          - "src/dev-process/lint/eslint-config.test.ts"
          - "src/dev-process/lint/prettier-config.test.ts"
      integration:
        command: "npm test -- src/dev-process/lint/integration.test.ts"
        test_files:
          - "src/dev-process/lint/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- dev-process/lint-workflow"
        test_files:
          - "tests/e2e/dev-process/lint-workflow.spec.ts"
      ai:
        prompt: |
          请验证ESLint和Prettier配置是否完善：
          1. ESLint配置覆盖TypeScript最佳实践（@typescript-eslint/recommended）
          2. 集成prettier-eslint-config解决规则冲突
          3. 配置import排序规则（import/order）
          4. 配置未使用变量/导入检测（no-unused-vars等）
          5. Prettier配置统一：单引号、无分号、2空格缩进、100字符行宽
          6. 预提交钩子（husky + lint-staged）配置正确
          7. 提供IDE配置文件（.vscode/settings.json）
          8. 包含忽略文件配置（.eslintignore, .prettierignore）
          请检查配置文件和工具集成情况。
        context_files:
          - ".eslintrc.js"
          - ".prettierrc"
          - ".husky/pre-commit"
          - "package.json"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"

  - id: "ISSUE-DEV-002~criterion-2"
    name: "TypeScript严格模式配置"
    description: |
      启用TypeScript严格模式，包括strictNullChecks、strictFunctionTypes、
      noImplicitAny等选项，提升代码类型安全性，在编译期捕获更多潜在错误。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/dev-process/ts/strict-checker.test.ts"
        test_files:
          - "src/dev-process/ts/strict-checker.test.ts"
      integration:
        command: "npm test -- src/dev-process/ts/integration.test.ts"
        test_files:
          - "src/dev-process/ts/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- dev-process/typescript"
        test_files:
          - "tests/e2e/dev-process/typescript.spec.ts"
      ai:
        prompt: |
          请验证TypeScript严格模式配置是否正确：
          1. tsconfig.json启用strict: true包含所有严格选项
          2. 单独启用strictNullChecks，防止null/undefined错误
          3. 启用strictFunctionTypes，增强函数类型检查
          4. 启用noImplicitAny，禁止隐式any类型
          5. 启用noUnusedLocals和noUnusedParameters
          6. 启用exactOptionalPropertyTypes（可选）
          7. 所有现有代码通过严格模式检查，无类型错误
          8. 提供类型检查脚本（npm run type-check）
          请检查tsconfig.json配置和类型检查工具。
        context_files:
          - "tsconfig.json"
          - "tsconfig.build.json"
          - "src/dev-process/ts/strict-checker.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"

  - id: "ISSUE-DEV-002~criterion-3"
    name: "代码复杂度检查"
    description: |
      配置代码复杂度检查工具，监控圈复杂度、认知复杂度、代码重复率等指标。
      设定阈值并在超标时发出警告或阻止合并，防止代码过度复杂化。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/dev-process/complexity/analyzer.test.ts"
        test_files:
          - "src/dev-process/complexity/analyzer.test.ts"
          - "src/dev-process/complexity/thresholds.test.ts"
      integration:
        command: "npm test -- src/dev-process/complexity/integration.test.ts"
        test_files:
          - "src/dev-process/complexity/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- dev-process/complexity"
        test_files:
          - "tests/e2e/dev-process/complexity.spec.ts"
      ai:
        prompt: |
          请验证代码复杂度检查实现是否完善：
          1. 配置圈复杂度检查（cyclomatic complexity），阈值默认10，严格5
          2. 配置认知复杂度检查（cognitive complexity），阈值默认15
          3. 配置代码重复率检测（jscpd或类似工具），阈值5%
          4. 配置函数长度检查，最大50行（不含空行和注释）
          5. 配置文件长度检查，最大500行
          6. 超标时CI构建失败，阻止合并
          7. 提供复杂度报告，显示最复杂的函数和文件
          8. 支持渐进式改进，遗留代码可配置例外（需标注原因）
          请检查复杂度分析器和CI集成配置。
        context_files:
          - ".complexityrc.json"
          - "src/dev-process/complexity/analyzer.ts"
          - ".github/workflows/complexity-check.yml"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"

  - id: "ISSUE-DEV-002~criterion-4"
    name: "提交信息规范"
    description: |
      建立Git提交信息规范，使用commitlint验证提交格式。
      支持conventional commits规范，自动生成CHANGELOG，
      并与Issue追踪系统集成，要求提交关联Issue编号。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/dev-process/commit/validator.test.ts"
        test_files:
          - "src/dev-process/commit/validator.test.ts"
          - "src/dev-process/commit/parser.test.ts"
      integration:
        command: "npm test -- src/dev-process/commit/integration.test.ts"
        test_files:
          - "src/dev-process/commit/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- dev-process/commit-workflow"
        test_files:
          - "tests/e2e/dev-process/commit-workflow.spec.ts"
      ai:
        prompt: |
          请验证提交信息规范实现是否完整：
          1. 配置commitlint使用conventional commits规范
          2. 提交格式：type(scope): subject，支持body和footer
          3. type限制：feat, fix, docs, style, refactor, test, chore等
          4. subject首字母小写，结尾无句号，长度≤72字符
          5. 要求提交关联Issue编号（如：Closes #123）
          6. 配置commit-msg钩子，本地提交时验证
          7. BREAKING CHANGE标记支持，自动生成重大变更说明
          8. 提供提交辅助工具（git cz或commitizen配置）
          9. 与CheckTree集成，提交自动更新Issue状态
          请检查commitlint配置、钩子和集成脚本。
        context_files:
          - ".commitlintrc.js"
          - ".husky/commit-msg"
          - "src/dev-process/commit/validator.ts"
          - ".czrc"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-DEV-002~criterion-1"
