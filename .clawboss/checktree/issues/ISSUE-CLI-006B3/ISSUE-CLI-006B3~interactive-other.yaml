  - id: "ISSUE-CLI-006B3~criterion-1"
    name: "交互式搜索界面"
    description: |
      实现交互式搜索界面，支持实时搜索、过滤条件动态调整、结果预览和详情查看。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/interactive/search/ui.test.ts"
        test_files:
          - "src/cli/interactive/search/ui.test.ts"
      integration:
        command: "npm test -- src/cli/interactive/search/integration.test.ts"
        test_files:
          - "src/cli/interactive/search/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/interactive/search-ui"
        test_files:
          - "e2e/cli/interactive/search/ui.spec.ts"
      ai:
        prompt: |
          请验证交互式搜索界面的实现:
          1. 启动搜索: `ai-me search --interactive` 或 `ai-me search -i`
          2. 实时搜索: 输入关键词实时显示匹配结果
          3. 过滤器: F键打开过滤器面板，勾选过滤条件
          4. 过滤器: 状态、优先级、标签、日期范围、负责人等
          5. 排序: S键切换排序方式(相关性/时间/优先级)
          6. 结果浏览: 上下箭头浏览结果，Enter查看详情
          7. 快捷操作: 选中结果后可编辑、删除、更改状态
          8. 搜索历史: H键查看和选择历史搜索
          9. 保存搜索: 将当前搜索条件保存为快捷方式

          检查点:
          - 搜索响应快速(<500ms)
          - 过滤器组合逻辑正确
          - 大结果集分页或虚拟滚动

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/interactive/search/ui.ts"
          - "src/cli/commands/search/index.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites: []

  - id: "ISSUE-CLI-006B3~criterion-2"
    name: "交互式报告生成器"
    description: |
      实现交互式报告生成向导，引导用户选择报告类型、时间范围、筛选条件，预览并导出报告。
    status: pending
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/cli/interactive/report/wizard.test.ts"
        test_files:
          - "src/cli/interactive/report/wizard.test.ts"
      integration:
        command: "npm test -- src/cli/interactive/report/integration.test.ts"
        test_files:
          - "src/cli/interactive/report/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- cli/interactive/report-wizard"
        test_files:
          - "e2e/cli/interactive/report/wizard.spec.ts"
      ai:
        prompt: |
          请验证交互式报告生成器的实现:
          1. 启动向导: `ai-me report --interactive` 选择报告类型
          2. 报告类型: 进度报告、时间追踪、完成统计、燃尽图等
          3. 时间范围: 日期选择器或预设(本周/本月/本季度)
          4. 筛选条件: 选择工作空间、标签、优先级等
          5. 报告预览: 在终端中实时预览报告内容
          6. 图表展示: ASCII图表展示统计数据
          7. 导出格式: 选择导出格式(PDF/JSON/HTML/Markdown)
          8. 保存位置: 文件选择器选择保存路径
          9. 定时报告: 可选设置定期生成报告

          检查点:
          - 向导步骤逻辑清晰
          - 预览与最终输出一致
          - 大报告生成分步显示进度

          Return format: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/cli/interactive/report/wizard.ts"
          - "src/cli/commands/report/index.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<5 seconds"
    prerequisites:
      - "ISSUE-CLI-006B3~criterion-1"
      - "ISSUE-CLI-010"

  - id: "ISSUE-CLI-006B3~criterion-3"
