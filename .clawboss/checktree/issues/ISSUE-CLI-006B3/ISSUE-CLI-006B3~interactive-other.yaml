      ai:
        prompt: |
          请验证交互式配置编辑器的实现:
          1. 启动编辑器: `ai-me config --interactive` 或 `ai-me config -i`
          2. 分类浏览: 配置项按分类展示(通用/CLI/核心/UI)
          3. 搜索配置: /键搜索配置项名称或描述
          4. 编辑值: Enter编辑选中配置项，根据类型显示合适输入
          5. 类型支持: 字符串、数字、布尔值、数组、对象
          6. 验证反馈: 非法值实时提示错误
