criteria:
  - id: "ISSUE-PLUGIN-001D~criterion-1"
    name: "生命周期状态机实现"
    description: "实现插件生命周期状态机，定义installed、activating、active、deactivating、inactive、uninstalled等状态及状态转换"
    category: "feature"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    note: "状态转换需验证合法性，禁止非法状态跳转"
    execution_time: "<500 milliseconds"
    prerequisites: []
    implementations:
      - type: "component"
        path: "src/plugin/lifecycle/plugin-state-machine.ts"
      - type: "types"
        path: "src/plugin/lifecycle/lifecycle-states.types.ts"
    verification:
      unit:
        command: "npm test -- src/plugin/lifecycle/plugin-state-machine.test.ts"
        test_files:
          - "src/plugin/lifecycle/plugin-state-machine.test.ts"
          - "src/plugin/lifecycle/lifecycle-states.types.test.ts"
      integration:
        command: "npm run test:integration -- plugin-state-machine"
        test_files:
          - "tests/integration/plugin/lifecycle/state-machine.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- plugin-state-transitions"
        test_files:
          - "tests/e2e/plugin/lifecycle/state-transitions.e2e.test.ts"
      ai:
        prompt: |
          请验证生命周期状态机实现是否满足以下要求:
          1. 是否定义了完整的生命周期状态: installed -> activating -> active -> deactivating -> inactive -> uninstalled
          2. 是否包含错误状态(error)用于处理激活/停用失败的情况
          3. 状态转换是否有验证机制，非法转换是否抛出错误(如直接installed->uninstalled需经过中间状态)
          4. 是否提供状态转换钩子(onBeforeActivate, onAfterDeactivate等)
          5. 状态转换是否是原子操作(支持回滚，转换失败恢复之前状态)
          6. 是否提供状态查询API(getState, getStateHistory)
          7. 状态机是否是单例管理所有插件状态，还是每个插件独立实例
          8. 状态转换是否触发事件通知(其他组件可监听状态变化)
          返回格式: {"passed": true/false, "reason": "详细说明", "details": [{"check": "检查项", "passed": true/false}]}
        context_files:
          - "src/plugin/lifecycle/plugin-state-machine.ts"
          - "src/plugin/lifecycle/lifecycle-states.types.ts"
        model: "claude-sonnet-4-6"

  - id: "ISSUE-PLUGIN-001D~criterion-2"
    name: "激活与停用流程实现"
    description: "实现插件激活(activate)和停用(deactivate)流程，处理依赖注入、事件绑定、资源分配和释放"
    category: "feature"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    note: "激活失败时回滚到inactive状态，停用必须释放所有资源"
    execution_time: "<3 seconds"
    prerequisites: []
    implementations:
      - type: "component"
        path: "src/plugin/lifecycle/plugin-activator.ts"
      - type: "component"
        path: "src/plugin/lifecycle/plugin-deactivator.ts"
    verification:
      unit:
        command: "npm test -- src/plugin/lifecycle/plugin-activator.test.ts"
        test_files:
          - "src/plugin/lifecycle/plugin-activator.test.ts"
          - "src/plugin/lifecycle/plugin-deactivator.test.ts"
      integration:
        command: "npm run test:integration -- plugin-activation"
        test_files:
          - "tests/integration/plugin/lifecycle/activation.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- plugin-activate-deactivate"
        test_files:
          - "tests/e2e/plugin/lifecycle/activation.e2e.test.ts"
      ai:
        prompt: |
          请验证激活与停用流程是否满足以下要求:
          1. 激活流程是否按顺序执行: 验证依赖 -> 分配上下文 -> 调用activate() -> 注册扩展点 -> 标记active
          2. 停用流程是否按顺序执行: 注销扩展点 -> 解绑事件 -> 调用deactivate() -> 释放资源 -> 标记inactive
          3. activate()和deactivate()是否接收PluginContext参数，且支持异步(async/await)
          4. 激活超时是否可配置，超时时是否中断并标记为error状态
          5. 激活失败时是否执行回滚(清理已注册的内容、释放资源)
          6. 停用是否强制执行，即使deactivate()抛出异常也继续清理资源
          7. 是否支持延迟激活(安装后暂不激活，按需激活)
          8. 停用后重新激活是否重新初始化(状态重置)还是恢复之前状态
          返回格式: {"passed": true/false, "reason": "详细说明", "details": [{"check": "检查项", "passed": true/false}]}
        context_files:
          - "src/plugin/lifecycle/plugin-activator.ts"
          - "src/plugin/lifecycle/plugin-deactivator.ts"
        model: "claude-sonnet-4-6"

  - id: "ISSUE-PLUGIN-001D~criterion-3"
    name: "安装与卸载流程实现"
    description: "实现插件安装(install)和卸载(uninstall)流程，包括文件复制、依赖安装、配置初始化和清理"
    category: "feature"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    note: "卸载时必须清理所有插件数据，包括配置和存储"
    execution_time: "<10 seconds"
    prerequisites: []
    implementations:
      - type: "component"
        path: "src/plugin/lifecycle/plugin-installer.ts"
      - type: "component"
        path: "src/plugin/lifecycle/plugin-uninstaller.ts"
    verification:
      unit:
        command: "npm test -- src/plugin/lifecycle/plugin-installer.test.ts"
        test_files:
          - "src/plugin/lifecycle/plugin-installer.test.ts"
          - "src/plugin/lifecycle/plugin-uninstaller.test.ts"
      integration:
        command: "npm run test:integration -- plugin-install-uninstall"
        test_files:
          - "tests/integration/plugin/lifecycle/install-uninstall.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- plugin-lifecycle-full"
        test_files:
          - "tests/e2e/plugin/lifecycle/install-uninstall.e2e.test.ts"
      ai:
        prompt: |
          请验证安装与卸载流程是否满足以下要求:
          1. 安装流程是否包含: 下载插件 -> 验证完整性 -> 复制到安装目录 -> 安装依赖 -> 初始化配置
          2. 卸载流程是否包含: 停用插件(如果激活) -> 调用uninstall钩子 -> 删除文件 -> 清理配置 -> 清理存储
          3. 安装是否支持版本升级(自动卸载旧版本并保留配置)
          4. 卸载是否有确认机制，防止误操作，是否支持force卸载跳过确认
          5. 安装/卸载失败时是否有事务回滚(如依赖安装失败删除已复制文件)
          6. 是否支持批量安装/卸载(多个插件原子操作，全部成功或全部回滚)
          7. 卸载时是否保留用户数据选项(让用户选择是否删除配置和数据)
          8. 安装目录结构是否规范(如plugins/{name}/{version}/)
          返回格式: {"passed": true/false, "reason": "详细说明", "details": [{"check": "检查项", "passed": true/false}]}
        context_files:
          - "src/plugin/lifecycle/plugin-installer.ts"
          - "src/plugin/lifecycle/plugin-uninstaller.ts"
        model: "claude-sonnet-4-6"

  - id: "ISSUE-PLUGIN-001D~criterion-4"
    name: "热重载机制实现"
    description: "实现插件热重载机制，支持开发模式下自动检测文件变化并重新加载插件"
    category: "feature"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    note: "热重载需保持状态或优雅恢复，避免数据丢失"
    execution_time: "<5 seconds"
    prerequisites: []
    implementations:
      - type: "component"
        path: "src/plugin/lifecycle/plugin-hot-reloader.ts"
      - type: "component"
        path: "src/plugin/lifecycle/state-preserve.ts"
    verification:
      unit:
        command: "npm test -- src/plugin/lifecycle/plugin-hot-reloader.test.ts"
        test_files:
          - "src/plugin/lifecycle/plugin-hot-reloader.test.ts"
          - "src/plugin/lifecycle/state-preserve.test.ts"
      integration:
        command: "npm run test:integration -- plugin-hot-reload"
        test_files:
          - "tests/integration/plugin/lifecycle/hot-reload.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- plugin-hot-reload-dev"
        test_files:
          - "tests/e2e/plugin/lifecycle/hot-reload.e2e.test.ts"
      ai:
        prompt: |
          请验证热重载机制是否满足以下要求:
          1. 是否实现文件系统监视(watch)，检测插件代码文件变化
          2. 热重载是否支持debounce(防抖)，避免频繁保存导致连续重载
          3. 重载前是否调用state preservation(状态保持)保存插件运行时状态
          4. 重载后是否恢复之前状态，或通知插件进行状态重建
          5. 热重载失败时是否回退到之前版本，避免系统崩溃
          6. 是否支持选择性重载(只重载变化的模块，不重启整个插件)
          7. 热重载是否有开关配置(生产环境默认禁用)
          8. 重载过程是否有日志和通知反馈(开发体验友好)
          返回格式: {"passed": true/false, "reason": "详细说明", "details": [{"check": "检查项", "passed": true/false}]}
        context_files:
          - "src/plugin/lifecycle/plugin-hot-reloader.ts"
          - "src/plugin/lifecycle/state-preserve.ts"
        model: "claude-sonnet-4-6"

  - id: "ISSUE-PLUGIN-001D~criterion-5"
    name: "生命周期监控与日志"
    description: "实现插件生命周期监控，记录状态变化、性能指标、错误日志，支持调试和故障排查"
    category: "feature"
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    note: "生命周期事件持久化，支持历史查询和分析"
    execution_time: "<1 second"
    prerequisites: []
    implementations:
      - type: "component"
        path: "src/plugin/lifecycle/lifecycle-monitor.ts"
      - type: "component"
        path: "src/plugin/lifecycle/lifecycle-logger.ts"
    verification:
      unit:
        command: "npm test -- src/plugin/lifecycle/lifecycle-monitor.test.ts"
        test_files:
          - "src/plugin/lifecycle/lifecycle-monitor.test.ts"
          - "src/plugin/lifecycle/lifecycle-logger.test.ts"
      integration:
        command: "npm run test:integration -- lifecycle-monitoring"
        test_files:
          - "tests/integration/plugin/lifecycle/monitoring.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- lifecycle-audit"
        test_files:
          - "tests/e2e/plugin/lifecycle/monitoring.e2e.test.ts"
      ai:
        prompt: |
          请验证生命周期监控与日志是否满足以下要求:
          1. 是否记录所有生命周期状态变化(时间戳、原状态、新状态、触发原因)
          2. 是否监控生命周期各阶段耗时(激活耗时、停用耗时等)
          3. 错误日志是否包含完整上下文(插件版本、系统状态、堆栈跟踪)
          4. 是否提供生命周期查询API(查询插件历史状态变化)
          5. 监控数据是否持久化存储，支持跨会话查看
          6. 是否提供实时生命周期仪表盘(开发调试工具)
          7. 是否有异常检测(如激活超时、频繁崩溃)并发出告警
          8. 日志级别是否可配置(debug/info/warn/error)
          返回格式: {"passed": true/false, "reason": "详细说明", "details": [{"check": "检查项", "passed": true/false}]}
        context_files:
          - "src/plugin/lifecycle/lifecycle-monitor.ts"
          - "src/plugin/lifecycle/lifecycle-logger.ts"
        model: "claude-sonnet-4-6"
