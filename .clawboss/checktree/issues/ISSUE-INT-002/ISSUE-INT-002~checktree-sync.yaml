id: "ISSUE-INT-002"
issue_number: "002"
title: "CheckTree 同步机制"
slug: "checktree-sync"
status: "pending"
description: |
  实现 CheckTree 同步机制，确保 issue 状态、进度和元数据在系统与 CheckTree 文档之间保持一致。
  CheckTree 是项目的依赖关系图谱和 issue 管理系统，同步机制保证 CheckTree.md 文档与系统实际状态
  的双向同步，支持自动化状态更新和冲突解决。

  主要功能包括：
  1. CheckTree 解析器（解析 CheckTree.md 和 YAML issue 文件）
  2. 状态同步引擎（系统状态与 CheckTree 状态的双向同步）
  3. 变更检测与通知（检测 issue 变更、生成同步任务）
  4. 冲突解决策略（处理双向修改的冲突情况）
  5. 自动化工作流（基于状态变更自动触发后续操作）

is_parent: false
prerequisites:
  - "ISSUE-CLI-003"
  - "ISSUE-CLI-006B2"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary

criteria:
  - id: "ISSUE-INT-002~checktree-parser"
    name: "CheckTree 解析器实现"
    description: |
      实现 CheckTree 文档和 YAML 文件的解析器：
      - Mermaid 图表解析（提取节点、边、依赖关系）
      - YAML issue 文件解析（读取 issue 元数据、状态、验收条件）
      - 混合解析支持（同时解析 Markdown 和 YAML 格式）
      - 增量解析优化（只解析变更部分，提升性能）
      - 解析错误处理（语法错误、格式错误的诊断）
      - 解析缓存（缓存解析结果，避免重复解析）

      解析器应支持 CheckTree v3.4 格式规范。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/integration/checktree/parser/"
        test_files:
          - "src/integration/checktree/parser/mermaid-parser.test.ts"
          - "src/integration/checktree/parser/yaml-parser.test.ts"
          - "src/integration/checktree/parser/cache.test.ts"
      integration:
        command: "npm test -- src/integration/checktree/parser/integration.test.ts"
        test_files:
          - "src/integration/checktree/parser/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- checktree-parser"
        test_files:
          - "tests/e2e/checktree-sync/parsing.spec.ts"
      ai:
        prompt: |
          请验证 CheckTree 解析器实现：
          1. 检查 src/integration/checktree/parser/ 目录结构
          2. 验证 Mermaid 图表解析（节点、边、依赖关系提取）
          3. 检查 YAML issue 文件解析（元数据、状态、验收条件）
          4. 验证混合解析支持（同时处理 Markdown 和 YAML）
          5. 检查增量解析优化（变更检测、部分更新）
          6. 验证解析错误处理（语法错误诊断、友好提示）
          7. 检查解析缓存机制
          8. 验证 CheckTree v3.4 格式兼容性
          9. 检查大数据集解析性能（100+ issue 的解析时间 < 1s）

          返回格式：{"passed": true/false, "reason": "详细解释"}
