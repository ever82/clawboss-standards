  - id: "ISSUE-INT-002~sync-engine"
    name: "状态同步引擎实现"
    description: |
      实现系统状态与 CheckTree 的双向同步引擎：
      - 系统→CheckTree 同步（将系统状态更新到 CheckTree 文档）
      - CheckTree→系统同步（将 CheckTree 变更同步到系统）
      - 同步策略配置（单向/双向、自动/手动同步）
      - 批量同步支持（多个 issue 的批量更新）
      - 事务性同步（保证同步的原子性和一致性）
      - 同步历史记录（记录每次同步的变更内容）

      同步引擎应支持定时自动同步和手动触发同步。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/integration/checktree/sync/"
        test_files:
          - "src/integration/checktree/sync/engine.test.ts"
          - "src/integration/checktree/sync/strategy.test.ts"
          - "src/integration/checktree/sync/batch.test.ts"
          - "src/integration/checktree/sync/transaction.test.ts"
      integration:
        command: "npm test -- src/integration/checktree/sync/integration.test.ts"
        test_files:
          - "src/integration/checktree/sync/integration.test.ts"
      e2e:
        command: "npm run test:e2e -- sync-engine"
        test_files:
          - "tests/e2e/checktree-sync/bidirectional-sync.spec.ts"
          - "tests/e2e/checktree-sync/batch-sync.spec.ts"
      ai:
        prompt: |
          请验证状态同步引擎实现：
          1. 检查 src/integration/checktree/sync/ 目录结构
          2. 验证系统→CheckTree 同步（状态更新到文档）
          3. 检查 CheckTree→系统同步（文档变更到系统）
          4. 验证同步策略配置（单向/双向、自动/手动）
          5. 检查批量同步支持（多 issue 批量更新）
          6. 验证事务性同步（原子性、一致性）
          7. 检查同步历史记录（变更日志）
          8. 验证定时自动同步机制
