      - 约束和完整性检查
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: not_needed
      ai: sufficient
      manual: sufficient
    verification:
      unit:
        command: "npm test -- src/infra/schema-review.test.ts"
        test_files: ["src/infra/schema-review.test.ts"]
      integration:
        command: "npm test -- src/infra/schema-review.integration.test.ts"
        test_files: ["src/infra/schema-review.integration.test.ts"]
      ai:
        prompt: |
          请评审数据库 Schema 设计的性能和扩展性：
          1. 索引设计是否覆盖主要查询场景（按状态、时间、优先级）？
          2. 是否存在 N+1 查询风险的外键设计？
          3. 字段长度是否合理（如 VARCHAR 长度）？
          4. 是否预留扩展字段（JSON 类型或备用字段）？
          5. 大表是否考虑分区策略？
          6. 是否避免过度规范化导致的复杂连接？
