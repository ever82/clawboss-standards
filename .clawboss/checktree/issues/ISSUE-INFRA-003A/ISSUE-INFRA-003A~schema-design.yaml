  - id: "ISSUE-INFRA-003A~criterion-4"
    name: "Schema 设计文档和 ER 图完成"
    description: |
      编写完整的数据库设计文档，包含：
      - ER 图（使用 Mermaid 或其他工具）
      - 表结构详细说明
      - 字段类型和约束说明
      - 索引设计理由
      - 关系说明
    status: "pending"
    coverage:
      unit: not_needed
      integration: not_needed
      e2e: not_needed
      ai: sufficient
      manual: sufficient
    verification:
      ai:
        prompt: |
          请验证数据库设计文档质量：
          1. 文档是否包含清晰的 ER 图（Mermaid 语法或其他）？
          2. 每个表的字段列表是否完整（名称、类型、约束、默认值）？
          3. 是否说明表之间的关系（一对一、一对多、多对多）？
          4. 是否解释索引设计的理由和查询优化考虑？
          5. 是否包含数据字典（术语解释）？
          6. 设计是否遵循数据库范式（3NF）？
          返回格式：{"passed": true/false, "reason": "详细说明", "completeness_score": 0-100}
        context_files: ["docs/database/schema-design.md", "docs/database/ER-diagram.md"]
        model: "claude-sonnet-4-6"
      manual:
        instructions: |
          1. 阅读 docs/database/schema-design.md 完整文档
          2. 验证 ER 图清晰可读，包含所有实体
          3. 检查字段类型合理（如日期用 DATETIME/TIMESTAMP）
          4. 确认文档版本控制（作者、日期、变更记录）
        required_tools: ["bash", "cat"]
    execution_time: "<10 minutes"
    prerequisites: ["ISSUE-INFRA-003A~criterion-1", "ISSUE-INFRA-003A~criterion-2", "ISSUE-INFRA-003A~criterion-3"]

