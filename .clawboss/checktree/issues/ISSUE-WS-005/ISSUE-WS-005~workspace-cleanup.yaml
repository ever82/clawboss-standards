          - "src/workspace/cleanup/reports/report-generator.test.ts"
      integration:
        command: "npm test -- src/workspace/cleanup/storage-analysis.integration.test.ts"
        test_files:
          - "src/workspace/cleanup/storage-analysis.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- storage-analysis"
        test_files:
          - "tests/e2e/workspace/cleanup/storage-analysis.e2e.test.ts"
      ai:
        prompt: |
          请验证存储分析与报告生成：
          1. 检查 StorageAnalyzer：
             - analyzeByType：返回各 mimeType 的统计
             - analyzeByFolder：返回各 folder 的大小
             - analyzeByDate：按 createdAt 分组
             - findLargeFiles：返回超过 threshold 的文件
             - findOldFiles：返回超过 threshold 天的文件
          2. 检查报告数据结构：
