        prompt: |
          请验证临时文件与缓存清理实现：
          1. 检查 TempFileScanner：
             - scanTempFiles 扫描 .ai-me/cache/, .ai-me/temp/, .ai-me/downloads/
             - 识别扩展名：.tmp, .temp, .download, .part
