  - id: "ISSUE-WS-005~criterion-5"
    name: "自动清理与安全删除"
    description: |
      实现自动清理和安全删除功能：
      - AutoCleanupScheduler: 自动清理调度器
        - scheduleAutoCleanup(): 配置自动清理任务
        - runAutoCleanup(): 执行自动清理
        - shouldRunCleanup(): 判断是否应该清理
      - CleanupPolicy: 清理策略配置
        - enabled: 是否启用
        - schedule: cron 表达式
        - thresholds: 触发阈值（存储使用量 %）
        - actions: 执行的清理操作
      - SecureDelete: 安全删除
        - deleteSecurely(filePath): 安全删除单个文件
        - overwriteAndDelete(filePath, passes): 多次覆写后删除
        - shredDirectory(dirPath): 安全删除整个目录

      自动清理触发条件：
      - 定时：每周日凌晨 2 点
      - 阈值：存储使用超过 80%
      - 手动：用户主动触发

      安全删除级别：
      - standard: 普通删除（移动到回收站）
      - secure: 覆写一次后删除
      - paranoid: 覆写 7 次（DoD 5220.22-M 标准）

      回收站机制：
      - 删除的文件移动到 .ai-me/trash/
      - 保留 30 天后自动清除
      - 支持恢复
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/cleanup/scheduler/ src/workspace/cleanup/security/"
        test_files:
          - "src/workspace/cleanup/scheduler/auto-cleanup.scheduler.test.ts"
          - "src/workspace/cleanup/security/secure-delete.test.ts"
      integration:
        command: "npm test -- src/workspace/cleanup/auto-cleanup.integration.test.ts"
        test_files:
          - "src/workspace/cleanup/auto-cleanup.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- auto-cleanup"
        test_files:
          - "tests/e2e/workspace/cleanup/auto-cleanup.e2e.test.ts"
      ai:
        prompt: |
          请验证自动清理与安全删除：
          1. 检查 AutoCleanupScheduler：
             - 使用 node-cron 调度任务
             - 默认 schedule：0 2 * * 0（每周日凌晨2点）
             - shouldRunCleanup：检查存储使用 > 80%
             - runAutoCleanup：执行配置的清理操作
          2. 检查 CleanupPolicy 配置：
             - enabled：开关
             - schedule：cron 表达式
             - thresholds：{ storageUsagePercent }
             - actions：要执行的清理类型数组
          3. 检查 SecureDelete：
             - deleteSecurely：标准安全删除
             - overwriteAndDelete：覆写 passes 次后删除
             - 覆写使用随机数据
             - shredDirectory：递归安全删除
             - 支持 'standard', 'secure', 'paranoid' 级别
          4. 检查回收站机制：
             - 回收站路径：.ai-me/trash/
             - 保留结构：trash/YYYY/MM/DD/original-path
             - 30 天后自动清理
             - restore 方法从回收站恢复
          5. 检查清理日志：
             - 记录每次自动清理的结果
             - 记录删除的文件列表
             - 记录释放的空间
          6. 检查并发安全：
             - 自动清理时获取 workspace 锁
             - 防止与手动清理冲突
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/cleanup/scheduler/auto-cleanup.scheduler.ts"
          - "src/workspace/cleanup/security/secure-delete.ts"
          - "src/workspace/cleanup/policies/cleanup-policy.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-WS-005~criterion-4"
