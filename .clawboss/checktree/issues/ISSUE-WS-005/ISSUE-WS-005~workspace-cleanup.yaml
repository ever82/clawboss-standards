             - byType：[{ type, size, count, percentage }]
             - byFolder：[{ folderId, path, size, count }]
             - byDate：按月份分组的统计
             - recommendations：基于分析的建议列表
          3. 检查 ReportGenerator：
             - generateTextReport：纯文本格式，人类可读
             - generateJsonReport：JSON 格式，机器可读
             - generateHtmlReport：HTML 格式，带图表
             - exportReport：导出到文件
          4. 检查分析性能：
