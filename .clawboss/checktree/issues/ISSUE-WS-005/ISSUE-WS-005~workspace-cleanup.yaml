id: "ISSUE-WS-005"
issue_number: 6
title: "工作空间清理"
slug: "workspace-cleanup"
status: "pending"
description: |
  实现工作空间清理功能，帮助用户管理和优化工作空间存储。
  包括临时文件清理、孤儿记录清理、存储分析和归档管理。

  核心功能：
  1. 临时文件清理（缓存、日志、临时下载）
  2. 孤儿记录清理（元数据与物理文件不一致）
  3. 重复文件清理（基于内容哈希去重）
  4. 存储分析报告（使用情况、趋势）
  5. 工作空间归档（压缩旧数据）
  6. 自动清理策略（定期执行）
  7. 安全删除（彻底删除敏感数据）

  技术要求：
  - 基于 WS-001 工作空间核心服务
  - 基于 WS-003 工作空间切换（切换时触发）
  - 支持并发清理（不阻塞正常使用）
  - 清理操作可撤销（保留到回收站）
  - 详细的清理报告

is_parent: false
prerequisites:
  - "ISSUE-WS-003"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-WS-005~criterion-1"
    name: "清理服务架构与核心功能"
    description: |
      实现 WorkspaceCleanupService 核心清理服务：
      - analyze(workspaceId): 分析工作空间存储情况
        - 总大小、文件数量、数据库大小
        - 临时文件占比
        - 重复文件估算
        - 孤儿记录数量
      - cleanup(workspaceId, options): 执行清理
        - temporaryFiles: 清理临时文件
        - orphanedRecords: 清理孤儿记录
        - duplicateFiles: 合并重复文件
        - oldLogs: 清理旧日志
        - emptyFolders: 删除空文件夹
      - previewCleanup(workspaceId, options): 预览清理效果
        - 预估释放空间
        - 列出将被删除/合并的文件
        - 风险评估
      - getStorageReport(workspaceId): 获取存储报告

      清理策略配置：
      - tempFileMaxAge: 临时文件保留天数（默认 7）
      - logFileMaxAge: 日志文件保留天数（默认 30）
      - cacheMaxAge: 缓存保留天数（默认 3）
      - duplicateAction: 重复文件处理方式（link/remove）

      安全机制：
      - 清理前自动备份
      - 支持撤销（移动到回收站）
      - 重要文件白名单
      - 并发保护（清理时禁止修改）
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/cleanup/services/workspace-cleanup.service.test.ts"
        test_files:
          - "src/workspace/cleanup/services/workspace-cleanup.service.test.ts"
      integration:
        command: "npm test -- src/workspace/cleanup/workspace-cleanup.integration.test.ts"
        test_files:
          - "src/workspace/cleanup/workspace-cleanup.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- workspace-cleanup"
        test_files:
          - "tests/e2e/workspace/cleanup/workspace-cleanup.e2e.test.ts"
      ai:
        prompt: |
          请验证 WorkspaceCleanupService 核心功能：
          1. 检查 analyze 方法是否返回：
             - totalSize：工作空间总大小
             - fileCount：文件数量
             - databaseSize：数据库文件大小
             - tempFilesSize：临时文件大小
             - duplicateFilesEstimate：估算的重复文件大小
             - orphanedRecordsCount：孤儿记录数量
          2. 检查 cleanup 方法选项：
             - temporaryFiles：清理 .ai-me/cache/, .ai-me/temp/
             - orphanedRecords：删除 metadata 存在但物理文件缺失的记录
             - duplicateFiles：合并重复文件（硬链接或删除）
             - oldLogs：清理超过保留天数的日志
             - emptyFolders：删除空文件夹
          3. 检查 previewCleanup 是否：
             - 不实际执行删除操作
             - 返回将被影响的文件列表
             - 计算预估释放空间
             - 评估风险（重要文件警告）
          4. 检查安全机制：
             - 清理前调用 backupBeforeCleanup
             - 支持 dryRun 模式
             - 重要文件白名单配置
          5. 检查并发保护：
             - 清理时获取 workspace 锁
             - 防止清理时其他操作修改数据
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/cleanup/services/workspace-cleanup.service.ts"
          - "src/workspace/cleanup/services/workspace-cleanup.service.interface.ts"
          - "src/workspace/cleanup/types/cleanup-options.type.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"

  - id: "ISSUE-WS-005~criterion-2"
    name: "临时文件与缓存清理"
    description: |
      实现临时文件和缓存清理：
      - TempFileScanner: 临时文件扫描器
        - scanTempFiles(workspacePath): 扫描临时文件
        - getFileAge(filePath): 获取文件年龄
        - isTemporary(file): 判断是否为临时文件
      - CacheManager: 缓存管理器
        - listCacheEntries(): 列出缓存条目
        - getCacheSize(): 获取缓存总大小
        - clearExpiredCache(): 清理过期缓存
        - clearAllCache(): 清空所有缓存
      - LogFileManager: 日志文件管理
        - listLogFiles(): 列出日志文件
        - getLogSize(): 获取日志总大小
        - archiveOldLogs(): 归档旧日志
        - deleteOldLogs(days): 删除超过天数的日志

      临时文件识别：
      - 扩展名：.tmp, .temp, .download, .part
      - 目录：.ai-me/cache/, .ai-me/temp/, .ai-me/downloads/
      - 文件名模式：*.tmp.*, temp_*
      - 孤儿文件（无关联元数据）

      清理策略：
      - 缓存：超过 3 天自动清理
      - 临时文件：超过 7 天自动清理
      - 日志：超过 30 天自动归档，超过 90 天删除
    status: "pending"
