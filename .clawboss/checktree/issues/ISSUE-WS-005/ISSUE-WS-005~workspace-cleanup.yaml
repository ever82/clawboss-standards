  - id: "ISSUE-WS-005~criterion-3"
    name: "孤儿记录与重复文件清理"
    description: |
      实现孤儿记录和重复文件清理：
      - OrphanedRecordScanner: 孤儿记录扫描器
        - findOrphanedFiles(): 物理文件存在但无元数据
        - findOrphanedMetadata(): 元数据存在但物理文件缺失
        - findBrokenLinks(): 断开的软链接/硬链接
        - repairOrphans(): 修复孤儿记录
      - DuplicateFileScanner: 重复文件扫描器
        - scanDuplicates(): 扫描重复文件（基于 hash）
        - groupByContent(): 按内容分组
        - groupBySimilarity(): 按相似度分组（图片）
      - DuplicateResolver: 重复文件解决器
        - mergeDuplicates(group): 合并不重复文件
        - keepNewest(group): 保留最新版本
        - keepLargest(group): 保留最大文件
        - manualSelect(group, keepId): 手动选择保留

      孤儿记录类型：
      - 文件孤儿：物理文件存在，数据库无记录
      - 元数据孤儿：数据库有记录，物理文件缺失
      - 关联孤儿：附件记录存在，但文件或行为缺失

      重复文件处理：
      - 完全重复：hash 相同，保留一个删除其他
      - 相似文件：感知哈希相似，用户决定
      - 使用硬链接节省空间
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/cleanup/scanners/orphan-scanner.test.ts"
        test_files:
          - "src/workspace/cleanup/scanners/orphan-scanner.test.ts"
          - "src/workspace/cleanup/scanners/duplicate-scanner.test.ts"
          - "src/workspace/cleanup/resolvers/duplicate-resolver.test.ts"
      integration:
        command: "npm test -- src/workspace/cleanup/orphan-cleanup.integration.test.ts"
        test_files:
          - "src/workspace/cleanup/orphan-cleanup.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- orphan-cleanup"
        test_files:
          - "tests/e2e/workspace/cleanup/orphan-cleanup.e2e.test.ts"
      ai:
        prompt: |
          请验证孤儿记录与重复文件清理：
          1. 检查 OrphanedRecordScanner：
             - findOrphanedFiles：扫描 .ai-me/files/ 下无数据库记录的文件
             - findOrphanedMetadata：数据库中 storagePath 不存在的记录
             - findBrokenLinks：检查软链接指向
             - repairOrphans：移动孤儿文件到 orphans/ 目录或删除
          2. 检查 DuplicateFileScanner：
             - scanDuplicates：按 hash 分组查找重复
             - 使用 file_metadata 表的 hash 字段索引
             - groupBySimilarity：图片使用感知哈希分组
             - 返回 DuplicateGroup 数组（主文件 + 重复列表）
          3. 检查 DuplicateResolver：
             - mergeDuplicates：硬链接重复文件到主文件
             - keepNewest：保留 updatedAt 最新的
             - keepLargest：保留 size 最大的
             - manualSelect：用户指定保留哪个
          4. 检查处理流程：
             - 先扫描并生成报告
             - 用户确认后再执行
             - 支持撤销（移动到 .ai-me/cleanup/trash/）
          5. 检查是否处理了所有孤儿类型：
             - 文件孤儿 -> 移动到回收站
             - 元数据孤儿 -> 标记或删除
             - 关联孤儿 -> 删除无效关联
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/cleanup/scanners/orphan-scanner.ts"
          - "src/workspace/cleanup/scanners/duplicate-scanner.ts"
          - "src/workspace/cleanup/resolvers/duplicate-resolver.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-WS-005~criterion-2"

  - id: "ISSUE-WS-005~criterion-4"
    name: "存储分析与报告生成"
    description: |
      实现存储分析和报告生成功能：
      - StorageAnalyzer: 存储分析器
        - analyzeByType(): 按文件类型分析
        - analyzeByFolder(): 按文件夹分析
        - analyzeByDate(): 按日期分析
        - findLargeFiles(threshold): 查找大文件
        - findOldFiles(threshold): 查找旧文件
      - StorageReport: 存储报告
        - summary: 概览统计
        - details: 详细分类
        - trends: 趋势分析（需要历史数据）
        - recommendations: 优化建议
      - ReportGenerator: 报告生成器
        - generateTextReport(): 生成文本报告
        - generateJsonReport(): 生成 JSON 报告
        - generateHtmlReport(): 生成 HTML 报告
        - exportReport(format, path): 导出报告

      分析维度：
      - 文件类型：图片、文档、音频、视频、其他
      - 文件夹：每个文件夹的存储占用
      - 时间：按创建日期分布
      - 大小：大文件识别

      报告内容：
      - 总大小、文件数量
      - 各类别占比（饼图数据）
      - 增长趋势
      - 清理建议
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
