id: "ISSUE-WS-004"
issue_number: 5
title: "文件版本控制"
slug: "file-versioning"
status: "pending"
description: |
  实现文件版本控制功能，跟踪和管理文件的历史版本。
  允许用户查看、比较和恢复文件的早期版本。

  核心功能：
  1. 版本自动创建（文件修改时自动保存版本）
  2. 版本历史管理（列出、查看、删除版本）
  3. 版本比较（文本差异、二进制摘要）
  4. 版本恢复（回滚到指定版本）
  5. 版本注释（添加版本说明）
  6. 版本清理策略（自动删除旧版本）
  7. 版本标签（标记重要版本）

  技术要求：
  - 基于 WS-002A 文件夹管理（存储版本）
  - 基于 WS-002B 文件关联管理
  - 基于 INFRA-003B 数据库 Schema
  - 支持增量存储（节省空间）
  - 版本链式引用（previousVersionId）

is_parent: false
prerequisites:
  - "ISSUE-WS-002A"
  - "ISSUE-INFRA-003B"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-WS-004~criterion-1"
    name: "版本实体与存储模型"
    description: |
      定义文件版本相关实体：
      - FileVersion 版本实体：
        - id, fileId（关联的文件元数据）
        - versionNumber（版本号，从1递增）
        - previousVersionId（上一个版本，null 表示首个）
        - storagePath（版本文件存储路径）
        - size, hash（此版本的文件哈希）
        - createdAt, createdBy
        - comment（版本注释）
        - tags（版本标签数组）
        - isDeleted（软删除标记）

      - VersionChain 版本链：
        - 头版本（最新）
        - 尾版本（最旧）
        - 版本数量统计
        - 总存储大小

      存储结构：
      - 版本文件路径：.ai-me/versions/{fileId}/{versionNumber}-{hash[:8]}
      - 使用内容寻址（哈希作为文件名一部分）
      - 相同内容去重（相同哈希共享存储）

      类型定义：
      - FileVersion 接口
      - VersionCompareResult 比较结果
      - CreateVersionInput / UpdateVersionInput DTO
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/versioning/entities/"
        test_files:
          - "src/workspace/versioning/entities/file-version.entity.test.ts"
          - "src/workspace/versioning/dto/create-version.dto.test.ts"
      integration:
        command: "npm test -- src/workspace/versioning/versioning.type.integration.test.ts"
        test_files:
          - "src/workspace/versioning/versioning.type.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- versioning-types"
        test_files:
          - "tests/e2e/workspace/versioning/versioning-types.e2e.test.ts"
      ai:
        prompt: |
          请验证文件版本实体定义：
          1. 检查 FileVersion 实体是否包含：
             - id, fileId（外键关联 file_metadata）
             - versionNumber（整数，从1开始）
             - previousVersionId（可空，指向同表）
             - storagePath（实际存储路径）
             - size（字节）, hash（SHA-256）
             - createdAt, createdBy
             - comment（可空，版本说明）
             - tags（字符串数组，版本标签）
             - isDeleted（软删除标记）
          2. 检查数据库约束：
             - (fileId, versionNumber) 唯一约束
             - previousVersionId 外键约束（同表自引用）
             - hash 索引
          3. 检查存储路径格式：
             - .ai-me/versions/{fileId}/{versionNumber}-{hash[:8]}
             - 使用哈希前8位避免冲突
          4. 检查 DTO 验证：
             - CreateVersionInput：fileId 必填，comment 可选，tags 可选
             - UpdateVersionInput：只允许修改 comment 和 tags
          5. 检查版本链查询方法（获取某文件的所有版本）
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/versioning/entities/file-version.entity.ts"
          - "src/workspace/versioning/dto/"
          - "src/workspace/versioning/types/version-chain.type.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"

  - id: "ISSUE-WS-004~criterion-2"
    name: "版本 Repository 与存储管理"
    description: |
      实现 FileVersionRepository 数据访问层：
      - findByFileId(fileId): 获取文件的所有版本（按版本号排序）
      - findById(id): 根据 ID 查询版本
      - findByVersionNumber(fileId, versionNumber): 查询特定版本
      - getLatestVersion(fileId): 获取最新版本
      - getFirstVersion(fileId): 获取首个版本
      - create(data): 创建新版本
      - update(id, data): 更新版本元数据（注释、标签）
      - delete(id): 软删除版本
      - getVersionCount(fileId): 获取版本数量
      - getTotalSize(fileId): 获取所有版本总大小

      存储管理：
      - VersionStorageManager: 版本存储管理器
        - saveVersion(filePath, versionData): 保存版本文件
        - readVersion(storagePath): 读取版本文件
        - deleteVersion(storagePath): 删除版本文件
        - checkIntegrity(versionId): 验证版本完整性
      - 内容寻址存储（基于哈希）
      - 相同内容共享存储

      版本创建策略：
      - 自动创建（文件修改时）
      - 手动创建（用户主动保存版本）
      - 差异检测（相同内容不创建新版本）
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/versioning/repositories/"
        test_files:
          - "src/workspace/versioning/repositories/file-version.repository.test.ts"
          - "src/workspace/versioning/services/version-storage.manager.test.ts"
      integration:
        command: "npm test -- src/workspace/versioning/versioning.repository.integration.test.ts"
        test_files:
          - "src/workspace/versioning/versioning.repository.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- versioning-repository"
        test_files:
          - "tests/e2e/workspace/versioning/versioning-repository.e2e.test.ts"
      ai:
        prompt: |
          请验证版本 Repository 实现：
          1. 检查 FileVersionRepository 是否实现：
             - findByFileId 返回按 versionNumber 降序排列
             - getLatestVersion 返回 versionNumber 最大的
             - getFirstVersion 返回 versionNumber = 1 的
             - create 自动计算下一个 versionNumber
             - getVersionCount 统计非软删除版本
             - getTotalSize 汇总所有版本大小
          2. 检查 VersionStorageManager：
             - saveVersion 计算 hash，如已存在则不重复存储
             - 存储路径：.ai-me/versions/{fileId}/{versionNumber}-{hash[:8]}
             - readVersion 返回文件流或 Buffer
             - deleteVersion 物理删除文件
          3. 检查内容去重：
             - 相同哈希的版本共享存储（硬链接或引用计数）
             - 存储前检查 hash 是否已存在
          4. 检查版本创建策略：
             - autoCreate：文件内容变化时自动创建
             - manualCreate：用户手动触发
             - shouldCreateVersion：比较 hash，相同则不创建
          5. 检查数据库事务：
             - create 版本时同时更新 file_metadata 的 currentVersionId
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/versioning/repositories/file-version.repository.ts"
          - "src/workspace/versioning/services/version-storage.manager.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"
    prerequisites:
      - "ISSUE-WS-004~criterion-1"

  - id: "ISSUE-WS-004~criterion-3"
    name: "版本服务层与业务逻辑"
    description: |
      实现 FileVersionService 业务逻辑层：
      - createVersion(fileId, options): 创建新版本
        - 读取当前文件内容
        - 计算哈希
        - 如内容变化则创建版本
        - 可选添加注释和标签
      - getVersionHistory(fileId): 获取版本历史
      - getVersion(versionId): 获取特定版本详情
      - compareVersions(versionId1, versionId2): 比较两个版本
        - 文本文件：行级差异（diff）
        - 图片文件：像素差异或感知哈希比较
        - 二进制文件：仅显示元数据差异
      - restoreVersion(versionId): 恢复到指定版本
        - 复制版本内容到当前文件
        - 创建新版本记录恢复操作
      - addVersionComment(versionId, comment): 添加注释
      - addVersionTag(versionId, tag): 添加标签
      - removeVersionTag(versionId, tag): 移除标签
      - deleteVersion(versionId): 删除版本（软删除）
      - exportVersion(versionId, targetPath): 导出版本到文件

      版本策略配置：
      - 自动版本间隔（默认每 30 分钟）
      - 最大版本数（默认 50）
      - 保留天数（默认 90 天）
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/versioning/services/file-version.service.test.ts"
        test_files:
          - "src/workspace/versioning/services/file-version.service.test.ts"
      integration:
        command: "npm test -- src/workspace/versioning/versioning.service.integration.test.ts"
        test_files:
          - "src/workspace/versioning/versioning.service.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- versioning-service"
        test_files:
          - "tests/e2e/workspace/versioning/versioning-service.e2e.test.ts"
      ai:
        prompt: |
          请验证版本服务层实现：
          1. 检查 createVersion 是否：
             - 检查自动版本间隔（距离上次版本 >= 30 分钟）
             - 读取文件内容计算 hash
             - 如 hash 相同则返回现有版本
             - 如内容变化则创建新版本
             - 支持手动覆盖（force=true 忽略间隔）
          2. 检查 compareVersions：
             - 文本文件：使用 diff 算法生成行级差异
             - 图片：比较尺寸、格式、感知哈希
             - 二进制：仅显示大小、hash 差异
             - 返回结构化比较结果
          3. 检查 restoreVersion：
             - 验证版本存在且未被删除
             - 复制版本内容到当前文件位置
             - 创建特殊版本记录 "restore-from-v{N}"
             - 发布 VersionRestored 事件
          4. 检查版本标签管理：
             - 支持添加/移除标签
             - 预定义标签：important, milestone, draft
             - 自定义标签验证（长度、字符）
          5. 检查配置读取：
             - 从 workspace config 读取策略
             - 支持全局默认值
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/versioning/services/file-version.service.ts"
          - "src/workspace/versioning/services/file-version.service.interface.ts"
          - "src/workspace/versioning/comparators/"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"
    prerequisites:
      - "ISSUE-WS-004~criterion-2"

  - id: "ISSUE-WS-004~criterion-4"
    name: "版本清理与策略管理"
    description: |
      实现版本清理和策略管理：
      - VersionCleanupService: 版本清理服务
        - cleanupByPolicy(fileId): 按策略清理文件版本
        - cleanupAllByPolicy(): 清理所有文件的版本
        - cleanupDeletedVersions(): 清理已标记删除的版本
        - getStorageReport(): 获取存储使用报告
      - CleanupPolicy: 清理策略
        - maxVersions: 最大保留版本数
        - maxAge: 最大保留天数
        - keepTagged: 是否保留带标签的版本
        - keepImportant: 是否保留标记为 important 的版本
        - minInterval: 最小版本间隔（合并相近版本）

      自动清理策略：
      - 每天自动运行清理任务
      - 优先删除最旧的版本
      - 保留带标签的版本
      - 保留里程碑版本（每 10 个保留 1 个）

      存储优化：
      - 检测孤儿版本（元数据存在但文件缺失）
      - 检测重复存储（相同 hash 的合并）
      - 生成清理报告
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/versioning/services/version-cleanup.service.test.ts"
        test_files:
          - "src/workspace/versioning/services/version-cleanup.service.test.ts"
      integration:
        command: "npm test -- src/workspace/versioning/versioning-cleanup.integration.test.ts"
        test_files:
          - "src/workspace/versioning/versioning-cleanup.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- versioning-cleanup"
        test_files:
          - "tests/e2e/workspace/versioning/versioning-cleanup.e2e.test.ts"
      ai:
        prompt: |
          请验证版本清理与策略管理：
          1. 检查 CleanupPolicy 配置：
             - maxVersions：默认 50
             - maxAgeDays：默认 90
             - keepTagged：true（保留带标签版本）
             - keepImportant：true（保留重要版本）
             - minIntervalMinutes：合并间隔小于此值的版本
          2. 检查 VersionCleanupService：
             - cleanupByPolicy 根据策略删除版本
             - 删除顺序：最旧优先，跳过带标签的
             - 保留至少 3 个版本（即使超过 maxAge）
             - 软删除后定期物理删除
          3. 检查存储优化：
             - findOrphanedVersions：元数据存在但文件缺失
             - findDuplicateStorage：相同 hash 的物理文件
             - mergeDuplicateStorage：硬链接相同内容的文件
          4. 检查清理报告：
             - 删除版本数量
             - 释放存储空间
             - 当前版本统计
          5. 检查自动任务：
             - 使用 node-cron 每天凌晨 3 点运行
             - 记录清理日志
             - 支持手动触发
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/versioning/services/version-cleanup.service.ts"
          - "src/workspace/versioning/policies/cleanup-policy.ts"
          - "src/workspace/versioning/scheduler/version-cleanup.scheduler.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-WS-004~criterion-3"

  - id: "ISSUE-WS-004~criterion-5"
    name: "版本比较与差异显示"
    description: |
      实现版本比较和差异显示功能：
      - VersionComparator: 版本比较器接口
        - compare(version1, version2): 返回比较结果
        - getDiffStats(): 获取差异统计
      - TextComparator: 文本文件比较
        - 使用 Myers diff 算法
        - 行级差异（新增、删除、修改）
        - 字符级高亮（行内差异）
        - 支持统一 diff 格式输出
      - ImageComparator: 图片文件比较
        - 元数据比较（尺寸、格式、文件大小）
        - 像素级比较（百分比差异）
        - 感知哈希比较（相似度）
        - 缩略图对比预览
      - BinaryComparator: 二进制文件比较
        - 仅比较元数据
        - 显示文件大小变化
        - 显示 hash 差异

      DiffResult 结构：
      - type: 'text' | 'image' | 'binary'
      - additions: 新增行数/字节数
      - deletions: 删除行数/字节数
      - changes: 修改统计
      - hunks: 差异块（用于显示）
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/versioning/comparators/"
        test_files:
          - "src/workspace/versioning/comparators/text-comparator.test.ts"
          - "src/workspace/versioning/comparators/image-comparator.test.ts"
          - "src/workspace/versioning/comparators/binary-comparator.test.ts"
      integration:
        command: "npm test -- src/workspace/versioning/versioning-compare.integration.test.ts"
        test_files:
          - "src/workspace/versioning/versioning-compare.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- versioning-compare"
        test_files:
          - "tests/e2e/workspace/versioning/versioning-compare.e2e.test.ts"
      ai:
        prompt: |
          请验证版本比较实现：
          1. 检查 TextComparator 是否：
             - 使用 Myers diff 算法（或 diff 库）
             - 返回行级差异（新增 +，删除 -）
             - 支持统一 diff 格式（--- +++ @@）
             - 支持行内差异高亮
             - 处理大文件（流式比较）
          2. 检查 ImageComparator 是否：
             - 比较元数据：width, height, format, size
             - 使用 pixelmatch 或类似库比较像素
             - 计算差异百分比
             - 使用 phash 计算感知哈希相似度
          3. 检查 BinaryComparator 是否：
             - 仅比较 size 和 hash
             - 不尝试解析内容
             - 返回简单的 "changed"/"unchanged"
          4. 检查 DiffResult 结构：
             - type：文件类型
             - additions/deletions：统计信息
             - hunks：差异块数组（包含 oldStart, newStart, lines）
          5. 检查性能：
             - 1MB 文本比较 < 100ms
             - 图片比较使用缩略图加速
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/versioning/comparators/"
          - "src/workspace/versioning/types/diff-result.type.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-WS-004~criterion-4"
