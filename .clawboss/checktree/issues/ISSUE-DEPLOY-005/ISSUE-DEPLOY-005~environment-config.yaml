          - "tests/unit/deploy/config-encryption.test.ts"
      integration:
        command: "npm run test:integration -- tests/integration/deploy/encrypted-config.test.ts"
        test_files:
          - "tests/integration/deploy/encrypted-config.test.ts"
      e2e:
        command: "npm run test:e2e -- tests/e2e/deploy/secure-config-runtime.test.ts"
        test_files:
          - "tests/e2e/deploy/secure-config-runtime.test.ts"
      ai:
        prompt: |
          请验证敏感配置加密存储实现是否符合以下要求：
          1. 是否支持对称加密（AES-256-GCM）存储敏感值
          2. 是否支持非对称加密（RSA）保护加密密钥
          3. 是否提供配置加密CLI工具
          4. 运行时解密是否在内存中安全处理
          5. 解密密钥是否通过环境变量或KMS获取
          6. 是否支持配置值的部分加密（混合明文和密文）
          7. 是否记录配置访问审计日志
          返回格式: {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/config/encryption.ts"
          - "src/config/secure-value.ts"
          - "scripts/config/encrypt-value.ts"
          - "scripts/config/decrypt-value.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<2 minutes"

