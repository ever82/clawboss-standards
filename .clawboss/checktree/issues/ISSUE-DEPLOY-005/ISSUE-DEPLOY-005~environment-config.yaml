        test_files:
          - "tests/e2e/deploy/config-type-check.test.ts"
      ai:
        prompt: |
          请验证配置验证与Schema实现是否符合以下要求：
          1. 是否定义完整的配置JSON Schema
          2. 是否支持类型检查（字符串、数字、布尔值、数组、对象）
          3. 是否支持必填字段验证
          4. 是否支持值范围验证（数值范围、字符串长度、正则匹配）
