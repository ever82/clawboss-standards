id: "ISSUE-INFRA-006A"
issue_number: 6
title: "错误处理系统"
slug: "error-handling"
status: "pending"
description: |
  实现统一的错误处理系统，包括：自定义错误类层次结构、
  错误码定义、错误上下文捕获、堆栈跟踪处理、
  用户友好的错误消息、错误恢复机制。
is_parent: false
prerequisites:
  - "ISSUE-INFRA-001"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-INFRA-006A~criterion-1"
    name: "自定义错误类层次结构实现完成"
    description: |
      实现错误类继承体系：
      - BaseError：基础错误类（抽象）
      - ValidationError：数据验证错误
      - NotFoundError：资源未找到错误
      - DatabaseError：数据库操作错误
      - PermissionError：权限错误
      - SystemError：系统级错误
      - 每个错误类包含 code, message, context 字段
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: not_needed
      ai: not_needed
      manual: sufficient
    verification:
      unit:
        command: "npm test -- src/infra/error-classes.test.ts"
        test_files: ["src/infra/error-classes.test.ts"]
      integration:
        command: "npm test -- src/infra/error-classes.integration.test.ts"
        test_files: ["src/infra/error-classes.integration.test.ts"]
      manual:
        instructions: |
          1. 检查 src/infra/errors/ 目录存在错误类文件
          2. 验证每个错误类继承自 BaseError
          3. 测试 throw new ValidationError() 可正确捕获
          4. 检查 instanceof 判断正确
          5. 验证错误类可序列化为 JSON
        required_tools: ["npm", "bash"]
    execution_time: "<30 seconds"
    prerequisites: []

  - id: "ISSUE-INFRA-006A~criterion-2"
    name: "错误码定义和管理完成"
    description: |
      实现错误码系统：
      - 错误码枚举定义（E1000, E1001 等）
      - 错误码分类（1xxx 验证, 2xxx 数据库, 3xxx 系统等）
      - 错误码文档（含义、原因、解决方案）
      - HTTP 状态码映射（如适用）
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: not_needed
      ai: not_needed
      manual: sufficient
    verification:
      unit:
        command: "npm test -- src/infra/error-codes.test.ts"
        test_files: ["src/infra/error-codes.test.ts"]
      integration:
        command: "npm test -- src/infra/error-codes.integration.test.ts"
        test_files: ["src/infra/error-codes.integration.test.ts"]
      manual:
        instructions: |
          1. 验证 ErrorCode 枚举定义完整
          2. 检查错误码分类清晰（1xxx, 2xxx, 3xxx...）
          3. 阅读错误码文档，验证每个错误码有说明
          4. 测试错误码可翻译为消息
          5. 验证错误码唯一不重复
        required_tools: ["bash", "cat"]
    execution_time: "<30 seconds"
    prerequisites: []

  - id: "ISSUE-INFRA-006A~criterion-3"
    name: "错误上下文和元数据捕获完成"
    description: |
      实现错误上下文捕获：
      - 错误发生时的变量值
      - 请求/操作上下文（userId, requestId 等）
      - 时间戳和堆栈信息
      - 错误链（cause）支持
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: not_needed
      ai: not_needed
      manual: sufficient
    verification:
      unit:
        command: "npm test -- src/infra/error-context.test.ts"
        test_files: ["src/infra/error-context.test.ts"]
      integration:
        command: "npm test -- src/infra/error-context.integration.test.ts"
        test_files: ["src/infra/error-context.integration.test.ts"]
      manual:
        instructions: |
          1. 抛出错误时附加上下文信息
          2. 验证捕获的上下文包含预期字段
          3. 检查错误链（cause）正确引用原始错误
          4. 验证堆栈跟踪完整可读
          5. 测试上下文信息可序列化存储
        required_tools: ["npm", "bash"]
    execution_time: "<30 seconds"
    prerequisites: []

  - id: "ISSUE-INFRA-006A~criterion-4"
    name: "错误恢复和降级机制完成"
    description: |
      实现错误恢复策略：
      - 重试机制（RetryPolicy）
      - 熔断器模式（Circuit Breaker）
      - 降级处理（Fallback）
      - 幂等性保证
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: not_needed
      ai: not_needed
      manual: sufficient
    verification:
      unit:
        command: "npm test -- src/infra/error-recovery.test.ts"
        test_files: ["src/infra/error-recovery.test.ts"]
      integration:
        command: "npm test -- src/infra/error-recovery.integration.test.ts"
        test_files: ["src/infra/error-recovery.integration.test.ts"]
      manual:
        instructions: |
          1. 模拟失败操作，验证重试策略生效
          2. 测试熔断器在多次失败后打开
          3. 验证降级逻辑正确执行
          4. 检查重试间隔和最大次数配置
          5. 测试幂等性操作重复执行安全
        required_tools: ["npm", "bash"]
    execution_time: "<60 seconds"
    prerequisites: ["ISSUE-INFRA-006A~criterion-1"]

  - id: "ISSUE-INFRA-006A~criterion-5"
    name: "用户友好错误消息完成"
    description: |
      实现错误消息本地化：
      - 错误消息模板系统
      - 多语言支持（i18n）
      - 消息格式化（占位符替换）
      - 建议修复方案提示
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: not_needed
      ai: sufficient
      manual: sufficient
    verification:
      unit:
        command: "npm test -- src/infra/error-messages.test.ts"
        test_files: ["src/infra/error-messages.test.ts"]
      integration:
        command: "npm test -- src/infra/error-messages.integration.test.ts"
        test_files: ["src/infra/error-messages.integration.test.ts"]
      ai:
        prompt: |
          请验证错误消息的用户友好性：
          1. 错误消息是否清晰说明发生了什么问题？
          2. 是否提供可操作的解决方案或建议？
          3. 消息是否避免技术术语（或提供解释）？
          4. 是否支持多语言（至少中英文）？
          5. 消息模板是否正确替换占位符？
          6. 是否区分用户错误和系统错误？
          返回格式：{"passed": true/false, "reason": "详细说明", "sample_messages": []}
        context_files: ["src/infra/errors/messages.ts", "locales/en.json", "locales/zh.json"]
        model: "claude-sonnet-4-6"
      manual:
        instructions: |
          1. 触发各类错误，查看输出消息
          2. 验证消息清晰易懂，非技术人员可理解
          3. 检查提供修复建议（如"请检查数据库连接"）
          4. 测试中英文切换显示正确
          5. 验证无内部堆栈信息泄露给用户
        required_tools: ["npm", "bash"]
    execution_time: "<60 seconds"
    prerequisites: ["ISSUE-INFRA-006A~criterion-2"]
