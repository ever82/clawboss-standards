id: "ISSUE-WS-003"
issue_number: 4
title: "工作空间切换"
slug: "workspace-switch"
status: "pending"
description: |
  实现工作空间切换功能，支持在多个工作空间之间快速切换。
  工作空间切换是用户在不同项目或上下文之间切换的核心功能。

  核心功能：
  1. 工作空间切换（激活指定工作空间）
  2. 最近工作空间列表（MRU - Most Recently Used）
  3. 工作空间快速选择（模糊搜索）
  4. 切换状态保存（持久化到配置文件）
  5. 切换前验证（检查工作空间完整性）
  6. 切换后初始化（加载配置、建立连接）
  7. 切换钩子/事件（允许扩展点）

  技术要求：
  - 基于 WS-001 工作空间核心服务
  - 支持快速切换（< 500ms）
  - 原子性切换（失败可回滚）
  - 并发切换保护（防止同时切换）
  - 切换状态持久化
is_parent: false
prerequisites:
  - "ISSUE-WS-001"
created_at: "2026-04-01"
completed_at: null
logic: sufficient_necessary
criteria:
  - id: "ISSUE-WS-003~criterion-1"
    name: "工作空间切换服务核心逻辑"
    description: |
      实现 WorkspaceSwitchService 核心切换逻辑：
      - switchTo(workspaceId): 切换到指定工作空间
        1. 验证目标工作空间存在且有效
        2. 验证工作空间目录完整性
        3. 关闭当前工作空间连接（清理资源）
        4. 更新活动工作空间标记
        5. 初始化新工作空间连接
        6. 更新最后访问时间
        7. 发布 WorkspaceSwitched 事件
        8. 持久化切换状态
      - getCurrent(): 获取当前活动工作空间
      - getRecentWorkspaces(limit): 获取最近使用的工作空间列表
      - canSwitchTo(workspaceId): 检查是否可以切换
      - validateBeforeSwitch(workspaceId): 切换前验证

      切换过程需保证原子性，任何步骤失败应回滚到之前状态。
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/services/workspace-switch.service.test.ts"
        test_files:
          - "src/workspace/services/workspace-switch.service.test.ts"
      integration:
        command: "npm test -- src/workspace/workspace-switch.integration.test.ts"
        test_files:
          - "src/workspace/workspace-switch.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- workspace-switch"
        test_files:
          - "tests/e2e/workspace/workspace-switch.e2e.test.ts"
      ai:
        prompt: |
          请验证 WorkspaceSwitchService 的核心切换逻辑：
          1. 检查 switchTo 方法是否按正确顺序执行：
             - 验证目标工作空间（存在、状态为 active）
             - 验证工作空间完整性（目录、数据库）
             - 关闭当前连接（调用 cleanupCurrentWorkspace）
             - 更新活动标记（数据库事务）
             - 初始化新连接（初始化数据库连接、加载配置）
             - 更新最后访问时间
             - 发布 WorkspaceSwitched 事件
             - 写入配置文件（~/.ai-me/current）
          2. 检查原子性：
             - 使用数据库事务包装关键操作
             - 失败时调用 rollbackSwitch 恢复状态
             - 记录切换失败日志
          3. 检查 getRecentWorkspaces 是否：
             - 按 lastAccessedAt 降序排序
             - 过滤掉 deleted/archived 状态
             - 限制返回数量（默认 10 个）
          4. 检查 canSwitchTo 是否检查：
             - 工作空间是否存在
             - 路径是否可访问
             - 数据库是否可连接
             - 是否正在切换中（并发保护）
          5. 检查切换耗时是否在 500ms 以内（有测试断言）
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/services/workspace-switch.service.ts"
          - "src/workspace/services/workspace-switch.service.interface.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<15 seconds"

  - id: "ISSUE-WS-003~criterion-2"
    name: "切换状态持久化与管理"
    description: |
      实现切换状态的持久化存储：
      - CurrentWorkspaceStore: 当前工作空间存储
        - 存储位置：~/.ai-me/current (或配置路径)
        - 存储格式：JSON { currentWorkspaceId, lastSwitchTime, history }
        - 自动保存和加载
      - SwitchHistory: 切换历史记录
        - 记录每次切换的详细信息
        - 时间戳、从哪个工作空间切换到哪个
        - 切换耗时、是否成功
      - MRU (Most Recently Used) 管理
        - 维护最近使用列表
        - 支持固定常用工作空间
        - 自动清理旧记录

      配置文件结构：
      ```json
      {
        "currentWorkspaceId": "uuid",
        "lastSwitchTime": "2026-04-01T10:00:00Z",
        "mru": [
          { "id": "uuid", "accessCount": 5, "lastAccess": "..." }
        ],
        "pinned": ["uuid1", "uuid2"]
      }
      ```
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/stores/current-workspace.store.test.ts"
        test_files:
          - "src/workspace/stores/current-workspace.store.test.ts"
          - "src/workspace/stores/switch-history.store.test.ts"
      integration:
        command: "npm test -- src/workspace/workspace-state-persistence.integration.test.ts"
        test_files:
          - "src/workspace/workspace-state-persistence.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- workspace-state-persistence"
        test_files:
          - "tests/e2e/workspace/workspace-state-persistence.e2e.test.ts"
      ai:
        prompt: |
          请验证切换状态持久化实现：
          1. 检查 CurrentWorkspaceStore 是否：
             - 存储位置正确（~/.ai-me/current.json 或从 config 读取）
             - JSON 格式包含：currentWorkspaceId, lastSwitchTime, mru, pinned
             - 原子写入（先写临时文件再重命名）
             - 文件不存在时创建默认值
          2. 检查 SwitchHistory 是否记录：
             - fromWorkspaceId, toWorkspaceId
             - switchTime, durationMs
             - success（是否成功）
             - errorMessage（失败原因）
             - 最多保留 100 条历史记录
          3. 检查 MRU 管理：
             - 每次切换更新访问次数和时间
             - 支持 pinWorkspace/unpinWorkspace
             - pinned 工作空间始终在 MRU 顶部
             - 定期清理超过 30 天未访问的工作空间
          4. 检查配置文件读写是否处理异常（权限、磁盘满）
          5. 检查是否使用文件锁防止并发修改
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/stores/current-workspace.store.ts"
          - "src/workspace/stores/switch-history.store.ts"
          - "src/workspace/stores/mru-manager.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-WS-003~criterion-1"

  - id: "ISSUE-WS-003~criterion-3"
    name: "工作空间快速选择与搜索"
    description: |
      实现工作空间快速选择功能：
      - WorkspaceSelector: 工作空间选择器
        - listAll(): 列出所有工作空间（按名称排序）
        - search(query): 模糊搜索（名称、描述、路径）
        - getFavorites(): 获取收藏的工作空间
        - getRecent(): 获取最近使用
        - getRecommended(): 基于使用模式推荐
      - FuzzyMatcher: 模糊匹配器
        - 支持拼音匹配（中文友好）
        - 支持缩写匹配（如 "pmp" 匹配 "Project Management Project"）
        - 支持容错（typo 容忍）
        - 相关性排序

      搜索实现：
      - 本地优先（使用 Fuse.js 或类似）
      - 支持前缀匹配
      - 高亮匹配部分
      - 结果包含工作空间状态指示
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/services/workspace-selector.test.ts"
        test_files:
          - "src/workspace/services/workspace-selector.test.ts"
          - "src/workspace/utils/fuzzy-matcher.test.ts"
      integration:
        command: "npm test -- src/workspace/workspace-selector.integration.test.ts"
        test_files:
          - "src/workspace/workspace-selector.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- workspace-selector"
        test_files:
          - "tests/e2e/workspace/workspace-selector.e2e.test.ts"
      ai:
        prompt: |
          请验证工作空间选择器实现：
          1. 检查 WorkspaceSelector 是否实现：
             - listAll：返回所有 active 工作空间
             - search：模糊搜索（名称、描述、路径）
             - getFavorites：返回 pinned 的工作空间
             - getRecent：返回 MRU 列表
          2. 检查 FuzzyMatcher 是否支持：
             - 使用 Fuse.js 或类似库
             - 配置：threshold, keys (name, description, path)
             - 中文支持（无需额外配置，Fuse 支持 Unicode）
             - 拼音支持（使用 pinyin-pro 库转换）
          3. 检查搜索结果排序：
