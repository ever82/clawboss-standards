  - id: "ISSUE-WS-003~criterion-4"
    name: "切换钩子与事件系统"
    description: |
      实现工作空间切换的事件钩子和扩展点：
      - SwitchHooks: 切换钩子接口
        - beforeSwitch(from, to): 切换前执行
        - afterSwitch(from, to): 切换后执行
        - onSwitchFailed(from, to, error): 切换失败处理
      - SwitchEventBus: 切换事件总线
        - WorkspaceSwitchingEvent: 正在切换
        - WorkspaceSwitchedEvent: 切换完成
        - WorkspaceSwitchFailedEvent: 切换失败
      - HookRegistry: 钩子注册表
        - registerHook(hook): 注册钩子
        - unregisterHook(id): 注销钩子
        - executeHooks(phase, context): 执行钩子

      内置钩子：
      - ConfigReloadHook: 重新加载配置
      - CacheClearHook: 清除旧工作空间缓存
      - ConnectionPoolHook: 管理数据库连接池

      钩子执行策略：
      - 串行执行（可中断）
      - 超时控制（每个钩子最多 5 秒）
      - 错误处理（记录但不阻断）
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/hooks/"
        test_files:
          - "src/workspace/hooks/switch-hooks.test.ts"
          - "src/workspace/hooks/hook-registry.test.ts"
          - "src/workspace/events/switch-events.test.ts"
      integration:
        command: "npm test -- src/workspace/workspace-hooks.integration.test.ts"
        test_files:
          - "src/workspace/workspace-hooks.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- workspace-hooks"
        test_files:
          - "tests/e2e/workspace/workspace-hooks.e2e.test.ts"
      ai:
        prompt: |
          请验证切换钩子和事件系统：
          1. 检查 SwitchHooks 接口定义：
             - beforeSwitch(fromWorkspace, toWorkspace): Promise<boolean>
             - afterSwitch(fromWorkspace, toWorkspace): Promise<void>
             - onSwitchFailed(fromWorkspace, toWorkspace, error): Promise<void>
          2. 检查 HookRegistry 实现：
             - registerHook(name, hook, priority): 返回 hookId
             - unregisterHook(hookId): 成功返回 true
             - executeHooks(phase, context): 按 priority 排序执行
          3. 检查钩子执行策略：
             - beforeSwitch 串行执行，任一返回 false 则中断切换
             - afterSwitch 并行执行，不阻塞
             - 每个钩子有 5 秒超时
             - 钩子错误记录但不阻断其他钩子
          4. 检查内置钩子：
             - ConfigReloadHook 重新加载新工作空间配置
             - CacheClearHook 清除缓存
             - ConnectionPoolHook 管理连接池
          5. 检查事件发布：
             - WorkspaceSwitchingEvent（切换开始时）
             - WorkspaceSwitchedEvent（切换成功时）
             - WorkspaceSwitchFailedEvent（切换失败时）
          6. 检查事件订阅者是否能正确接收事件
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/hooks/switch-hooks.ts"
          - "src/workspace/hooks/hook-registry.ts"
          - "src/workspace/events/switch-events.ts"
          - "src/workspace/hooks/built-in/"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-WS-003~criterion-3"

  - id: "ISSUE-WS-003~criterion-5"
    name: "切换安全与并发控制"
    description: |
      实现工作空间切换的安全和并发控制：
      - SwitchLock: 切换锁机制
        - acquire(): 获取切换锁（防止并发切换）
        - release(): 释放切换锁
        - isLocked(): 检查是否正在切换
        - tryAcquire(timeout): 带超时的锁获取
      - SwitchGuard: 切换守卫
        - 防止切换到无效工作空间
        - 防止在操作进行中切换
        - 防止切换到已删除工作空间
      - SwitchRollback: 切换回滚
        - saveState(): 保存切换前状态
        - restoreState(): 恢复之前状态
        - cleanup(): 清理临时状态

      安全策略：
      - 切换前保存完整状态快照
      - 切换失败自动回滚
      - 切换过程中禁止其他操作
      - 异常退出后恢复机制

      边界情况：
      - 切换过程中进程退出
      - 目标工作空间在切换中被删除
      - 切换超时处理
    status: "pending"
    coverage:
      unit: sufficient
      integration: sufficient
      e2e: sufficient
      ai: sufficient
      manual: not_needed
    verification:
      unit:
        command: "npm test -- src/workspace/security/"
        test_files:
          - "src/workspace/security/switch-lock.test.ts"
          - "src/workspace/security/switch-guard.test.ts"
          - "src/workspace/security/switch-rollback.test.ts"
      integration:
        command: "npm test -- src/workspace/workspace-switch-safety.integration.test.ts"
        test_files:
          - "src/workspace/workspace-switch-safety.integration.test.ts"
      e2e:
        command: "npm run test:e2e -- workspace-switch-safety"
        test_files:
          - "tests/e2e/workspace/workspace-switch-safety.e2e.test.ts"
      ai:
        prompt: |
          请验证切换安全和并发控制：
          1. 检查 SwitchLock 实现：
             - 使用文件锁或内存锁（process-wide）
             - acquire() 在锁被占用时阻塞或返回 false
             - tryAcquire(timeout) 带超时
             - 进程退出时自动释放锁
          2. 检查 SwitchGuard 是否阻止：
             - 切换到不存在的工作空间
             - 切换到 deleted/archived 工作空间
             - 在批量操作进行中切换
             - 在导入/导出进行中切换
          3. 检查 SwitchRollback 实现：
             - saveState() 保存：当前工作空间 ID、打开的资源、事务状态
             - restoreState() 恢复到之前的工作空间
             - cleanup() 清理临时文件
          4. 检查并发测试：
             - 两个同时的 switchTo 调用，第二个应被拒绝
             - 切换过程中其他操作返回 SwitchInProgressError
          5. 检查异常退出恢复：
             - 启动时检查是否有未完成的切换
             - 尝试恢复或清理不一致状态
          6. 检查超时处理：
             - 切换总超时 10 秒
             - 单个步骤超时 5 秒
          请返回 {"passed": true/false, "reason": "详细解释"}
        context_files:
          - "src/workspace/security/switch-lock.ts"
          - "src/workspace/security/switch-guard.ts"
          - "src/workspace/security/switch-rollback.ts"
        model: "claude-sonnet-4-6"
    execution_time: "<10 seconds"
    prerequisites:
      - "ISSUE-WS-003~criterion-4"
